  <line x1="630" y1="216" x2="680" y2="216" stroke="#4da6ff" stroke-width="2.5" marker-end="url(#arrowB)"/>

  <text x="500" y="380" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#2d5a8a" letter-spacing="3">CISSP SERIES  ·  POST #45</text>
