  <rect width="1000" height="400" fill="url(#bg2)"/>
  <text x="500" y="40" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#e8f4fd" letter-spacing="2">ATTESTATION-DRIVEN POLICY DECISIONS</text>

