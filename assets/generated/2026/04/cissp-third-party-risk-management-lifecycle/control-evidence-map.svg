<svg width="1200" height="860" viewBox="0 0 1200 860" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Control evidence map for third-party risk</title>
  <desc id="desc">Matrix mapping contract clauses, technical controls, and verification evidence for third-party risk governance.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="860" fill="url(#bg)"/>
  <text x="60" y="72" font-size="44" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">Third-Party Control to Evidence Map</text>

  <rect x="60" y="120" width="1080" height="92" rx="12" fill="#0f172a"/>
  <text x="90" y="176" font-size="34" font-weight="700" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Contract Clause</text>
  <text x="470" y="176" font-size="34" font-weight="700" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Control Expectation</text>
  <text x="870" y="176" font-size="34" font-weight="700" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Evidence</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#0f172a">
    <rect x="60" y="230" width="1080" height="108" rx="12" fill="#dbeafe"/>
    <text x="90" y="294">Notification in defined window</text>
    <text x="470" y="294">Incident response coordination</text>
    <text x="870" y="294">Runbooks and exercise records</text>

    <rect x="60" y="354" width="1080" height="108" rx="12" fill="#cffafe"/>
    <text x="90" y="418">Access control and MFA terms</text>
    <text x="470" y="418">Least privilege and admin path controls</text>
    <text x="870" y="418">Access reviews and auth logs</text>

    <rect x="60" y="478" width="1080" height="108" rx="12" fill="#dbeafe"/>
    <text x="90" y="542">Vulnerability management SLA</text>
    <text x="470" y="542">Patch and remediation cadence</text>
    <text x="870" y="542">Ticket evidence and scan deltas</text>

    <rect x="60" y="602" width="1080" height="108" rx="12" fill="#cffafe"/>
    <text x="90" y="666">Subprocessor and change notice</text>
    <text x="470" y="666">Dependency transparency and review</text>
    <text x="870" y="666">Updated inventory and approvals</text>
  </g>

  <text x="60" y="780" font-size="28" fill="#334155" font-family="Segoe UI, Arial, sans-serif">Governance quality improves when every contractual promise has a measurable control and periodic evidence.</text>
</svg>
