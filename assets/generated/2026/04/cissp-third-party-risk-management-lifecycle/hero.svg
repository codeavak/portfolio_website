<svg width="1536" height="1024" viewBox="0 0 1536 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Third-party risk lifecycle hero</title>
  <desc id="desc">A lifecycle model for third-party security risk management from intake through continuous assurance.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1536" height="1024" fill="url(#bg)"/>
  <circle cx="1270" cy="180" r="210" fill="#93c5fd" fill-opacity="0.2"/>
  <circle cx="220" cy="900" r="260" fill="#7dd3fc" fill-opacity="0.18"/>

  <text x="110" y="145" font-size="66" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">CISSP #32</text>
  <text x="110" y="220" font-size="52" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">Third-Party Risk Is a Lifecycle</text>
  <text x="110" y="275" font-size="34" fill="#334155" font-family="Segoe UI, Arial, sans-serif">Not a one-time vendor questionnaire</text>

  <g filter="url(#shadow)">
    <circle cx="768" cy="615" r="285" fill="none" stroke="url(#ring)" stroke-width="36"/>
  </g>

  <rect x="665" y="490" width="206" height="250" rx="20" fill="#e0f2fe" stroke="#0369a1" stroke-width="4"/>
  <text x="768" y="560" text-anchor="middle" font-size="30" font-weight="700" fill="#0c4a6e" font-family="Segoe UI, Arial, sans-serif">ASSURE</text>
  <text x="768" y="610" text-anchor="middle" font-size="24" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">Monitor</text>
  <text x="768" y="644" text-anchor="middle" font-size="24" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">Escalate</text>
  <text x="768" y="678" text-anchor="middle" font-size="24" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">Improve</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#f8fafc" font-size="28">
    <rect x="760" y="300" width="240" height="76" rx="14" fill="#0f172a"/>
    <text x="880" y="348" text-anchor="middle">INTAKE</text>

    <rect x="1018" y="520" width="250" height="76" rx="14" fill="#1d4ed8"/>
    <text x="1143" y="568" text-anchor="middle">ASSESS</text>

    <rect x="890" y="796" width="250" height="76" rx="14" fill="#0369a1"/>
    <text x="1015" y="844" text-anchor="middle">CONTRACT</text>

    <rect x="396" y="796" width="250" height="76" rx="14" fill="#075985"/>
    <text x="521" y="844" text-anchor="middle">ONBOARD</text>

    <rect x="270" y="520" width="250" height="76" rx="14" fill="#0f766e"/>
    <text x="395" y="568" text-anchor="middle">OPERATE</text>
  </g>

  <g stroke="#0f172a" stroke-width="7" fill="none" stroke-linecap="round">
    <path d="M880 380 C960 420 1030 470 1080 520"/>
    <path d="M1080 600 C1070 700 1030 760 980 796"/>
    <path d="M890 872 C760 920 640 920 520 872"/>
    <path d="M396 796 C340 760 300 690 290 600"/>
    <path d="M290 520 C340 460 420 400 500 360"/>
    <path d="M520 360 C610 320 700 300 760 300"/>
  </g>
</svg>
