<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Cross-border transfer decision flow</title>
  <desc id="desc">Flowchart for evaluating data transfer requests across jurisdictions, safeguards, and business necessity.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="60" y="80" font-size="42" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">Cross-Border Data Transfer Decision Flow</text>

  <rect x="80" y="150" width="300" height="90" rx="14" fill="#0f172a"/>
  <text x="230" y="205" text-anchor="middle" font-size="26" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Business Need Identified</text>

  <rect x="450" y="150" width="300" height="90" rx="14" fill="#1e3a8a"/>
  <text x="600" y="205" text-anchor="middle" font-size="26" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Data Classification Check</text>

  <rect x="820" y="150" width="300" height="90" rx="14" fill="#0369a1"/>
  <text x="970" y="205" text-anchor="middle" font-size="26" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Legal Transfer Basis</text>

  <rect x="450" y="340" width="300" height="90" rx="14" fill="#0f766e"/>
  <text x="600" y="395" text-anchor="middle" font-size="26" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Safeguards Defined</text>

  <rect x="230" y="540" width="260" height="90" rx="14" fill="#16a34a"/>
  <text x="360" y="595" text-anchor="middle" font-size="26" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Approve Transfer</text>

  <rect x="700" y="540" width="260" height="90" rx="14" fill="#b91c1c"/>
  <text x="830" y="595" text-anchor="middle" font-size="26" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Reject / Redesign</text>

  <g stroke="#0f172a" stroke-width="5" fill="none" marker-end="url(#arrow)">
    <line x1="380" y1="195" x2="450" y2="195"/>
    <line x1="750" y1="195" x2="820" y2="195"/>
    <line x1="970" y1="240" x2="970" y2="295"/>
    <line x1="970" y1="295" x2="600" y2="295"/>
    <line x1="600" y1="295" x2="600" y2="340"/>
    <line x1="600" y1="430" x2="360" y2="540"/>
    <line x1="600" y1="430" x2="830" y2="540"/>
  </g>

  <text x="80" y="700" font-size="27" fill="#334155" font-family="Segoe UI, Arial, sans-serif">Design decisions should optimize legal compliance, risk reduction, and operational feasibility together.</text>
</svg>
