<svg width="1200" height="860" viewBox="0 0 1200 860" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Residency and sovereignty control evidence map</title>
  <desc id="desc">Matrix mapping residency and sovereignty risks to controls, owners, and evidence artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="860" fill="url(#bg)"/>
  <text x="60" y="74" font-size="42" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">Residency and Sovereignty Control Map</text>

  <rect x="60" y="120" width="1080" height="90" rx="12" fill="#0f172a"/>
  <text x="92" y="174" font-size="30" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Risk</text>
  <text x="395" y="174" font-size="30" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Control</text>
  <text x="735" y="174" font-size="30" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Owner</text>
  <text x="920" y="174" font-size="30" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Evidence</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#0f172a">
    <rect x="60" y="230" width="1080" height="105" rx="12" fill="#dbeafe"/>
    <text x="92" y="292">Unapproved data replication region</text>
    <text x="395" y="292">Region allowlist + policy guardrails</text>
    <text x="735" y="292">Cloud platform lead</text>
    <text x="920" y="292">Config snapshots</text>

    <rect x="60" y="350" width="1080" height="105" rx="12" fill="#ccfbf1"/>
    <text x="92" y="412">Cross-border support access risk</text>
    <text x="395" y="412">JIT access + approval workflow</text>
    <text x="735" y="412">IAM + legal</text>
    <text x="920" y="412">Access audit trail</text>

    <rect x="60" y="470" width="1080" height="105" rx="12" fill="#dbeafe"/>
    <text x="92" y="532">Weak transfer safeguards</text>
    <text x="395" y="532">Contractual and technical controls</text>
    <text x="735" y="532">Privacy office</text>
    <text x="920" y="532">Signed agreements</text>

    <rect x="60" y="590" width="1080" height="105" rx="12" fill="#ccfbf1"/>
    <text x="92" y="652">Mismatch between policy and runtime</text>
    <text x="395" y="652">Continuous compliance monitoring</text>
    <text x="735" y="652">Security operations</text>
    <text x="920" y="652">Control dashboards</text>
  </g>

  <text x="60" y="792" font-size="27" fill="#334155" font-family="Segoe UI, Arial, sans-serif">Credible governance links each jurisdictional risk to enforceable controls and objective evidence.</text>
</svg>
