<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" width="1000" height="440">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#162840;stop-opacity:1"/>
    </linearGradient>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2ecc71"/>
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff4d4d"/>
    </marker>
  </defs>
  <rect width="1000" height="440" fill="url(#bg1)"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#e8f4fd" letter-spacing="2">BELL-LaPADULA vs BIBA — ACCESS RULES COMPARED</text>

  <!-- BLP Section (left) -->
  <rect x="30" y="58" width="440" height="350" rx="10" fill="#0f2240" stroke="#1a7ccf" stroke-width="1.5"/>
  <text x="250" y="88" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700" fill="#4da6ff">Bell-LaPadula — CONFIDENTIALITY</text>

  <!-- Tiers -->
  <rect x="80" y="106" width="300" height="42" rx="6" fill="#1a1a3a" stroke="#4da6ff" stroke-width="1.5"/>
  <text x="230" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#e8f4fd">TOP SECRET</text>
  <rect x="80" y="164" width="300" height="42" rx="6" fill="#1a2240" stroke="#1a7ccf" stroke-width="1"/>
  <text x="230" y="190" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#c0d8f0">SECRET</text>
  <rect x="80" y="222" width="300" height="42" rx="6" fill="#0d1a35" stroke="#1a7ccf" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="230" y="248" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#8aabcc">UNCLASSIFIED</text>

  <!-- Read UP blocked -->
  <line x1="50" y1="248" x2="50" y2="132" stroke="#ff4d4d" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <circle cx="50" cy="260" r="12" fill="none" stroke="#ff4d4d" stroke-width="2.5"/>
  <line x1="41" y1="251" x2="59" y2="269" stroke="#ff4d4d" stroke-width="2.5"/>
  <text x="52" y="295" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ff8080">NO READ UP</text>

  <!-- Read DOWN allowed -->
  <line x1="400" y1="127" x2="400" y2="248" stroke="#2ecc71" stroke-width="2.5" marker-end="url(#arrowG)"/>
  <text x="398" y="295" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#2ecc71">READ DOWN OK</text>

  <!-- Write DOWN blocked -->
  <line x1="50" y1="132" x2="50" y2="248" stroke="#ff4d4d" stroke-width="2.5" stroke-dasharray="5,3"/>
  <text x="52" y="320" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ff8080">NO WRITE DOWN</text>

  <text x="230" y="360" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#7ab8e8" font-style="italic">Prevents classified data leaking down</text>
  <text x="230" y="382" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#5a8ab0">Silent on data integrity</text>

  <!-- Biba Section (right) -->
  <rect x="530" y="58" width="440" height="350" rx="10" fill="#0f2a1a" stroke="#0a8a3a" stroke-width="1.5"/>
  <text x="750" y="88" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700" fill="#2ecc71">Biba — INTEGRITY</text>

  <!-- Tiers -->
  <rect x="580" y="106" width="300" height="42" rx="6" fill="#0a2a18" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="730" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#e8f4fd">HIGH INTEGRITY</text>
  <rect x="580" y="164" width="300" height="42" rx="6" fill="#0d2a1a" stroke="#0a8a3a" stroke-width="1"/>
  <text x="730" y="190" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#c0dfc0">MEDIUM INTEGRITY</text>
  <rect x="580" y="222" width="300" height="42" rx="6" fill="#0a1a10" stroke="#0a8a3a" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="730" y="248" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#8acc8a">LOW INTEGRITY</text>

  <!-- Read DOWN blocked -->
  <line x1="550" y1="132" x2="550" y2="248" stroke="#ff4d4d" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <circle cx="550" cy="260" r="12" fill="none" stroke="#ff4d4d" stroke-width="2.5"/>
  <line x1="541" y1="251" x2="559" y2="269" stroke="#ff4d4d" stroke-width="2.5"/>
  <text x="552" y="295" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ff8080">NO READ DOWN</text>

  <!-- Write UP blocked -->
  <line x1="900" y1="248" x2="900" y2="132" stroke="#ff4d4d" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#arrowR)"/>
  <text x="898" y="295" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ff8080">NO WRITE UP</text>

  <!-- Write DOWN allowed -->
  <line x1="900" y1="132" x2="900" y2="248" stroke="#2ecc71" stroke-width="2.5" marker-end="url(#arrowG)"/>
  <text x="898" y="320" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#2ecc71">WRITE DOWN OK</text>

  <text x="730" y="360" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#7ab8e8" font-style="italic">Prevents low-integrity data corrupting high-integrity</text>
  <text x="730" y="382" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#5a8ab0">Complements Bell-LaPadula</text>

  <!-- Footer -->
  <text x="500" y="426" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#2d5a8a" letter-spacing="3">CISSP SERIES  ·  POST #41</text>
</svg>
