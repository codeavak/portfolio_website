<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Single control versus layered interruption</title>
  <desc id="desc">A side-by-side comparison showing a single-control environment where one bypass reaches a target and a layered-control environment where multiple checkpoints interrupt the attack path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1120"/>
      <stop offset="100%" stop-color="#13233a"/>
    </linearGradient>
    <style>
      .title { font: 700 48px 'Segoe UI', Arial, sans-serif; fill: #f8fbff; }
      .sub { font: 700 26px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .text { font: 400 20px 'Segoe UI', Arial, sans-serif; fill: #d7e6f5; }
      .risk { fill: #46202a; stroke: #ff7a8f; stroke-width: 2.5; }
      .safe { fill: #14354b; stroke: #5dd4ff; stroke-width: 2.5; }
      .chip { font: 600 18px 'Segoe UI', Arial, sans-serif; }
    </style>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0,0 12,6 0,12" fill="#ff8ea0"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0,0 12,6 0,12" fill="#8fdfff"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="80" y="85" class="title">One Bypass vs. Multiple Interruptions</text>
  <text x="80" y="125" class="text">Defense in depth slows attackers down and gives defenders more chances to notice and contain the problem.</text>

  <rect x="80" y="180" rx="28" ry="28" width="660" height="620" fill="#101c2f" stroke="#ff7a8f" stroke-width="3"/>
  <text x="120" y="235" class="sub">Single-control environment</text>
  <text x="120" y="268" class="text">One failure can become a direct path to the system.</text>

  <circle cx="180" cy="470" r="48" fill="#5b2431" stroke="#ff9aac" stroke-width="2.5"/>
  <text x="180" y="478" text-anchor="middle" class="chip" fill="#fff4f6">Threat</text>

  <rect x="330" y="430" rx="18" ry="18" width="150" height="80" class="risk"/>
  <text x="405" y="478" text-anchor="middle" class="chip" fill="#ffd9df">Firewall</text>

  <rect x="560" y="420" rx="18" ry="18" width="120" height="100" fill="#4f1825" stroke="#ff7a8f" stroke-width="2.5"/>
  <text x="620" y="468" text-anchor="middle" class="chip" fill="#ffffff">Core</text>
  <text x="620" y="492" text-anchor="middle" class="chip" fill="#ffffff">System</text>

  <path d="M 230 470 L 330 470" stroke="#ff8ea0" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowRed)"/>
  <path d="M 480 470 L 560 470" stroke="#ff8ea0" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowRed)"/>
  <text x="332" y="390" class="text" fill="#ffd9df">Bypass once</text>
  <text x="332" y="412" class="text" fill="#ffd9df">and the path stays open</text>

  <rect x="860" y="180" rx="28" ry="28" width="660" height="620" fill="#101c2f" stroke="#5dd4ff" stroke-width="3"/>
  <text x="900" y="235" class="sub">Layered-control environment</text>
  <text x="900" y="268" class="text">Several checkpoints reduce damage and increase visibility.</text>

  <circle cx="960" cy="470" r="48" fill="#173a53" stroke="#91e4ff" stroke-width="2.5"/>
  <text x="960" y="478" text-anchor="middle" class="chip" fill="#f2fbff">Threat</text>

  <rect x="1060" y="255" rx="16" ry="16" width="140" height="62" class="safe"/>
  <text x="1130" y="293" text-anchor="middle" class="chip" fill="#e8fbff">MFA</text>

  <rect x="1060" y="365" rx="16" ry="16" width="180" height="62" class="safe"/>
  <text x="1150" y="403" text-anchor="middle" class="chip" fill="#e8fbff">Least Privilege</text>

  <rect x="1060" y="475" rx="16" ry="16" width="170" height="62" class="safe"/>
  <text x="1145" y="513" text-anchor="middle" class="chip" fill="#e8fbff">Segmentation</text>

  <rect x="1060" y="585" rx="16" ry="16" width="145" height="62" class="safe"/>
  <text x="1132" y="623" text-anchor="middle" class="chip" fill="#e8fbff">Logging</text>

  <rect x="1300" y="420" rx="18" ry="18" width="140" height="100" fill="#153147" stroke="#5dd4ff" stroke-width="2.5"/>
  <text x="1370" y="468" text-anchor="middle" class="chip" fill="#ffffff">Core</text>
  <text x="1370" y="492" text-anchor="middle" class="chip" fill="#ffffff">System</text>

  <path d="M 1008 470 C 1035 430, 1035 300, 1060 286" stroke="#8fdfff" stroke-width="6" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M 1008 470 C 1035 455, 1035 395, 1060 396" stroke="#8fdfff" stroke-width="6" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M 1008 470 L 1060 506" stroke="#8fdfff" stroke-width="6" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M 1008 470 C 1035 505, 1035 615, 1060 616" stroke="#8fdfff" stroke-width="6" fill="none" marker-end="url(#arrowBlue)"/>

  <path d="M 1240 396 L 1300 470" stroke="#8fdfff" stroke-width="6" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="1185" y="706" class="text" fill="#a8ecff">More layers mean more chances to block, detect, or contain.</text>
</svg>