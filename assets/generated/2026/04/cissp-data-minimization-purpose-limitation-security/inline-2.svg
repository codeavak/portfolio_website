<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="30 day implementation sprint">
  <rect width="1200" height="700" fill="#0B1F2A" />

  <text x="600" y="72" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#E4F3FF">30-Day Minimization Sprint</text>

  <g font-family="Segoe UI, Arial, sans-serif" fill="#E9F4FF">
    <rect x="110" y="130" width="980" height="92" rx="14" fill="#174A6A" />
    <text x="150" y="186" font-size="28" font-weight="700">Week 1</text>
    <text x="320" y="186" font-size="24">Map high-sensitivity collection flows and owners</text>

    <rect x="110" y="250" width="980" height="92" rx="14" fill="#1F6F8B" />
    <text x="150" y="306" font-size="28" font-weight="700">Week 2</text>
    <text x="320" y="306" font-size="24">Remove non-essential fields and add purpose checkpoints</text>

    <rect x="110" y="370" width="980" height="92" rx="14" fill="#2892A6" />
    <text x="150" y="426" font-size="28" font-weight="700">Week 3</text>
    <text x="320" y="426" font-size="24">Enforce use boundaries and retention tags</text>

    <rect x="110" y="490" width="980" height="92" rx="14" fill="#34B3C1" />
    <text x="150" y="546" font-size="28" font-weight="700">Week 4</text>
    <text x="320" y="546" font-size="24">Validate deletion evidence and tune metrics</text>
  </g>

  <text x="600" y="648" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#C6E8FF">Outcome: lower exposure with measurable governance control</text>
</svg>
