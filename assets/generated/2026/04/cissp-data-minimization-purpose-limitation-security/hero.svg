<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="CISSP #49 data minimization hero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E1C36" />
      <stop offset="100%" stop-color="#1F3A5F" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8FD3FE" />
      <stop offset="100%" stop-color="#C3F0CA" />
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />

  <g transform="translate(180,180)">
    <rect x="0" y="0" width="1240" height="540" rx="24" fill="#0B1226" stroke="#4AA3DF" stroke-opacity="0.45" />

    <text x="620" y="110" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="62" font-weight="700" fill="#F5FAFF">CISSP #49</text>
    <text x="620" y="178" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="600" fill="#D8EEFF">Data Minimization</text>
    <text x="620" y="236" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="40" fill="#EAF7EA">Purpose Limitation</text>

    <rect x="180" y="300" width="880" height="52" rx="26" fill="#1A2A46" />
    <rect x="180" y="300" width="520" height="52" rx="26" fill="url(#accent)" />
    <text x="620" y="336" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" fill="#0B1226">Attack Surface Shrinks When Data Scope Shrinks</text>

    <g font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#CFE9FF" text-anchor="middle">
      <text x="300" y="430">Collect Less</text>
      <text x="620" y="430">Use With Intent</text>
      <text x="940" y="430">Retain With Proof</text>
    </g>
  </g>

  <text x="800" y="845" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#BFD9F0">Governance, architecture, and lifecycle controls working together</text>
</svg>
