<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Five part minimization model">
  <rect width="1200" height="700" fill="#F4F8FC" />

  <text x="600" y="70" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#173B63">Five-Part Control Model</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" fill="#0D2A45" text-anchor="middle">
    <rect x="80" y="140" width="220" height="110" rx="16" fill="#DCEEFF" stroke="#2B6EA6" stroke-width="2" />
    <text x="190" y="188">Purpose</text>
    <text x="190" y="220">Definition</text>

    <rect x="340" y="140" width="220" height="110" rx="16" fill="#DFF7EA" stroke="#2D936C" stroke-width="2" />
    <text x="450" y="188">Field-Level</text>
    <text x="450" y="220">Necessity</text>

    <rect x="600" y="140" width="220" height="110" rx="16" fill="#FFF0D6" stroke="#B7791F" stroke-width="2" />
    <text x="710" y="188">Use-Boundary</text>
    <text x="710" y="220">Enforcement</text>

    <rect x="860" y="140" width="220" height="110" rx="16" fill="#FDE2E1" stroke="#C44536" stroke-width="2" />
    <text x="970" y="188">Retention</text>
    <text x="970" y="220">Alignment</text>

    <rect x="470" y="360" width="260" height="120" rx="16" fill="#E8E6FF" stroke="#5A4FCF" stroke-width="2" />
    <text x="600" y="415">Evidence &amp;</text>
    <text x="600" y="448">Accountability</text>
  </g>

  <g stroke="#355C7D" stroke-width="4" fill="none" opacity="0.9">
    <path d="M190 250 L190 300 L600 300 L600 360" />
    <path d="M450 250 L450 300" />
    <path d="M710 250 L710 300" />
    <path d="M970 250 L970 300 L600 300" />
  </g>

  <text x="600" y="620" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#1B365D">Security impact: less unnecessary data, fewer risky uses, stronger lifecycle control</text>
</svg>
