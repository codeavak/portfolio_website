<svg width="1536" height="1024" viewBox="0 0 1536 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Cloud shared responsibility and control inheritance</title>
  <desc id="desc">Illustration showing provider and customer control domains with governance ownership across identity, data, and monitoring layers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="provider" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="customer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1536" height="1024" fill="url(#bg)"/>
  <circle cx="1260" cy="185" r="220" fill="#93c5fd" fill-opacity="0.2"/>
  <circle cx="220" cy="890" r="250" fill="#67e8f9" fill-opacity="0.15"/>

  <text x="96" y="132" font-size="62" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">CISSP #35</text>
  <text x="96" y="205" font-size="50" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">Shared Responsibility Needs</text>
  <text x="96" y="257" font-size="50" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">Explicit Control Ownership</text>

  <g filter="url(#shadow)">
    <rect x="140" y="330" width="585" height="530" rx="28" fill="url(#provider)"/>
    <rect x="810" y="330" width="585" height="530" rx="28" fill="url(#customer)"/>
  </g>

  <text x="432" y="404" text-anchor="middle" font-size="42" font-weight="700" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">CLOUD PROVIDER</text>
  <text x="432" y="460" text-anchor="middle" font-size="28" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif">Physical infrastructure</text>
  <text x="432" y="504" text-anchor="middle" font-size="28" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif">Core platform services</text>
  <text x="432" y="548" text-anchor="middle" font-size="28" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif">Foundational resilience</text>
  <text x="432" y="592" text-anchor="middle" font-size="28" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif">Attestation evidence</text>

  <text x="1104" y="404" text-anchor="middle" font-size="42" font-weight="700" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">CUSTOMER TEAM</text>
  <text x="1104" y="460" text-anchor="middle" font-size="28" fill="#ccfbf1" font-family="Segoe UI, Arial, sans-serif">Identity and access</text>
  <text x="1104" y="504" text-anchor="middle" font-size="28" fill="#ccfbf1" font-family="Segoe UI, Arial, sans-serif">Data classification + keys</text>
  <text x="1104" y="548" text-anchor="middle" font-size="28" fill="#ccfbf1" font-family="Segoe UI, Arial, sans-serif">Configuration hardening</text>
  <text x="1104" y="592" text-anchor="middle" font-size="28" fill="#ccfbf1" font-family="Segoe UI, Arial, sans-serif">Detection and response</text>

  <rect x="640" y="670" width="260" height="150" rx="20" fill="#e2e8f0" stroke="#334155" stroke-width="4"/>
  <text x="770" y="732" text-anchor="middle" font-size="30" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">CONTROL</text>
  <text x="770" y="772" text-anchor="middle" font-size="30" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">OWNERSHIP</text>

  <path d="M725 744 L640 744" stroke="#0f172a" stroke-width="7"/>
  <path d="M900 744 L985 744" stroke="#0f172a" stroke-width="7"/>
</svg>
