<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Cloud control evidence chain</title>
  <desc id="desc">Flow diagram from control ownership to evidence collection, verification, and governance reporting.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="60" y="80" font-size="44" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">Control Evidence Chain for Cloud Governance</text>

  <rect x="70" y="170" width="220" height="90" rx="14" fill="#0f172a"/>
  <text x="180" y="225" text-anchor="middle" font-size="26" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Control Owner</text>

  <rect x="340" y="170" width="220" height="90" rx="14" fill="#1e3a8a"/>
  <text x="450" y="225" text-anchor="middle" font-size="26" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Control Design</text>

  <rect x="610" y="170" width="220" height="90" rx="14" fill="#0369a1"/>
  <text x="720" y="225" text-anchor="middle" font-size="26" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Evidence Capture</text>

  <rect x="880" y="170" width="250" height="90" rx="14" fill="#0f766e"/>
  <text x="1005" y="225" text-anchor="middle" font-size="26" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Governance Review</text>

  <rect x="340" y="430" width="220" height="90" rx="14" fill="#0f172a"/>
  <text x="450" y="485" text-anchor="middle" font-size="26" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Gap Identified</text>

  <rect x="610" y="430" width="220" height="90" rx="14" fill="#7c2d12"/>
  <text x="720" y="485" text-anchor="middle" font-size="26" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Remediation</text>

  <g stroke="#0f172a" stroke-width="5" fill="none" marker-end="url(#arrow)">
    <line x1="290" y1="215" x2="340" y2="215"/>
    <line x1="560" y1="215" x2="610" y2="215"/>
    <line x1="830" y1="215" x2="880" y2="215"/>
    <path d="M1005 260 C1005 350 820 410 760 430"/>
    <line x1="610" y1="475" x2="560" y2="475"/>
    <path d="M450 430 C450 350 610 300 680 260"/>
  </g>

  <text x="70" y="620" font-size="27" fill="#334155" font-family="Segoe UI, Arial, sans-serif">Evidence-based governance closes the gap between inherited controls and actual risk ownership.</text>
</svg>
