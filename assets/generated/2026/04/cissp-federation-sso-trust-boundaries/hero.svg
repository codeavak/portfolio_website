<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Federation and SSO trust boundaries</title>
  <desc id="desc">A visual showing identity provider, relying parties, and trust boundaries where authentication assertions become authorization decisions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f9fc" />
      <stop offset="100%" stop-color="#e7eef8" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <circle cx="150" cy="120" r="120" fill="#dbeafe" opacity="0.55" />
  <circle cx="1440" cy="760" r="160" fill="#d1fae5" opacity="0.45" />

  <text x="90" y="110" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700" fill="#0f172a">Federation works when trust is deliberate</text>
  <text x="90" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#334155">CISSP view: SSO convenience is useful, but trust boundaries still define risk.</text>

  <g filter="url(#shadow)">
    <rect x="90" y="230" width="420" height="350" rx="24" fill="#ffffff" />
    <rect x="590" y="230" width="420" height="350" rx="24" fill="#ffffff" />
    <rect x="1090" y="230" width="420" height="350" rx="24" fill="#ffffff" />
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="130" y="292" font-size="31" font-weight="700" fill="#1e3a8a">User + Device</text>
    <text x="130" y="335" font-size="22" fill="#475569">Requests access through app</text>
    <text x="130" y="368" font-size="22" fill="#475569">redirect to IdP for sign-in</text>
    <rect x="130" y="415" width="330" height="120" rx="16" fill="#eff6ff" stroke="#bfdbfe" />
    <text x="154" y="462" font-size="24" font-weight="700" fill="#1d4ed8">Control focus</text>
    <text x="154" y="497" font-size="21" fill="#334155">Session integrity + phishing resistance</text>

    <text x="630" y="292" font-size="31" font-weight="700" fill="#065f46">Identity Provider (IdP)</text>
    <text x="630" y="335" font-size="22" fill="#475569">Authenticates subject</text>
    <text x="630" y="368" font-size="22" fill="#475569">issues signed assertion/token</text>
    <rect x="630" y="415" width="330" height="120" rx="16" fill="#ecfdf5" stroke="#a7f3d0" />
    <text x="654" y="462" font-size="24" font-weight="700" fill="#047857">Control focus</text>
    <text x="654" y="497" font-size="21" fill="#334155">Assurance, signing keys, lifecycle</text>

    <text x="1130" y="292" font-size="31" font-weight="700" fill="#7c2d12">Relying Party (App/API)</text>
    <text x="1130" y="335" font-size="22" fill="#475569">Validates token + maps claims</text>
    <text x="1130" y="368" font-size="22" fill="#475569">makes authorization decision</text>
    <rect x="1130" y="415" width="330" height="120" rx="16" fill="#fff7ed" stroke="#fed7aa" />
    <text x="1154" y="462" font-size="24" font-weight="700" fill="#c2410c">Control focus</text>
    <text x="1154" y="497" font-size="21" fill="#334155">Least privilege + auditability</text>
  </g>

  <g stroke="#334155" stroke-width="6" fill="none" marker-end="url(#arrow)">
    <path d="M510 405 L575 405" />
    <path d="M1010 405 L1075 405" />
  </g>

  <rect x="70" y="635" width="1460" height="180" rx="26" fill="#0f172a" opacity="0.95" />
  <text x="110" y="700" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Trust transfer is not trust elimination.</text>
  <text x="110" y="745" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#dbeafe">Federation centralizes authentication, but each application still owns authorization and accountability.</text>
</svg>
