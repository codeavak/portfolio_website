<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Federation transaction flow</title>
  <desc id="desc">Step-by-step flow of a federated login transaction from request to token validation and authorization.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1400" height="820" fill="#f8fafc" />
  <text x="70" y="84" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#0f172a">Federated SSO Transaction, Mapped to Control Points</text>
  <text x="70" y="122" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#475569">Useful CISSP lens: separate authentication assurance from downstream authorization decisions.</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a" font-weight="700">
    <rect x="80" y="190" width="190" height="70" rx="14" fill="#dbeafe" />
    <text x="130" y="235">User</text>
    <rect x="430" y="190" width="220" height="70" rx="14" fill="#dcfce7" />
    <text x="470" y="235">App (SP/RP)</text>
    <rect x="800" y="190" width="230" height="70" rx="14" fill="#fde68a" />
    <text x="870" y="235">IdP</text>
    <rect x="1180" y="190" width="170" height="70" rx="14" fill="#fecaca" />
    <text x="1215" y="235">API</text>
  </g>

  <g stroke="#334155" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <line x1="270" y1="225" x2="430" y2="225" />
    <line x1="650" y1="225" x2="800" y2="225" />
    <line x1="1030" y1="225" x2="650" y2="310" />
    <line x1="650" y1="360" x2="1180" y2="225" />
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#334155">
    <text x="300" y="210">1. Request protected resource</text>
    <text x="675" y="210">2. Redirect to IdP</text>
    <text x="700" y="300">3. Signed assertion/token to app</text>
    <text x="770" y="355">4. API call with token</text>
  </g>

  <g>
    <rect x="90" y="320" width="1220" height="420" rx="24" fill="#ffffff" stroke="#cbd5e1" />
    <text x="130" y="380" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Control checks that often get skipped</text>

    <g font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1f2937">
      <circle cx="140" cy="435" r="9" fill="#1d4ed8" /><text x="165" y="442">Token signature, issuer, audience, and expiration validation</text>
      <circle cx="140" cy="485" r="9" fill="#1d4ed8" /><text x="165" y="492">Claim mapping hygiene: no blind trust of role/group claims</text>
      <circle cx="140" cy="535" r="9" fill="#1d4ed8" /><text x="165" y="542">Session controls: rotation, revocation, idle timeout</text>
      <circle cx="140" cy="585" r="9" fill="#1d4ed8" /><text x="165" y="592">Step-up authentication for high-risk actions</text>
      <circle cx="140" cy="635" r="9" fill="#1d4ed8" /><text x="165" y="642">Per-resource authorization in API, not just gateway trust</text>
      <circle cx="140" cy="685" r="9" fill="#1d4ed8" /><text x="165" y="692">End-to-end logging for accountability and investigation</text>
    </g>
  </g>
</svg>
