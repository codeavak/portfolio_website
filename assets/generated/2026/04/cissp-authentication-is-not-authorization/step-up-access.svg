<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Low-risk versus high-risk access flow</title>
  <desc id="desc">A two-lane diagram showing that ordinary access may use standard authentication while sensitive actions require step-up checks, approval, and stronger audit logging.</desc>
  <rect width="1400" height="820" fill="#f8fbff" />
  <text x="80" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#0f172a">Trust should scale with risk</text>
  <text x="80" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#475569">Authentication starts the session. Authorization and accountability shape the sensitive actions inside it.</text>

  <rect x="80" y="190" width="580" height="500" rx="24" fill="#eefbf3" stroke="#bbf7d0" />
  <text x="115" y="245" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#166534">Low-risk flow</text>
  <rect x="115" y="285" width="220" height="70" rx="16" fill="#ffffff" stroke="#86efac" />
  <text x="153" y="328" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Sign in</text>
  <rect x="115" y="395" width="220" height="70" rx="16" fill="#ffffff" stroke="#86efac" />
  <text x="137" y="438" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">View own data</text>
  <rect x="115" y="505" width="220" height="70" rx="16" fill="#ffffff" stroke="#86efac" />
  <text x="143" y="548" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Standard logging</text>
  <path d="M225 355 L225 395" stroke="#22c55e" stroke-width="6" stroke-linecap="round" />
  <path d="M225 465 L225 505" stroke="#22c55e" stroke-width="6" stroke-linecap="round" />

  <rect x="740" y="190" width="580" height="500" rx="24" fill="#fff7ed" stroke="#fdba74" />
  <text x="775" y="245" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#c2410c">High-risk flow</text>
  <rect x="775" y="285" width="220" height="70" rx="16" fill="#ffffff" stroke="#fdba74" />
  <text x="813" y="328" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Sign in</text>
  <rect x="775" y="385" width="220" height="70" rx="16" fill="#ffffff" stroke="#fdba74" />
  <text x="792" y="428" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Sensitive action</text>
  <rect x="1040" y="385" width="220" height="70" rx="16" fill="#ffffff" stroke="#fdba74" />
  <text x="1062" y="428" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Step-up MFA</text>
  <rect x="775" y="495" width="220" height="70" rx="16" fill="#ffffff" stroke="#fdba74" />
  <text x="804" y="538" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Approval / SoD</text>
  <rect x="1040" y="495" width="220" height="70" rx="16" fill="#ffffff" stroke="#fdba74" />
  <text x="1080" y="538" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Audit trail</text>
  <path d="M885 355 L885 385" stroke="#f97316" stroke-width="6" stroke-linecap="round" />
  <path d="M995 420 L1040 420" stroke="#f97316" stroke-width="6" stroke-linecap="round" />
  <path d="M885 455 L885 495" stroke="#f97316" stroke-width="6" stroke-linecap="round" />
  <path d="M1150 455 L1150 495" stroke="#f97316" stroke-width="6" stroke-linecap="round" />

  <text x="80" y="755" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#334155">Examples of high-risk actions: changing entitlements, exporting regulated data, revoking MFA methods, or approving privileged exceptions.</text>
</svg>