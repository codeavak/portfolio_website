<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Identity and access management flow</title>
  <desc id="desc">A clean illustration showing identification, authentication, authorization, and accountability as separate stages before secure access is granted.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#e9f1ff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f3a5a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <circle cx="1420" cy="120" r="120" fill="#dbeafe" opacity="0.6" />
  <circle cx="130" cy="760" r="160" fill="#e0f2fe" opacity="0.7" />

  <text x="110" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700" fill="#0f172a">Authentication is only one step</text>
  <text x="110" y="165" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#334155">Good IAM separates identity, proof, permission, and traceability.</text>

  <g filter="url(#shadow)">
    <rect x="100" y="250" rx="22" ry="22" width="280" height="210" fill="#ffffff" />
    <rect x="450" y="250" rx="22" ry="22" width="280" height="210" fill="#ffffff" />
    <rect x="800" y="250" rx="22" ry="22" width="280" height="210" fill="#ffffff" />
    <rect x="1150" y="250" rx="22" ry="22" width="280" height="210" fill="#ffffff" />
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <circle cx="170" cy="315" r="28" fill="#dbeafe" />
    <text x="157" y="323" font-size="26" font-weight="700" fill="#1d4ed8">1</text>
    <text x="135" y="360" font-size="28" font-weight="700" fill="#0f172a">Identify</text>
    <text x="135" y="395" font-size="20" fill="#475569">User or service</text>
    <text x="135" y="425" font-size="20" fill="#475569">claims an identity</text>

    <circle cx="520" cy="315" r="28" fill="#dcfce7" />
    <text x="507" y="323" font-size="26" font-weight="700" fill="#15803d">2</text>
    <text x="484" y="360" font-size="28" font-weight="700" fill="#0f172a">Authenticate</text>
    <text x="484" y="395" font-size="20" fill="#475569">Password, MFA,</text>
    <text x="484" y="425" font-size="20" fill="#475569">passkey, certificate</text>

    <circle cx="870" cy="315" r="28" fill="#fde68a" />
    <text x="857" y="323" font-size="26" font-weight="700" fill="#b45309">3</text>
    <text x="835" y="360" font-size="28" font-weight="700" fill="#0f172a">Authorize</text>
    <text x="835" y="395" font-size="20" fill="#475569">Can this subject</text>
    <text x="835" y="425" font-size="20" fill="#475569">do this action?</text>

    <circle cx="1220" cy="315" r="28" fill="#fce7f3" />
    <text x="1207" y="323" font-size="26" font-weight="700" fill="#be185d">4</text>
    <text x="1184" y="360" font-size="28" font-weight="700" fill="#0f172a">Accountability</text>
    <text x="1184" y="395" font-size="20" fill="#475569">Log, approve,</text>
    <text x="1184" y="425" font-size="20" fill="#475569">review, investigate</text>
  </g>

  <g stroke="#94a3b8" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M380 355 L430 355" />
    <path d="M730 355 L780 355" />
    <path d="M1080 355 L1130 355" />
  </g>

  <g filter="url(#shadow)">
    <rect x="300" y="560" rx="24" ry="24" width="1000" height="150" fill="#0f172a" opacity="0.95" />
  </g>
  <text x="340" y="620" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Secure systems do not stop at the login screen.</text>
  <text x="340" y="664" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#dbeafe">They keep making careful access and accountability decisions after identity is verified.</text>
</svg>