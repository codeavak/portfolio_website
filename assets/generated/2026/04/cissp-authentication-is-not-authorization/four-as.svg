<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">The four A's of IAM</title>
  <desc id="desc">An explainer graphic that separates identification, authentication, authorization, and accountability into four distinct cards.</desc>
  <rect width="1400" height="820" fill="#f8fafc" />
  <text x="80" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#0f172a">The 4 A's of IAM</text>
  <text x="80" y="128" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#475569">Useful for CISSP and even more useful in real design reviews.</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="80" y="190" width="280" height="250" rx="22" fill="#eff6ff" stroke="#bfdbfe" />
    <text x="110" y="245" font-size="30" font-weight="700" fill="#1d4ed8">Identification</text>
    <text x="110" y="288" font-size="22" fill="#334155">The claim:</text>
    <text x="110" y="322" font-size="20" fill="#475569">“I am this user,</text>
    <text x="110" y="352" font-size="20" fill="#475569">account, or service.”</text>

    <rect x="390" y="190" width="280" height="250" rx="22" fill="#ecfdf5" stroke="#bbf7d0" />
    <text x="420" y="245" font-size="30" font-weight="700" fill="#15803d">Authentication</text>
    <text x="420" y="288" font-size="22" fill="#334155">The proof:</text>
    <text x="420" y="322" font-size="20" fill="#475569">password, MFA,</text>
    <text x="420" y="352" font-size="20" fill="#475569">passkey, certificate</text>

    <rect x="700" y="190" width="280" height="250" rx="22" fill="#fffbeb" stroke="#fde68a" />
    <text x="730" y="245" font-size="30" font-weight="700" fill="#b45309">Authorization</text>
    <text x="730" y="288" font-size="22" fill="#334155">The decision:</text>
    <text x="730" y="322" font-size="20" fill="#475569">what can this identity</text>
    <text x="730" y="352" font-size="20" fill="#475569">do right now?</text>

    <rect x="1010" y="190" width="280" height="250" rx="22" fill="#fdf2f8" stroke="#fbcfe8" />
    <text x="1040" y="245" font-size="30" font-weight="700" fill="#be185d">Accountability</text>
    <text x="1040" y="288" font-size="22" fill="#334155">The evidence:</text>
    <text x="1040" y="322" font-size="20" fill="#475569">logs, approvals,</text>
    <text x="1040" y="352" font-size="20" fill="#475569">attribution, review</text>
  </g>

  <rect x="120" y="520" width="1160" height="180" rx="26" fill="#0f172a" />
  <text x="165" y="585" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Common mistake:</text>
  <text x="165" y="628" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#dbeafe">Treating successful authentication as if it automatically answers authorization and accountability too.</text>
</svg>