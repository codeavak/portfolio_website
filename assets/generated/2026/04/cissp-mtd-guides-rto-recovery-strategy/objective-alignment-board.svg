<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Objective alignment board</title>
  <desc id="desc">Board mapping business process tolerances, service recovery targets, dependencies, and test evidence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132636"/>
      <stop offset="100%" stop-color="#1b4e66"/>
    </linearGradient>
    <style>
      .title{font:700 46px 'Segoe UI',Tahoma,sans-serif;fill:#f4fcff}
      .sub{font:500 20px 'Segoe UI',Tahoma,sans-serif;fill:#d5e9f3}
      .head{font:700 22px 'Segoe UI',Tahoma,sans-serif;fill:#08273a}
      .cell{font:500 17px 'Segoe UI',Tahoma,sans-serif;fill:#08273a}
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <text x="70" y="90" class="title">Business-Tolerance and Recovery Objective Board</text>
  <text x="70" y="126" class="sub">Use one view to align process impact, targets, dependencies, and evidence</text>

  <rect x="90" y="180" width="1220" height="620" rx="20" fill="#ffffff" fill-opacity="0.92"/>

  <rect x="110" y="210" width="1180" height="70" fill="#8fdaf1"/>
  <text x="140" y="254" class="head">Business Process</text>
  <text x="390" y="254" class="head">MTD</text>
  <text x="520" y="254" class="head">RTO</text>
  <text x="650" y="254" class="head">Key Dependency</text>
  <text x="930" y="254" class="head">Latest Test Evidence</text>

  <line x1="110" y1="340" x2="1290" y2="340" stroke="#cfe6f2" stroke-width="2"/>
  <line x1="110" y1="430" x2="1290" y2="430" stroke="#cfe6f2" stroke-width="2"/>
  <line x1="110" y1="520" x2="1290" y2="520" stroke="#cfe6f2" stroke-width="2"/>
  <line x1="110" y1="610" x2="1290" y2="610" stroke="#cfe6f2" stroke-width="2"/>

  <line x1="350" y1="210" x2="350" y2="780" stroke="#cfe6f2" stroke-width="2"/>
  <line x1="490" y1="210" x2="490" y2="780" stroke="#cfe6f2" stroke-width="2"/>
  <line x1="620" y1="210" x2="620" y2="780" stroke="#cfe6f2" stroke-width="2"/>
  <line x1="900" y1="210" x2="900" y2="780" stroke="#cfe6f2" stroke-width="2"/>

  <text x="140" y="320" class="cell">Checkout and Payment</text>
  <text x="390" y="320" class="cell">2h</text>
  <text x="520" y="320" class="cell">45m</text>
  <text x="650" y="320" class="cell">Identity provider</text>
  <text x="930" y="320" class="cell">Recovered in 38m, margin healthy</text>

  <text x="140" y="410" class="cell">Fulfillment Routing</text>
  <text x="390" y="410" class="cell">4h</text>
  <text x="520" y="410" class="cell">90m</text>
  <text x="650" y="410" class="cell">Queue broker + network</text>
  <text x="930" y="410" class="cell">Recovered in 112m, action open</text>

  <text x="140" y="500" class="cell">Customer Support KB</text>
  <text x="390" y="500" class="cell">6h</text>
  <text x="520" y="500" class="cell">2h</text>
  <text x="650" y="500" class="cell">SaaS provider region</text>
  <text x="930" y="500" class="cell">Recovered in 96m, stable</text>

  <text x="140" y="590" class="cell">Analytics Reporting</text>
  <text x="390" y="590" class="cell">48h</text>
  <text x="520" y="590" class="cell">12h</text>
  <text x="650" y="590" class="cell">Data warehouse</text>
  <text x="930" y="590" class="cell">Recovered in 10h, acceptable</text>

  <text x="140" y="680" class="cell">Legal Notification Workflow</text>
  <text x="390" y="680" class="cell">8h</text>
  <text x="520" y="680" class="cell">3h</text>
  <text x="650" y="680" class="cell">Approval chain availability</text>
  <text x="930" y="680" class="cell">Tabletop gap: unclear authority</text>
</svg>
