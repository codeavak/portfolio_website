<svg width="1536" height="1024" viewBox="0 0 1536 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Security governance hierarchy</title>
  <desc id="heroDesc">Layered diagram showing policy, standards, procedures, and guidelines flowing from strategy to execution.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#075985"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1536" height="1024" fill="url(#bg)"/>
  <circle cx="1250" cy="190" r="220" fill="#93c5fd" fill-opacity="0.20"/>
  <circle cx="250" cy="920" r="280" fill="#7dd3fc" fill-opacity="0.18"/>

  <text x="120" y="160" font-size="72" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">CISSP Governance Stack</text>
  <text x="120" y="220" font-size="34" fill="#334155" font-family="Segoe UI, Arial, sans-serif">Policy -> Standards -> Procedures -> Guidelines</text>

  <g filter="url(#shadow)">
    <rect x="330" y="300" width="876" height="104" rx="20" fill="url(#layer1)"/>
    <rect x="300" y="440" width="936" height="104" rx="20" fill="url(#layer2)"/>
    <rect x="270" y="580" width="996" height="104" rx="20" fill="url(#layer3)"/>
    <rect x="240" y="720" width="1056" height="104" rx="20" fill="url(#layer4)"/>
  </g>

  <text x="768" y="368" text-anchor="middle" font-size="44" font-weight="700" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">POLICY | Leadership intent and direction</text>
  <text x="768" y="508" text-anchor="middle" font-size="42" font-weight="700" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">STANDARDS | Mandatory control baseline</text>
  <text x="768" y="648" text-anchor="middle" font-size="42" font-weight="700" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">PROCEDURES | Repeatable execution steps</text>
  <text x="768" y="788" text-anchor="middle" font-size="42" font-weight="700" fill="#082f49" font-family="Segoe UI, Arial, sans-serif">GUIDELINES | Recommended practice</text>

  <path d="M1365 338 L1420 338 L1420 790 L1365 790" fill="none" stroke="#1d4ed8" stroke-width="8"/>
  <path d="M1420 790 L1392 764" fill="none" stroke="#1d4ed8" stroke-width="8"/>
  <path d="M1420 790 L1448 764" fill="none" stroke="#1d4ed8" stroke-width="8"/>
  <text x="1456" y="570" transform="rotate(90 1456 570)" font-size="30" fill="#1e40af" font-weight="700" font-family="Segoe UI, Arial, sans-serif">From strategy to operations</text>
</svg>
