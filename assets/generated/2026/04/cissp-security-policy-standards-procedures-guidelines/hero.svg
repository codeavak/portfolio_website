  <text x="300" y="100" font-size="28" text-anchor="middle" fill="#2d3e50" font-weight="bold">Policy</text>
  <rect x="180" y="130" width="240" height="40" fill="#b3c6e0" stroke="#2d3e50" stroke-width="2" rx="8"/>
