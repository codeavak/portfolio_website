<svg width="1200" height="820" viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="mapTitle mapDesc">
  <title id="mapTitle">Remote access governance mapping</title>
  <desc id="mapDesc">Matrix showing policy, standards, procedures, and guidelines for a remote access hardening scenario.</desc>
  <defs>
    <linearGradient id="mapBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="820" fill="url(#mapBg)"/>
  <text x="60" y="80" font-size="46" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">Scenario: Remote Access Hardening</text>

  <rect x="60" y="120" width="1080" height="82" rx="14" fill="#0f172a"/>
  <text x="90" y="173" font-size="36" font-weight="700" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Policy</text>
  <text x="300" y="173" font-size="28" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif">Protect confidentiality, integrity, and availability of remote sessions.</text>

  <rect x="60" y="228" width="1080" height="172" rx="14" fill="#075985"/>
  <text x="90" y="280" font-size="34" font-weight="700" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Standards</text>
  <text x="300" y="280" font-size="27" fill="#e0f2fe" font-family="Segoe UI, Arial, sans-serif">MFA required for all remote access sessions.</text>
  <text x="300" y="322" font-size="27" fill="#e0f2fe" font-family="Segoe UI, Arial, sans-serif">Privileged access requires phishing-resistant factors.</text>
  <text x="300" y="364" font-size="27" fill="#e0f2fe" font-family="Segoe UI, Arial, sans-serif">Security logs must be centralized and retained by policy.</text>

  <rect x="60" y="426" width="1080" height="200" rx="14" fill="#0284c7"/>
  <text x="90" y="478" font-size="34" font-weight="700" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Procedures</text>
  <text x="300" y="478" font-size="27" fill="#ecfeff" font-family="Segoe UI, Arial, sans-serif">Enroll users in approved MFA authenticators.</text>
  <text x="300" y="520" font-size="27" fill="#ecfeff" font-family="Segoe UI, Arial, sans-serif">Provision and approve access with manager and security sign-off.</text>
  <text x="300" y="562" font-size="27" fill="#ecfeff" font-family="Segoe UI, Arial, sans-serif">Recover access safely for lost-device or account reset events.</text>
  <text x="300" y="604" font-size="27" fill="#ecfeff" font-family="Segoe UI, Arial, sans-serif">Document evidence for audits and incident reconstruction.</text>

  <rect x="60" y="652" width="1080" height="120" rx="14" fill="#7dd3fc"/>
  <text x="90" y="706" font-size="34" font-weight="700" fill="#0c4a6e" font-family="Segoe UI, Arial, sans-serif">Guidelines</text>
  <text x="300" y="706" font-size="27" fill="#082f49" font-family="Segoe UI, Arial, sans-serif">Prefer managed devices and segmented admin paths where feasible.</text>
  <text x="300" y="746" font-size="27" fill="#082f49" font-family="Segoe UI, Arial, sans-serif">Use proactive communication to reduce support friction during rollout.</text>
</svg>
