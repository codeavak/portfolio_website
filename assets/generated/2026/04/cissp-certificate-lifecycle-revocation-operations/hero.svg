<svg width="1536" height="1024" viewBox="0 0 1536 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CISSP #38 certificate lifecycle and revocation operations</title>
  <desc id="desc">A visual showing certificate issuance, monitoring, renewal, and revocation as an operational control loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="panel2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1536" height="1024" fill="url(#bg)"/>
  <circle cx="1250" cy="180" r="200" fill="#60a5fa" fill-opacity="0.18"/>
  <circle cx="260" cy="900" r="240" fill="#22d3ee" fill-opacity="0.14"/>

  <text x="100" y="125" font-size="58" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">CISSP #38</text>
  <text x="100" y="196" font-size="46" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">Certificate Lifecycle and Revocation</text>
  <text x="100" y="248" font-size="46" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">Are Operational Controls</text>

  <g filter="url(#shadow)">
    <rect x="150" y="330" width="560" height="520" rx="26" fill="url(#panel)"/>
    <rect x="826" y="330" width="560" height="520" rx="26" fill="url(#panel2)"/>
  </g>

  <text x="430" y="410" text-anchor="middle" font-size="36" font-weight="700" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif">STATIC VIEW</text>
  <text x="430" y="470" text-anchor="middle" font-size="28" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif">Issue once</text>
  <text x="430" y="515" text-anchor="middle" font-size="28" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif">Track manually</text>
  <text x="430" y="560" text-anchor="middle" font-size="28" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif">React to outages</text>

  <text x="1106" y="410" text-anchor="middle" font-size="36" font-weight="700" fill="#ecfeff" font-family="Segoe UI, Arial, sans-serif">CONTROL LOOP</text>
  <text x="1106" y="470" text-anchor="middle" font-size="28" fill="#ccfbf1" font-family="Segoe UI, Arial, sans-serif">Inventory + ownership</text>
  <text x="1106" y="515" text-anchor="middle" font-size="28" fill="#ccfbf1" font-family="Segoe UI, Arial, sans-serif">Automated renewal</text>
  <text x="1106" y="560" text-anchor="middle" font-size="28" fill="#ccfbf1" font-family="Segoe UI, Arial, sans-serif">Fast revocation</text>

  <path d="M705 590 C760 590 770 590 826 590" stroke="#0f172a" stroke-width="8" fill="none"/>
  <path d="M807 570 L832 590 L807 610" stroke="#0f172a" stroke-width="8" fill="none"/>
</svg>
