<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Certificate lifecycle control loop</title>
  <desc id="desc">A six-step cycle showing inventory, issuance, deployment, monitoring, renewal, and revocation response.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="60" y="82" font-size="42" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">Certificate Lifecycle as a Security Control Loop</text>

  <rect x="80" y="170" width="220" height="90" rx="14" fill="#0f172a"/>
  <text x="190" y="226" text-anchor="middle" font-size="25" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Inventory</text>

  <rect x="350" y="170" width="220" height="90" rx="14" fill="#1e3a8a"/>
  <text x="460" y="226" text-anchor="middle" font-size="25" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Issue</text>

  <rect x="620" y="170" width="220" height="90" rx="14" fill="#0369a1"/>
  <text x="730" y="226" text-anchor="middle" font-size="25" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Deploy</text>

  <rect x="890" y="170" width="220" height="90" rx="14" fill="#0f766e"/>
  <text x="1000" y="226" text-anchor="middle" font-size="25" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Monitor</text>

  <rect x="350" y="470" width="220" height="90" rx="14" fill="#7c2d12"/>
  <text x="460" y="526" text-anchor="middle" font-size="25" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Renew</text>

  <rect x="620" y="470" width="220" height="90" rx="14" fill="#7f1d1d"/>
  <text x="730" y="526" text-anchor="middle" font-size="25" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Revoke + Recover</text>

  <g stroke="#0f172a" stroke-width="5" fill="none" marker-end="url(#arrow)">
    <line x1="300" y1="215" x2="350" y2="215"/>
    <line x1="570" y1="215" x2="620" y2="215"/>
    <line x1="840" y1="215" x2="890" y2="215"/>
    <path d="M1000 260 C1000 350 850 420 760 470"/>
    <line x1="620" y1="515" x2="570" y2="515"/>
    <path d="M350 515 C255 468 170 360 170 260"/>
  </g>

  <text x="60" y="700" font-size="27" fill="#334155" font-family="Segoe UI, Arial, sans-serif">Mature programs treat certificates as continuously managed identity assets, not one-time setup tasks.</text>
</svg>
