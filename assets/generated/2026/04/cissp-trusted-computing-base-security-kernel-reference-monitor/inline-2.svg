  <text x="710" y="150" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffffff">Hypervisor isolation</text>
  <text x="710" y="196" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffffff">Secure boot chain</text>
  <text x="710" y="242" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffffff">Identity / policy engine</text>
  <text x="710" y="288" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffffff">TPM or HSM-backed trust</text>

  <text x="500" y="408" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#2d5a8a" letter-spacing="3">CISSP SERIES  ·  POST #42</text>
