  <text x="450" y="66" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Teach → Reinforce → Report → Learn → Improve</text>

  <circle cx="450" cy="215" r="118" fill="none" stroke="#334155" stroke-width="2"/>

  <rect x="375" y="88" width="150" height="50" rx="8" fill="#1d4ed8"/>
