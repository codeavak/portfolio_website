  <rect x="80" y="110" width="220" height="170" rx="10" fill="#14213d" stroke="#3b82f6"/>
  <text x="190" y="145" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#93c5fd" text-anchor="middle">AWARENESS</text>
  <text x="190" y="172" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Broad recognition</text>
