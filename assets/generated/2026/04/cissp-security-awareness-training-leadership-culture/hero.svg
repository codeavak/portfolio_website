  <rect x="600" y="110" width="220" height="170" rx="10" fill="#14272a" stroke="#14b8a6"/>
  <text x="710" y="145" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#5eead4" text-anchor="middle">EDUCATION</text>
