  <text x="450" y="172" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Role-based practice</text>
  <text x="450" y="190" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">for real tasks</text>
  <text x="450" y="220" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Verify requests</text>
