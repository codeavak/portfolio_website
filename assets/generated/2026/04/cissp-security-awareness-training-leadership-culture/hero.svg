  <text x="710" y="238" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Adapt under change</text>

  <rect x="110" y="325" width="680" height="78" rx="12" fill="#1e293b" stroke="#a855f7"/>
