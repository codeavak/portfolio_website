  <text x="190" y="220" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Spot risk</text>
  <text x="190" y="238" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Know when to report</text>

