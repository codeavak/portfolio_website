<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Biometrics tradeoff hero image</title>
  <desc id="desc">Abstract illustration of fingerprint and face recognition balanced against convenience, privacy, and error-rate tradeoffs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#111c34" stop-opacity="0.92"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="120" r="160" fill="#60a5fa" opacity="0.12"/>
  <circle cx="170" cy="560" r="190" fill="#22c55e" opacity="0.1"/>

  <rect x="60" y="60" width="1080" height="510" rx="28" fill="url(#card)" stroke="#60a5fa" stroke-opacity="0.25"/>

  <text x="100" y="150" fill="#e5eefc" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">CISSP #13</text>
  <text x="100" y="210" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">Biometrics Are a Tradeoff,</text>
  <text x="100" y="258" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">Not Magic</text>
  <text x="100" y="315" fill="#bfd7ff" font-family="Segoe UI, Arial, sans-serif" font-size="22">Error rates, privacy, fallback, and assurance all matter.</text>

  <g transform="translate(760 125)">
    <circle cx="145" cy="130" r="105" fill="#0f172a" stroke="#93c5fd" stroke-width="3"/>
    <circle cx="145" cy="92" r="32" fill="none" stroke="#93c5fd" stroke-width="6"/>
    <path d="M88 165c16-30 46-48 57-48s41 18 57 48" fill="none" stroke="#93c5fd" stroke-width="6" stroke-linecap="round"/>
    <rect x="54" y="192" width="182" height="22" rx="11" fill="#1d4ed8" opacity="0.85"/>
  </g>

  <g transform="translate(650 355)">
    <rect x="0" y="0" width="180" height="150" rx="20" fill="#0f172a" stroke="#34d399" stroke-width="3"/>
    <path d="M90 25
             c-28 0-50 22-50 50
             c0 12 5 22 13 30
             c8 8 12 16 12 26
             m25-106
             c28 0 50 22 50 50
             c0 12-5 22-13 30
             c-8 8-12 16-12 26
             m-37-92
             c-12 7-20 20-20 35
             c0 8 3 15 8 20
             c5 5 8 12 8 20
             m24-75
             c12 7 20 20 20 35
             c0 8-3 15-8 20
             c-5 5-8 12-8 20
             m-12-60
             c0 8-6 14-14 18
             c-8 4-12 10-12 18
             c0 8 6 14 14 18
             c8 4 12 10 12 18" fill="none" stroke="#34d399" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">
    <circle cx="925" cy="420" r="68" fill="#111827" stroke="#f59e0b" stroke-width="3"/>
    <text x="925" y="413" text-anchor="middle" fill="#fde68a">Convenience</text>
    <text x="925" y="437" text-anchor="middle" fill="#fde68a">↑</text>

    <circle cx="1045" cy="470" r="68" fill="#111827" stroke="#f87171" stroke-width="3"/>
    <text x="1045" y="463" text-anchor="middle" fill="#fecaca">Privacy</text>
    <text x="1045" y="487" text-anchor="middle" fill="#fecaca">risk</text>

    <circle cx="995" cy="335" r="68" fill="#111827" stroke="#60a5fa" stroke-width="3"/>
    <text x="995" y="328" text-anchor="middle" fill="#bfdbfe">Error</text>
    <text x="995" y="352" text-anchor="middle" fill="#bfdbfe">rates</text>
  </g>
</svg>
