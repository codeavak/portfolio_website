<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">CISSP RTO and RPO recovery priorities</title>
  <desc id="desc">Business services with different RTO and RPO targets feeding recovery sequencing decisions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2430"/>
      <stop offset="100%" stop-color="#1a4a5a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <style>
      .title{font:700 56px 'Segoe UI',Tahoma,sans-serif;fill:#f4fbff}
      .sub{font:500 22px 'Segoe UI',Tahoma,sans-serif;fill:#d6e9f3}
      .label{font:600 24px 'Segoe UI',Tahoma,sans-serif;fill:#0b2a36}
      .small{font:500 18px 'Segoe UI',Tahoma,sans-serif;fill:#0b2a36}
      .foot{font:600 26px 'Segoe UI',Tahoma,sans-serif;fill:#e9f7ff}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1410" cy="170" r="250" fill="#5cc0ad" opacity="0.18"/>
  <circle cx="180" cy="760" r="260" fill="#5ca9ff" opacity="0.15"/>

  <text x="90" y="120" class="title">RTO and RPO Drive Recovery Priorities</text>
  <text x="90" y="162" class="sub">CISSP #25 | Business impact first, technical sequencing second</text>

  <rect x="85" y="220" width="1430" height="560" rx="26" fill="url(#panel)" stroke="#c2e5f7" stroke-opacity="0.35"/>

  <rect x="130" y="300" width="360" height="130" rx="18" fill="#8de0f4"/>
  <text x="162" y="350" class="label">Payment API</text>
  <text x="162" y="382" class="small">RTO 30m | RPO 5m</text>

  <rect x="130" y="470" width="360" height="130" rx="18" fill="#b2e9bb"/>
  <text x="162" y="520" class="label">Support Knowledge Base</text>
  <text x="162" y="552" class="small">RTO 2h | RPO 30m</text>

  <rect x="130" y="640" width="360" height="110" rx="18" fill="#f4dd9e"/>
  <text x="162" y="688" class="label">Internal Reporting</text>
  <text x="162" y="718" class="small">RTO 24h | RPO 4h</text>

  <rect x="650" y="420" width="290" height="160" rx="22" fill="#ffffff"/>
  <text x="700" y="485" class="label">Recovery Board</text>
  <text x="700" y="518" class="small">Prioritize by impact</text>
  <text x="700" y="548" class="small">and objective strictness</text>

  <rect x="1100" y="300" width="360" height="130" rx="18" fill="#7bd3cb"/>
  <text x="1132" y="350" class="label">First: Revenue Flow</text>
  <text x="1132" y="382" class="small">Protect integrity, reduce outage</text>

  <rect x="1100" y="470" width="360" height="130" rx="18" fill="#98c5ff"/>
  <text x="1132" y="520" class="label">Second: Customer Support</text>
  <text x="1132" y="552" class="small">Stabilize service operations</text>

  <rect x="1100" y="640" width="360" height="110" rx="18" fill="#ffc5a8"/>
  <text x="1132" y="688" class="label">Then: Internal Reporting</text>
  <text x="1132" y="718" class="small">Restore lower-impact workloads</text>

  <path d="M490 365 C560 365, 595 450, 650 485" stroke="#d5effc" stroke-width="7" fill="none"/>
  <path d="M490 535 C570 535, 595 510, 650 510" stroke="#d5effc" stroke-width="7" fill="none"/>
  <path d="M490 695 C570 695, 595 560, 650 535" stroke="#d5effc" stroke-width="7" fill="none"/>

  <path d="M940 500 C1025 500, 1038 365, 1100 365" stroke="#d5effc" stroke-width="7" fill="none"/>
  <path d="M940 500 C1038 500, 1038 535, 1100 535" stroke="#d5effc" stroke-width="7" fill="none"/>
  <path d="M940 500 C1025 500, 1038 695, 1100 695" stroke="#d5effc" stroke-width="7" fill="none"/>

  <text x="90" y="842" class="foot">When objectives are explicit, teams recover critical services faster and with less confusion.</text>
</svg>
