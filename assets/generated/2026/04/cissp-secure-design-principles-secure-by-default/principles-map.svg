<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Secure design principles map</title>
  <desc id="desc">A hub-and-spoke diagram connecting secure design principles to practical engineering decisions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f8fc"/>
      <stop offset="100%" stop-color="#e4eef8"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#164a70"/>
      <stop offset="100%" stop-color="#248aa0"/>
    </linearGradient>
    <style>
      .title { font: 700 44px 'Segoe UI', Arial, sans-serif; fill: #10263f; }
      .cardTitle { font: 700 26px 'Segoe UI', Arial, sans-serif; fill: #17324f; }
      .cardText { font: 400 20px 'Segoe UI', Arial, sans-serif; fill: #33516b; }
      .hubTitle { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .hubText { font: 400 20px 'Segoe UI', Arial, sans-serif; fill: #e9fbff; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <text x="80" y="90" class="title">How classic design principles show up in modern engineering</text>

  <line x1="700" y1="430" x2="320" y2="250" stroke="#5cbcff" stroke-width="4"/>
  <line x1="700" y1="430" x2="1080" y2="250" stroke="#5cbcff" stroke-width="4"/>
  <line x1="700" y1="430" x2="250" y2="620" stroke="#5cbcff" stroke-width="4"/>
  <line x1="700" y1="430" x2="1150" y2="620" stroke="#5cbcff" stroke-width="4"/>
  <line x1="700" y1="430" x2="700" y2="740" stroke="#5cbcff" stroke-width="4"/>

  <circle cx="700" cy="430" r="150" fill="url(#hub)"/>
  <text x="700" y="410" text-anchor="middle" class="hubTitle">Secure design</text>
  <text x="700" y="448" text-anchor="middle" class="hubTitle">mindset</text>
  <text x="700" y="486" text-anchor="middle" class="hubText">Reduce risk upstream</text>

  <rect x="110" y="160" rx="20" ry="20" width="420" height="140" fill="#ffffff" stroke="#b9d4ec" stroke-width="2"/>
  <text x="145" y="210" class="cardTitle">Secure defaults</text>
  <text x="145" y="248" class="cardText">New features start closed,</text>
  <text x="145" y="278" class="cardText">not open for convenience.</text>

  <rect x="870" y="160" rx="20" ry="20" width="420" height="140" fill="#ffffff" stroke="#b9d4ec" stroke-width="2"/>
  <text x="905" y="210" class="cardTitle">Complete mediation</text>
  <text x="905" y="248" class="cardText">Authorization is checked at the</text>
  <text x="905" y="278" class="cardText">resource, not only at login.</text>

  <rect x="70" y="550" rx="20" ry="20" width="420" height="140" fill="#ffffff" stroke="#b9d4ec" stroke-width="2"/>
  <text x="105" y="600" class="cardTitle">Least functionality</text>
  <text x="105" y="638" class="cardText">Unused admin paths, ports, and</text>
  <text x="105" y="668" class="cardText">legacy features get removed.</text>

  <rect x="910" y="550" rx="20" ry="20" width="420" height="140" fill="#ffffff" stroke="#b9d4ec" stroke-width="2"/>
  <text x="945" y="600" class="cardTitle">Trust boundaries</text>
  <text x="945" y="638" class="cardText">Internet, admin, tenant, and prod</text>
  <text x="945" y="668" class="cardText">zones are treated differently.</text>

  <rect x="490" y="720" rx="20" ry="20" width="420" height="120" fill="#ffffff" stroke="#b9d4ec" stroke-width="2"/>
  <text x="525" y="770" class="cardTitle">Open design</text>
  <text x="525" y="808" class="cardText">Real controls hold even when the design is known.</text>
</svg>
