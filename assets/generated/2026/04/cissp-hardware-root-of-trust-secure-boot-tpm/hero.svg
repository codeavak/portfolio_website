  <line x1="768" y1="700" x2="768" y2="640" stroke="#4da6ff" stroke-width="4" marker-end="url(#arrowB)"/>
  <line x1="768" y1="470" x2="768" y2="410" stroke="#4da6ff" stroke-width="4" marker-end="url(#arrowB)"/>

  <circle cx="1210" cy="316" r="58" fill="#0a8a3a" stroke="#2ecc71" stroke-width="2"/>
  <text x="1210" y="312" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">ATTEST</text>
  <text x="1210" y="334" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">STATE</text>

  <text x="768" y="988" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#2d5a8a" letter-spacing="4">CISSP SERIES  ·  POST #44</text>
