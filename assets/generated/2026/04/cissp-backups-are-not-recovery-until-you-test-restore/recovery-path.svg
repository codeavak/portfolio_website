<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-labelledby="title desc">
  <title id="title">Recovery path diagram</title>
  <desc id="desc">Flow diagram showing that backup copies must move through isolation, clean rebuild, restore, and validation before business recovery is complete.</desc>
  <rect width="1000" height="600" fill="#0f172a" rx="24"/>
  <text x="60" y="70" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Backup Job Success Is Only the First Step</text>
  <text x="60" y="102" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Recovery is a chain: copy, isolate, rebuild, restore, and verify.</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    <rect x="70" y="180" width="170" height="120" rx="18" fill="#111827" stroke="#22c55e"/>
    <text x="155" y="220" text-anchor="middle" fill="#bbf7d0" font-size="22">1. Protected</text>
    <text x="155" y="248" text-anchor="middle" fill="#bbf7d0" font-size="22">backup copy</text>
    <text x="155" y="280" text-anchor="middle" fill="#cbd5e1" font-size="14">offline / isolated</text>

    <rect x="290" y="180" width="170" height="120" rx="18" fill="#111827" stroke="#60a5fa"/>
    <text x="375" y="220" text-anchor="middle" fill="#bfdbfe" font-size="22">2. Clean</text>
    <text x="375" y="248" text-anchor="middle" fill="#bfdbfe" font-size="22">rebuild target</text>
    <text x="375" y="280" text-anchor="middle" fill="#cbd5e1" font-size="14">safe landing zone</text>

    <rect x="510" y="180" width="190" height="120" rx="18" fill="#111827" stroke="#f59e0b"/>
    <text x="605" y="220" text-anchor="middle" fill="#fde68a" font-size="22">3. Restore data,</text>
    <text x="605" y="248" text-anchor="middle" fill="#fde68a" font-size="22">configs, secrets</text>
    <text x="605" y="280" text-anchor="middle" fill="#cbd5e1" font-size="14">not just the database</text>

    <rect x="750" y="180" width="180" height="120" rx="18" fill="#111827" stroke="#a78bfa"/>
    <text x="840" y="220" text-anchor="middle" fill="#ddd6fe" font-size="22">4. Validate</text>
    <text x="840" y="248" text-anchor="middle" fill="#ddd6fe" font-size="22">service recovery</text>
    <text x="840" y="280" text-anchor="middle" fill="#cbd5e1" font-size="14">integrity + business signoff</text>
  </g>

  <g stroke="#94a3b8" stroke-width="4" fill="none">
    <line x1="240" y1="240" x2="290" y2="240"/>
    <line x1="460" y1="240" x2="510" y2="240"/>
    <line x1="700" y1="240" x2="750" y2="240"/>
  </g>

  <rect x="90" y="380" width="820" height="120" rx="18" fill="#0b1220" stroke="#475569"/>
  <text x="120" y="420" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Why teams get surprised</text>
  <text x="120" y="452" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="16">• The copy exists, but the restore has not been rehearsed end to end.</text>
  <text x="120" y="478" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="16">• Backup access, secrets, or dependencies fail at the worst moment.</text>
</svg>
