<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Security testing comparison hero image</title>
  <desc id="desc">Illustration showing vulnerability assessment, penetration testing, audit, log review, and control validation as distinct testing methods for different questions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#08101d" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#12233f" stop-opacity="0.94"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1025" cy="110" r="160" fill="#60a5fa" opacity="0.1"/>
  <circle cx="160" cy="520" r="170" fill="#22c55e" opacity="0.08"/>
  <rect x="60" y="60" width="1080" height="510" rx="28" fill="url(#panel)" stroke="#93c5fd" stroke-opacity="0.25"/>

  <text x="100" y="145" fill="#e5eefc" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">CISSP #15</text>
  <text x="100" y="205" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">Security Testing</text>
  <text x="100" y="250" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">Is Not One Thing</text>
  <text x="100" y="305" fill="#c7dbff" font-family="Segoe UI, Arial, sans-serif" font-size="22">Scan, audit, pen test, log review, and control validation answer different questions.</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    <rect x="690" y="95" width="170" height="62" rx="14" fill="#111827" stroke="#34d399"/>
    <text x="775" y="132" text-anchor="middle" fill="#bbf7d0">Vuln assessment</text>

    <rect x="900" y="145" width="170" height="62" rx="14" fill="#111827" stroke="#60a5fa"/>
    <text x="985" y="182" text-anchor="middle" fill="#bfdbfe">Pen test</text>

    <rect x="855" y="240" width="170" height="62" rx="14" fill="#111827" stroke="#f59e0b"/>
    <text x="940" y="277" text-anchor="middle" fill="#fde68a">Audit</text>

    <rect x="700" y="330" width="170" height="62" rx="14" fill="#111827" stroke="#f87171"/>
    <text x="785" y="367" text-anchor="middle" fill="#fecaca">Log review</text>

    <rect x="900" y="385" width="170" height="62" rx="14" fill="#111827" stroke="#a78bfa"/>
    <text x="985" y="422" text-anchor="middle" fill="#ddd6fe">Control validation</text>

    <circle cx="850" cy="250" r="52" fill="#0f172a" stroke="#93c5fd" stroke-width="3"/>
    <text x="850" y="244" text-anchor="middle" fill="#f8fafc" font-size="15">Different</text>
    <text x="850" y="266" text-anchor="middle" fill="#f8fafc" font-size="15">questions</text>

    <line x1="820" y1="210" x2="790" y2="157" stroke="#34d399" stroke-width="4"/>
    <line x1="900" y1="220" x2="930" y2="200" stroke="#60a5fa" stroke-width="4"/>
    <line x1="900" y1="250" x2="855" y2="250" stroke="#f59e0b" stroke-width="4"/>
    <line x1="820" y1="290" x2="790" y2="330" stroke="#f87171" stroke-width="4"/>
    <line x1="895" y1="295" x2="930" y2="385" stroke="#a78bfa" stroke-width="4"/>
  </g>
</svg>
