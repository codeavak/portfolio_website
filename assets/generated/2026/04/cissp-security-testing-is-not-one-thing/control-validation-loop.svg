<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-labelledby="title desc">
  <title id="title">Control validation loop</title>
  <desc id="desc">Diagram showing a continuous loop of preventive controls, detective controls, testing, remediation, and revalidation.</desc>
  <rect width="1000" height="600" fill="#0b1220" rx="24"/>
  <text x="60" y="70" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Good Security Testing Is a Loop</text>
  <text x="60" y="102" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Validate, learn, fix, and validate again.</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">
    <circle cx="500" cy="300" r="72" fill="#111827" stroke="#93c5fd" stroke-width="3"/>
    <text x="500" y="294" text-anchor="middle" fill="#f8fafc">Control</text>
    <text x="500" y="320" text-anchor="middle" fill="#f8fafc">effectiveness</text>

    <rect x="160" y="110" width="180" height="70" rx="16" fill="#111827" stroke="#34d399"/>
    <text x="250" y="152" text-anchor="middle" fill="#bbf7d0">Preventive controls</text>

    <rect x="660" y="110" width="180" height="70" rx="16" fill="#111827" stroke="#f87171"/>
    <text x="750" y="152" text-anchor="middle" fill="#fecaca">Detective controls</text>

    <rect x="690" y="400" width="150" height="70" rx="16" fill="#111827" stroke="#f59e0b"/>
    <text x="765" y="442" text-anchor="middle" fill="#fde68a">Testing</text>

    <rect x="160" y="400" width="150" height="70" rx="16" fill="#111827" stroke="#a78bfa"/>
    <text x="235" y="442" text-anchor="middle" fill="#ddd6fe">Remediation</text>
  </g>

  <g stroke-width="6" fill="none">
    <path d="M340 145 C 420 100, 580 100, 660 145" stroke="#34d399" marker-end="url(#m1)"/>
    <path d="M750 180 C 840 230, 840 340, 770 400" stroke="#f87171" marker-end="url(#m2)"/>
    <path d="M690 440 C 600 510, 400 510, 310 440" stroke="#f59e0b" marker-end="url(#m3)"/>
    <path d="M190 400 C 120 335, 125 220, 200 170" stroke="#a78bfa" marker-end="url(#m4)"/>
  </g>

  <defs>
    <marker id="m1" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#34d399"/></marker>
    <marker id="m2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#f87171"/></marker>
    <marker id="m3" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#f59e0b"/></marker>
    <marker id="m4" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#a78bfa"/></marker>
  </defs>
</svg>
