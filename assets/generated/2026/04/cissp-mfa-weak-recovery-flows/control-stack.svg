<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" role="img" aria-labelledby="title desc">
  <title id="title">Identity control stack for strong MFA</title>
  <desc id="desc">Layered diagram showing phishing-resistant sign-in, step-up verification, secure recovery, and notifications and audit.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b132b"/>
      <stop offset="100%" stop-color="#1f4068"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="800" fill="url(#bg)"/>
  <text x="90" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="800" fill="#ffffff">A stronger identity control stack</text>
  <text x="90" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#d7e6ff">Good sign-in is only one layer. Mature assurance needs the full stack.</text>

  <rect x="160" y="180" rx="28" ry="28" width="1080" height="96" fill="#1c7ed6"/>
  <text x="700" y="222" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff">1. Phishing-resistant sign-in</text>
  <text x="700" y="252" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#eaf4ff">Passkeys, security keys, stronger assurance matched to risk</text>

  <rect x="210" y="310" rx="28" ry="28" width="980" height="96" fill="#2a9d8f"/>
  <text x="700" y="352" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff">2. Step-up for risky actions</text>
  <text x="700" y="382" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#effffb">Disable MFA, export data, admin changes, financial approvals</text>

  <rect x="260" y="440" rx="28" ry="28" width="880" height="96" fill="#f4a261"/>
  <text x="700" y="482" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff">3. Secure recovery and factor changes</text>
  <text x="700" y="512" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#fff8ef">Reauthentication, delays, approvals, multiple recovery methods</text>

  <rect x="310" y="570" rx="28" ry="28" width="780" height="96" fill="#7b2cbf"/>
  <text x="700" y="612" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff">4. Notifications, logging, and review</text>
  <text x="700" y="642" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#f5ecff">Out-of-band alerts, lifecycle audit trail, periodic review</text>

  <path d="M700 276 v24" stroke="#d9e8ff" stroke-width="6" stroke-linecap="round"/>
  <path d="M700 406 v24" stroke="#d9e8ff" stroke-width="6" stroke-linecap="round"/>
  <path d="M700 536 v24" stroke="#d9e8ff" stroke-width="6" stroke-linecap="round"/>
</svg>