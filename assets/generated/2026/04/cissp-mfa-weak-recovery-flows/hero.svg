<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">MFA and account recovery security illustration</title>
  <desc id="desc">A dark blue illustration showing a secure MFA sign-in path and a weaker recovery side door.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081225"/>
      <stop offset="100%" stop-color="#183b6b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13294b"/>
      <stop offset="100%" stop-color="#1d3f73"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1290" cy="140" r="180" fill="#4cc9f0" opacity="0.12"/>
  <circle cx="260" cy="780" r="160" fill="#80ed99" opacity="0.10"/>

  <rect x="100" y="86" rx="24" ry="24" width="170" height="44" fill="#0f2747" stroke="#4cc9f0"/>
  <text x="185" y="114" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#dff6ff">CISSP #12</text>

  <text x="100" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="66" font-weight="800" fill="#ffffff">MFA Is Not Enough</text>
  <text x="100" y="275" font-family="Segoe UI, Arial, sans-serif" font-size="66" font-weight="800" fill="#ffffff">if Recovery Is Weak</text>
  <text x="100" y="336" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#c7d9f3">Identity assurance is shaped by the weakest account lifecycle path.</text>

  <rect x="100" y="410" rx="28" ry="28" width="580" height="280" fill="url(#card)" stroke="#62d2a2" stroke-width="2"/>
  <rect x="760" y="410" rx="28" ry="28" width="740" height="280" fill="url(#card)" stroke="#ffb86b" stroke-width="2"/>

  <circle cx="185" cy="500" r="42" fill="#123b2e"/>
  <path d="M168 502 l12 12 l25 -28" fill="none" stroke="#80ed99" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="245" y="492" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Primary sign-in</text>
  <text x="145" y="560" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#d8e7ff">Password + passkey/security key</text>
  <text x="145" y="600" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#d8e7ff">Strong assurance at the front door</text>
  <rect x="145" y="628" rx="14" ry="14" width="220" height="38" fill="#153f32"/>
  <text x="255" y="654" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700" fill="#a8f0c6">Attacker blocked</text>

  <circle cx="845" cy="500" r="42" fill="#4d2d12"/>
  <path d="M832 486 h26 v18" fill="none" stroke="#ffd089" stroke-width="7" stroke-linecap="round"/>
  <circle cx="845" cy="525" r="5" fill="#ffd089"/>
  <text x="905" y="492" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Recovery / factor change</text>
  <text x="805" y="560" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#d8e7ff">Lost phone flow, help-desk reset, add new device</text>
  <text x="805" y="600" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#d8e7ff">If weaker than login, the whole system is weaker</text>
  <rect x="805" y="628" rx="14" ry="14" width="250" height="38" fill="#5a3715"/>
  <text x="930" y="654" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700" fill="#ffe0b3">Risk moves here</text>

  <rect x="100" y="740" rx="24" ry="24" width="1400" height="92" fill="#0d1d36" stroke="#345a8a"/>
  <text x="800" y="796" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Real identity strength = the weakest path to account access</text>
</svg>