<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <!-- Background -->
  <rect width="900" height="480" fill="#0f172a"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" fill="#94a3b8" font-size="15" font-weight="600" letter-spacing="1">CRYPTOGRAPHIC PRIMITIVES — EACH SOLVES A SPECIFIC PROBLEM</text>

  <!-- ===== ROW 1: Symmetric Encryption ===== -->
  <rect x="30" y="55" width="840" height="80" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <!-- Goal -->
  <rect x="50" y="72" width="140" height="46" rx="6" fill="#0c2340" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="120" y="91" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">CONFIDENTIALITY</text>
  <text x="120" y="107" text-anchor="middle" fill="#3b82f6" font-size="10">Only intended recipient</text>
  <text x="120" y="119" text-anchor="middle" fill="#3b82f6" font-size="10">can read the data</text>
  <!-- Arrow -->
  <line x1="192" y1="95" x2="240" y2="95" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Primitive -->
  <rect x="242" y="72" width="180" height="46" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="332" y="92" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">Symmetric Encryption</text>
  <text x="332" y="108" text-anchor="middle" fill="#93c5fd" font-size="10">AES-256, ChaCha20</text>
  <!-- Arrow -->
  <text x="445" y="99" text-anchor="middle" fill="#475569" font-size="18">→</text>
  <!-- Trade-off note -->
  <rect x="460" y="72" width="190" height="46" rx="6" fill="#1a1a2e" stroke="#475569" stroke-width="1"/>
  <text x="555" y="90" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">Fast. Great for bulk data.</text>
  <text x="555" y="104" text-anchor="middle" fill="#64748b" font-size="10">Key distribution is the</text>
  <text x="555" y="116" text-anchor="middle" fill="#64748b" font-size="10">fundamental challenge.</text>
  <!-- Does not provide -->
  <rect x="665" y="72" width="185" height="46" rx="6" fill="#3b0f0f" stroke="#7f1d1d" stroke-width="1"/>
  <text x="757" y="88" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600">Does NOT provide:</text>
  <text x="757" y="103" text-anchor="middle" fill="#fca5a5" font-size="10">key distribution, integrity,</text>
  <text x="757" y="116" text-anchor="middle" fill="#fca5a5" font-size="10">authenticity, non-repudiation</text>

  <!-- ===== ROW 2: Hashing ===== -->
  <rect x="30" y="148" width="840" height="80" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="50" y="165" width="140" height="46" rx="6" fill="#0a2e1a" stroke="#15803d" stroke-width="1.5"/>
  <text x="120" y="184" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700">INTEGRITY</text>
  <text x="120" y="200" text-anchor="middle" fill="#22c55e" font-size="10">Data has not been</text>
  <text x="120" y="212" text-anchor="middle" fill="#22c55e" font-size="10">altered</text>
  <line x1="192" y1="188" x2="240" y2="188" stroke="#475569" stroke-width="2"/>
  <text x="216" y="183" fill="#475569" font-size="18">→</text>
  <rect x="242" y="165" width="180" height="46" rx="6" fill="#14291e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="332" y="185" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">Hashing</text>
  <text x="332" y="201" text-anchor="middle" fill="#86efac" font-size="10">SHA-256, SHA-3, bcrypt</text>
  <text x="445" y="192" text-anchor="middle" fill="#475569" font-size="18">→</text>
  <rect x="460" y="165" width="190" height="46" rx="6" fill="#1a1a2e" stroke="#475569" stroke-width="1"/>
  <text x="555" y="183" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">One-directional. Fixed-length</text>
  <text x="555" y="197" text-anchor="middle" fill="#64748b" font-size="10">digest. Anyone can compute</text>
  <text x="555" y="210" text-anchor="middle" fill="#64748b" font-size="10">a hash — no secret key.</text>
  <rect x="665" y="165" width="185" height="46" rx="6" fill="#3b0f0f" stroke="#7f1d1d" stroke-width="1"/>
  <text x="757" y="181" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600">Does NOT provide:</text>
  <text x="757" y="196" text-anchor="middle" fill="#fca5a5" font-size="10">authenticity (no key = anyone</text>
  <text x="757" y="209" text-anchor="middle" fill="#fca5a5" font-size="10">can compute it)</text>

  <!-- ===== ROW 3: HMAC ===== -->
  <rect x="30" y="241" width="840" height="80" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <!-- Two goals stacked -->
  <rect x="50" y="253" width="140" height="56" rx="6" fill="#1a2614" stroke="#65a30d" stroke-width="1.5"/>
  <text x="120" y="271" text-anchor="middle" fill="#86efac" font-size="10" font-weight="700">INTEGRITY</text>
  <text x="120" y="284" text-anchor="middle" fill="#bef264" font-size="10" font-weight="700">+ AUTHENTICITY</text>
  <text x="120" y="300" text-anchor="middle" fill="#84cc16" font-size="9">came from key holder</text>
  <line x1="192" y1="281" x2="240" y2="281" stroke="#475569" stroke-width="2"/>
  <text x="216" y="276" fill="#475569" font-size="18">→</text>
  <rect x="242" y="253" width="180" height="56" rx="6" fill="#1e2e14" stroke="#65a30d" stroke-width="1.5"/>
  <text x="332" y="274" text-anchor="middle" fill="#bef264" font-size="12" font-weight="700">HMAC</text>
  <text x="332" y="290" text-anchor="middle" fill="#a3e635" font-size="10">Hash + shared secret key</text>
  <text x="332" y="303" text-anchor="middle" fill="#86efac" font-size="10">HS256 JWT signing</text>
  <text x="445" y="281" text-anchor="middle" fill="#475569" font-size="18">→</text>
  <rect x="460" y="253" width="190" height="56" rx="6" fill="#1a1a2e" stroke="#475569" stroke-width="1"/>
  <text x="555" y="271" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">Both parties share the key.</text>
  <text x="555" y="285" text-anchor="middle" fill="#64748b" font-size="10">Either could have produced</text>
  <text x="555" y="299" text-anchor="middle" fill="#64748b" font-size="10">the MAC. Not asymmetric.</text>
  <rect x="665" y="253" width="185" height="56" rx="6" fill="#3b0f0f" stroke="#7f1d1d" stroke-width="1"/>
  <text x="757" y="271" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600">Does NOT provide:</text>
  <text x="757" y="286" text-anchor="middle" fill="#fca5a5" font-size="10">non-repudiation</text>
  <text x="757" y="299" text-anchor="middle" fill="#fca5a5" font-size="10">(shared key = either party)</text>

  <!-- ===== ROW 4: Digital Signature ===== -->
  <rect x="30" y="334" width="840" height="88" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="50" y="345" width="140" height="66" rx="6" fill="#2d1b69" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="120" y="362" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="700">INTEGRITY</text>
  <text x="120" y="376" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">+ AUTHENTICITY</text>
  <text x="120" y="390" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="700">+ NON-REPUDIATION</text>
  <text x="120" y="403" text-anchor="middle" fill="#7c3aed" font-size="9">sender cannot deny</text>
  <line x1="192" y1="378" x2="240" y2="378" stroke="#475569" stroke-width="2"/>
  <text x="216" y="373" fill="#475569" font-size="18">→</text>
  <rect x="242" y="345" width="180" height="66" rx="6" fill="#1e1b4b" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="332" y="367" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700">Digital Signature</text>
  <text x="332" y="383" text-anchor="middle" fill="#c4b5fd" font-size="10">Asymmetric: private key signs</text>
  <text x="332" y="397" text-anchor="middle" fill="#c4b5fd" font-size="10">public key verifies</text>
  <text x="332" y="410" text-anchor="middle" fill="#8b5cf6" font-size="10">RS256, ES256, code signing</text>
  <text x="445" y="378" text-anchor="middle" fill="#475569" font-size="18">→</text>
  <rect x="460" y="345" width="190" height="66" rx="6" fill="#1a1a2e" stroke="#475569" stroke-width="1"/>
  <text x="555" y="363" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">Only sender has private key.</text>
  <text x="555" y="377" text-anchor="middle" fill="#64748b" font-size="10">Third party can verify with</text>
  <text x="555" y="391" text-anchor="middle" fill="#64748b" font-size="10">public key. Sender cannot</text>
  <text x="555" y="405" text-anchor="middle" fill="#64748b" font-size="10">deny having signed.</text>
  <rect x="665" y="345" width="185" height="66" rx="6" fill="#0f2010" stroke="#15803d" stroke-width="1.5"/>
  <text x="757" y="363" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">Provides:</text>
  <text x="757" y="378" text-anchor="middle" fill="#86efac" font-size="10">Integrity ✓</text>
  <text x="757" y="391" text-anchor="middle" fill="#86efac" font-size="10">Authenticity ✓</text>
  <text x="757" y="404" text-anchor="middle" fill="#86efac" font-size="10">Non-repudiation ✓</text>

  <!-- Column headers -->
  <text x="120" y="50" text-anchor="middle" fill="#475569" font-size="10" font-weight="600">SECURITY GOAL</text>
  <text x="332" y="50" text-anchor="middle" fill="#475569" font-size="10" font-weight="600">PRIMITIVE</text>
  <text x="555" y="50" text-anchor="middle" fill="#475569" font-size="10" font-weight="600">CHARACTERISTICS</text>
  <text x="757" y="50" text-anchor="middle" fill="#475569" font-size="10" font-weight="600">LIMITS / GUARANTEES</text>

  <!-- Arrow def -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
