<svg viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <!-- Background -->
  <rect width="860" height="400" fill="#0f172a"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600" letter-spacing="1">HMAC vs DIGITAL SIGNATURE — NON-REPUDIATION REQUIRES ASYMMETRIC KEYS</text>

  <!-- Divider -->
  <line x1="430" y1="48" x2="430" y2="390" stroke="#1e293b" stroke-width="2"/>

  <!-- ===== LEFT: HMAC ===== -->
  <text x="215" y="62" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="700">HMAC (Shared Secret)</text>

  <!-- Shared secret box -->
  <rect x="155" y="75" width="120" height="36" rx="6" fill="#292524" stroke="#78716c" stroke-width="1.5"/>
  <text x="215" y="90" text-anchor="middle" fill="#d6d3d1" font-size="11" font-weight="600">SHARED KEY</text>
  <text x="215" y="104" text-anchor="middle" fill="#a8a29e" font-size="10">K (both parties)</text>

  <!-- Lines to both parties -->
  <line x1="155" y1="93" x2="95" y2="140" stroke="#f59e0b" stroke-width="2"/>
  <line x1="275" y1="93" x2="335" y2="140" stroke="#f59e0b" stroke-width="2"/>

  <!-- Sender -->
  <rect x="40" y="140" width="110" height="50" rx="8" fill="#1c1917" stroke="#78716c" stroke-width="1.5"/>
  <text x="95" y="161" text-anchor="middle" fill="#d6d3d1" font-size="11" font-weight="600">ALICE</text>
  <text x="95" y="176" text-anchor="middle" fill="#a8a29e" font-size="10">holds K</text>

  <!-- Receiver -->
  <rect x="290" y="140" width="110" height="50" rx="8" fill="#1c1917" stroke="#78716c" stroke-width="1.5"/>
  <text x="345" y="161" text-anchor="middle" fill="#d6d3d1" font-size="11" font-weight="600">BOB</text>
  <text x="345" y="176" text-anchor="middle" fill="#a8a29e" font-size="10">holds K</text>

  <!-- MAC generation -->
  <rect x="100" y="215" width="250" height="36" rx="6" fill="#1c1917" stroke="#92400e" stroke-width="1.5"/>
  <text x="225" y="231" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">Alice sends: message + HMAC(K, message)</text>
  <text x="225" y="245" text-anchor="middle" fill="#d97706" font-size="10">Bob verifies with the same K</text>

  <!-- Problem box -->
  <rect x="55" y="275" width="330" height="80" rx="8" fill="#2d1b00" stroke="#92400e" stroke-width="1.5"/>
  <text x="220" y="295" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">⚠  No Non-Repudiation</text>
  <text x="220" y="311" text-anchor="middle" fill="#d97706" font-size="10">Both Alice and Bob hold key K.</text>
  <text x="220" y="325" text-anchor="middle" fill="#d97706" font-size="10">Either could have produced the MAC.</text>
  <text x="220" y="340" text-anchor="middle" fill="#92400e" font-size="10">Alice can credibly claim Bob fabricated it.</text>

  <!-- Properties -->
  <text x="215" y="375" text-anchor="middle" fill="#22c55e" font-size="11">✓ Integrity  ✓ Authenticity  ✗ Non-repudiation</text>

  <!-- ===== RIGHT: Digital Signature ===== -->
  <text x="645" y="62" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">Digital Signature (Asymmetric)</text>

  <!-- Private key (Alice only) -->
  <rect x="465" y="75" width="120" height="36" rx="6" fill="#1e1b4b" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="525" y="91" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">ALICE'S PRIVATE KEY</text>
  <text x="525" y="105" text-anchor="middle" fill="#8b5cf6" font-size="10">Alice only — never shared</text>

  <!-- Public key (available to all) -->
  <rect x="700" y="75" width="120" height="36" rx="6" fill="#14291e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="760" y="91" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">ALICE'S PUBLIC KEY</text>
  <text x="760" y="105" text-anchor="middle" fill="#4ade80" font-size="10">Freely distributable</text>

  <!-- Alice sender -->
  <rect x="468" y="140" width="110" height="50" rx="8" fill="#1e1b4b" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="523" y="161" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">ALICE</text>
  <text x="523" y="176" text-anchor="middle" fill="#8b5cf6" font-size="10">signs with private key</text>

  <!-- Anyone verifier -->
  <rect x="714" y="140" width="110" height="50" rx="8" fill="#14291e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="769" y="161" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">ANYONE</text>
  <text x="769" y="176" text-anchor="middle" fill="#4ade80" font-size="10">verifies with public key</text>

  <!-- Lines -->
  <line x1="525" y1="111" x2="525" y2="140" stroke="#6d28d9" stroke-width="1.8"/>
  <line x1="760" y1="111" x2="769" y2="140" stroke="#16a34a" stroke-width="1.8"/>

  <!-- Signature flow -->
  <rect x="468" y="215" width="400" height="36" rx="6" fill="#1e1b4b" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="668" y="231" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Alice sends: message + Sign(privateKey, hash(message))</text>
  <text x="668" y="245" text-anchor="middle" fill="#8b5cf6" font-size="10">Anyone verifies: Verify(publicKey, signature, message)</text>

  <!-- Success box -->
  <rect x="483" y="275" width="370" height="80" rx="8" fill="#0a2010" stroke="#15803d" stroke-width="1.5"/>
  <text x="668" y="295" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700">✓  Non-Repudiation Achieved</text>
  <text x="668" y="311" text-anchor="middle" fill="#22c55e" font-size="10">Only Alice has the private key.</text>
  <text x="668" y="325" text-anchor="middle" fill="#22c55e" font-size="10">Only she could have produced this signature.</text>
  <text x="668" y="340" text-anchor="middle" fill="#15803d" font-size="10">She cannot credibly deny having signed it.</text>

  <!-- Properties -->
  <text x="668" y="375" text-anchor="middle" fill="#22c55e" font-size="11">✓ Integrity  ✓ Authenticity  ✓ Non-repudiation</text>
</svg>
