<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <!-- Background -->
  <rect width="900" height="420" fill="#0f172a"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600" letter-spacing="1">TLS HYBRID MODEL: ASYMMETRIC FOR KEY EXCHANGE, SYMMETRIC FOR DATA</text>

  <!-- CLIENT -->
  <rect x="30" y="55" width="130" height="300" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="95" y="80" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="700">CLIENT</text>
  <line x1="95" y1="88" x2="95" y2="340" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- SERVER -->
  <rect x="740" y="55" width="130" height="300" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="805" y="80" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="700">SERVER</text>
  <line x1="805" y1="88" x2="805" y2="340" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- === PHASE 1: Asymmetric Key Exchange === -->
  <rect x="200" y="60" width="500" height="130" rx="8" fill="#1e1b4b" stroke="#4c1d95" stroke-width="1.5"/>
  <text x="450" y="82" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700">PHASE 1 — ASYMMETRIC KEY EXCHANGE</text>
  <text x="450" y="98" text-anchor="middle" fill="#7c3aed" font-size="10">Uses asymmetric cryptography to solve key distribution</text>

  <!-- Step 1: Server sends certificate -->
  <line x1="805" y1="115" x2="200" y2="115" stroke="#6d28d9" stroke-width="2"/>
  <polygon points="208,110 200,115 208,120" fill="#6d28d9"/>
  <text x="495" y="109" text-anchor="middle" fill="#c4b5fd" font-size="10">Server sends certificate (public key signed by CA)</text>

  <!-- Step 2: Client verifies -->
  <rect x="230" y="122" width="240" height="22" rx="4" fill="#0f1124" stroke="none"/>
  <text x="350" y="136" text-anchor="middle" fill="#8b5cf6" font-size="10">Client verifies cert chain → trusts server's public key</text>

  <!-- Step 3: Client generates pre-master secret -->
  <text x="95" y="153" text-anchor="middle" fill="#7c3aed" font-size="9">generates</text>
  <text x="95" y="164" text-anchor="middle" fill="#7c3aed" font-size="9">pre-master</text>
  <text x="95" y="175" text-anchor="middle" fill="#7c3aed" font-size="9">secret</text>

  <!-- Step 4: Client encrypts with server public key and sends -->
  <line x1="160" y1="157" x2="740" y2="157" stroke="#6d28d9" stroke-width="2"/>
  <polygon points="733,152 741,157 733,162" fill="#6d28d9"/>
  <text x="450" y="151" text-anchor="middle" fill="#c4b5fd" font-size="10">Pre-master secret encrypted with server's public key</text>

  <!-- Server decrypts with private key -->
  <text x="805" y="173" text-anchor="middle" fill="#7c3aed" font-size="9">decrypts with</text>
  <text x="805" y="184" text-anchor="middle" fill="#7c3aed" font-size="9">private key</text>

  <!-- Both derive session key -->
  <rect x="200" y="172" width="500" height="10" rx="3" fill="#2d1b69" stroke="none"/>
  <text x="450" y="194" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">Both sides independently derive the same symmetric session key ✓</text>

  <!-- Phase label -->
  <text x="220" y="75" fill="#4c1d95" font-size="9" font-style="italic">RSA or ECDH</text>

  <!-- === PHASE 2: Symmetric Data Encryption === -->
  <rect x="200" y="220" width="500" height="140" rx="8" fill="#0a2010" stroke="#166534" stroke-width="1.5"/>
  <text x="450" y="242" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">PHASE 2 — SYMMETRIC ENCRYPTION</text>
  <text x="450" y="258" text-anchor="middle" fill="#15803d" font-size="10">Uses the session key for all subsequent data — fast and efficient</text>
  <text x="220" y="235" fill="#166534" font-size="9" font-style="italic">AES-256-GCM</text>

  <!-- Encrypted data flows -->
  <line x1="160" y1="278" x2="740" y2="278" stroke="#22c55e" stroke-width="2.5"/>
  <polygon points="733,273 741,278 733,283" fill="#22c55e"/>
  <rect x="290" y="263" width="330" height="20" rx="4" fill="#0a2010"/>
  <text x="455" y="277" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">Encrypted(sessionKey, data) →</text>

  <line x1="740" y1="308" x2="160" y2="308" stroke="#22c55e" stroke-width="2.5"/>
  <polygon points="168,303 160,308 168,313" fill="#22c55e"/>
  <rect x="290" y="293" width="330" height="20" rx="4" fill="#0a2010"/>
  <text x="455" y="307" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">← Encrypted(sessionKey, response)</text>

  <text x="455" y="348" text-anchor="middle" fill="#4ade80" font-size="10">Session key never transmitted in plaintext.</text>
  <text x="455" y="362" text-anchor="middle" fill="#22c55e" font-size="10">Bulk data encryption without asymmetric overhead.</text>

  <!-- Summary bar -->
  <rect x="30" y="375" width="840" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="450" y="390" text-anchor="middle" fill="#94a3b8" font-size="10">Asymmetric solves the key distribution problem. Symmetric handles the data. Together: secure channel without a pre-shared secret.</text>
  <text x="450" y="405" text-anchor="middle" fill="#64748b" font-size="9">This is TLS. This is S/MIME. This is the hybrid model.</text>
</svg>
