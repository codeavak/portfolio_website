<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hybrid authorization decision flow</title>
  <desc id="desc">Flow diagram showing baseline RBAC checks with ABAC contextual policy evaluation and final allow or deny decision.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="60" y="78" font-size="44" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">Hybrid Authorization Decision Flow</text>

  <rect x="80" y="140" width="280" height="90" rx="14" fill="#0f172a"/>
  <text x="220" y="195" text-anchor="middle" font-size="28" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Request Received</text>

  <rect x="450" y="140" width="300" height="90" rx="14" fill="#1e3a8a"/>
  <text x="600" y="195" text-anchor="middle" font-size="28" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">RBAC Baseline Check</text>

  <rect x="840" y="140" width="280" height="90" rx="14" fill="#0f766e"/>
  <text x="980" y="195" text-anchor="middle" font-size="28" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">ABAC Policy Check</text>

  <rect x="450" y="330" width="300" height="90" rx="14" fill="#0369a1"/>
  <text x="600" y="385" text-anchor="middle" font-size="28" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Decision and Logging</text>

  <rect x="250" y="530" width="260" height="90" rx="14" fill="#16a34a"/>
  <text x="380" y="585" text-anchor="middle" font-size="28" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Allow</text>

  <rect x="700" y="530" width="260" height="90" rx="14" fill="#b91c1c"/>
  <text x="830" y="585" text-anchor="middle" font-size="28" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Deny or Step-Up</text>

  <g stroke="#0f172a" stroke-width="5" fill="none" marker-end="url(#arrow)">
    <line x1="360" y1="185" x2="450" y2="185"/>
    <line x1="750" y1="185" x2="840" y2="185"/>
    <line x1="980" y1="230" x2="980" y2="275"/>
    <line x1="980" y1="275" x2="600" y2="275"/>
    <line x1="600" y1="275" x2="600" y2="330"/>
    <line x1="600" y1="420" x2="380" y2="530"/>
    <line x1="600" y1="420" x2="830" y2="530"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#334155">
    <text x="80" y="680">Baseline role assignment controls broad privileges.</text>
    <text x="80" y="715">Context attributes refine high-risk decisions by device, location, sensitivity, and session state.</text>
  </g>
</svg>
