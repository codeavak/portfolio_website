<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-labelledby="title desc">
  <title id="title">Accountability chain diagram</title>
  <desc id="desc">Diagram showing accountability as a chain from identity through authentication and session to logged action and review.</desc>
  <rect width="1000" height="600" fill="#0b1220" rx="24"/>
  <text x="60" y="70" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">The Accountability Chain</text>
  <text x="60" y="102" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="18">If one link is weak, the audit trail becomes less trustworthy.</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">
    <rect x="60" y="210" width="150" height="90" rx="16" fill="#111827" stroke="#34d399" stroke-width="3"/>
    <text x="135" y="248" text-anchor="middle" fill="#bbf7d0">Identity</text>
    <text x="135" y="272" text-anchor="middle" fill="#bbf7d0">unique user</text>

    <rect x="245" y="210" width="150" height="90" rx="16" fill="#111827" stroke="#60a5fa" stroke-width="3"/>
    <text x="320" y="248" text-anchor="middle" fill="#bfdbfe">Auth</text>
    <text x="320" y="272" text-anchor="middle" fill="#bfdbfe">assurance</text>

    <rect x="430" y="210" width="150" height="90" rx="16" fill="#111827" stroke="#a78bfa" stroke-width="3"/>
    <text x="505" y="248" text-anchor="middle" fill="#ddd6fe">Session</text>
    <text x="505" y="272" text-anchor="middle" fill="#ddd6fe">control</text>

    <rect x="615" y="210" width="150" height="90" rx="16" fill="#111827" stroke="#f59e0b" stroke-width="3"/>
    <text x="690" y="248" text-anchor="middle" fill="#fde68a">Action</text>
    <text x="690" y="272" text-anchor="middle" fill="#fde68a">privileged event</text>

    <rect x="800" y="210" width="150" height="90" rx="16" fill="#111827" stroke="#f87171" stroke-width="3"/>
    <text x="875" y="248" text-anchor="middle" fill="#fecaca">Audit</text>
    <text x="875" y="272" text-anchor="middle" fill="#fecaca">review</text>
  </g>

  <g stroke-width="6" fill="none">
    <path d="M210 255 H 245" stroke="#34d399" marker-end="url(#a1)"/>
    <path d="M395 255 H 430" stroke="#60a5fa" marker-end="url(#a2)"/>
    <path d="M580 255 H 615" stroke="#a78bfa" marker-end="url(#a3)"/>
    <path d="M765 255 H 800" stroke="#f59e0b" marker-end="url(#a4)"/>
  </g>

  <rect x="100" y="380" width="800" height="110" rx="18" fill="#111827" stroke="#334155"/>
  <text x="500" y="420" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="19">Weak example: shared account + weak MFA + broad standing privilege</text>
  <text x="500" y="455" text-anchor="middle" fill="#fca5a5" font-family="Segoe UI, Arial, sans-serif" font-size="18">Result: the logs exist, but the story is ambiguous when the incident happens.</text>

  <defs>
    <marker id="a1" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#34d399"/></marker>
    <marker id="a2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#60a5fa"/></marker>
    <marker id="a3" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#a78bfa"/></marker>
    <marker id="a4" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#f59e0b"/></marker>
  </defs>
</svg>
