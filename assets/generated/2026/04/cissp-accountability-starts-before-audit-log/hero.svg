<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Accountability and audit log hero image</title>
  <desc id="desc">Abstract illustration showing unique identities, strong authentication, and an audit log connected in a trust chain.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#08101d" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#12233f" stop-opacity="0.94"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="100" r="150" fill="#60a5fa" opacity="0.12"/>
  <circle cx="160" cy="540" r="170" fill="#22c55e" opacity="0.09"/>
  <rect x="60" y="60" width="1080" height="510" rx="28" fill="url(#card)" stroke="#93c5fd" stroke-opacity="0.22"/>

  <text x="100" y="145" fill="#e5eefc" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">CISSP #14</text>
  <text x="100" y="205" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">Accountability Starts</text>
  <text x="100" y="250" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">Before the Audit Log</text>
  <text x="100" y="307" fill="#c7dbff" font-family="Segoe UI, Arial, sans-serif" font-size="22">Unique identity, strong authentication, and scoped privilege make logs meaningful.</text>

  <g transform="translate(700 120)">
    <circle cx="70" cy="70" r="52" fill="#0f172a" stroke="#34d399" stroke-width="3"/>
    <circle cx="70" cy="55" r="16" fill="none" stroke="#bbf7d0" stroke-width="4"/>
    <path d="M42 92c8-14 20-22 28-22s20 8 28 22" fill="none" stroke="#bbf7d0" stroke-width="4" stroke-linecap="round"/>

    <rect x="180" y="25" width="130" height="90" rx="16" fill="#0f172a" stroke="#60a5fa" stroke-width="3"/>
    <circle cx="245" cy="58" r="14" fill="none" stroke="#bfdbfe" stroke-width="4"/>
    <rect x="226" y="72" width="38" height="22" rx="5" fill="#1d4ed8"/>

    <rect x="390" y="5" width="190" height="130" rx="18" fill="#0f172a" stroke="#f59e0b" stroke-width="3"/>
    <text x="485" y="42" text-anchor="middle" fill="#fde68a" font-family="Consolas, monospace" font-size="17">AUDIT LOG</text>
    <text x="412" y="70" fill="#f8fafc" font-family="Consolas, monospace" font-size="13">12:45Z user=alice</text>
    <text x="412" y="92" fill="#f8fafc" font-family="Consolas, monospace" font-size="13">action=approve change</text>
    <text x="412" y="114" fill="#f8fafc" font-family="Consolas, monospace" font-size="13">result=success</text>

    <path d="M122 70 H 180" stroke="#34d399" stroke-width="6" marker-end="url(#arrow1)"/>
    <path d="M310 70 H 390" stroke="#60a5fa" stroke-width="6" marker-end="url(#arrow2)"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">
    <rect x="100" y="390" width="200" height="68" rx="14" fill="#111827" stroke="#34d399"/>
    <text x="200" y="418" text-anchor="middle" fill="#bbf7d0">Unique identity</text>
    <text x="200" y="442" text-anchor="middle" fill="#bbf7d0">not shared login</text>

    <rect x="325" y="390" width="200" height="68" rx="14" fill="#111827" stroke="#60a5fa"/>
    <text x="425" y="418" text-anchor="middle" fill="#bfdbfe">Strong auth</text>
    <text x="425" y="442" text-anchor="middle" fill="#bfdbfe">appropriate to risk</text>

    <rect x="550" y="390" width="200" height="68" rx="14" fill="#111827" stroke="#f59e0b"/>
    <text x="650" y="418" text-anchor="middle" fill="#fde68a">Privileged control</text>
    <text x="650" y="442" text-anchor="middle" fill="#fde68a">with review</text>
  </g>

  <defs>
    <marker id="arrow1" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#34d399"/>
    </marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#60a5fa"/>
    </marker>
  </defs>
</svg>
