<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" width="1536" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2f4a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4da6ff"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff4d4d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1536" height="1024" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="128" x2="1536" y2="128"/>
    <line x1="0" y1="256" x2="1536" y2="256"/>
    <line x1="0" y1="384" x2="1536" y2="384"/>
    <line x1="0" y1="512" x2="1536" y2="512"/>
    <line x1="0" y1="640" x2="1536" y2="640"/>
    <line x1="0" y1="768" x2="1536" y2="768"/>
    <line x1="0" y1="896" x2="1536" y2="896"/>
    <line x1="192" y1="0" x2="192" y2="1024"/>
    <line x1="384" y1="0" x2="384" y2="1024"/>
    <line x1="576" y1="0" x2="576" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
    <line x1="960" y1="0" x2="960" y2="1024"/>
    <line x1="1152" y1="0" x2="1152" y2="1024"/>
    <line x1="1344" y1="0" x2="1344" y2="1024"/>
  </g>

  <!-- Title -->
  <text x="768" y="72" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="700" fill="#e8f4fd" letter-spacing="2">ZERO TRUST ARCHITECTURE</text>
  <text x="768" y="112" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#7ab8e8" letter-spacing="4">NEVER TRUST — ALWAYS VERIFY</text>

  <!-- Connection lines (blue - approved paths) -->
  <line x1="340" y1="512" x2="680" y2="512" stroke="#4da6ff" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <line x1="856" y1="512" x2="1180" y2="512" stroke="#4da6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Lateral movement blocked (red dashed) -->
  <line x1="340" y1="640" x2="680" y2="780" stroke="#ff4d4d" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrowRed)" opacity="0.8"/>
  <circle cx="530" cy="718" r="18" fill="none" stroke="#ff4d4d" stroke-width="3"/>
  <line x1="517" y1="705" x2="543" y2="731" stroke="#ff4d4d" stroke-width="3"/>
  <line x1="543" y1="705" x2="517" y2="731" stroke="#ff4d4d" stroke-width="3"/>

  <!-- Node: User (left) -->
  <circle cx="270" cy="512" r="80" fill="#0d1b2e" stroke="#4da6ff" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Person icon -->
  <circle cx="270" cy="490" r="22" fill="#4da6ff"/>
  <path d="M230 545 Q270 520 310 545" stroke="#4da6ff" stroke-width="3" fill="none"/>
  <!-- Shield badge -->
  <path d="M288 468 L302 473 L302 483 Q302 490 288 495 Q274 490 274 483 L274 473 Z" fill="#1a7ccf" stroke="#4da6ff" stroke-width="1.5"/>
  <text x="288" y="485" text-anchor="middle" font-family="Arial" font-size="10" fill="white">✓</text>
  <text x="270" y="606" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600" fill="#7ab8e8">VERIFIED</text>
  <text x="270" y="628" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#5a8ab0">IDENTITY</text>

  <!-- Policy Engine (center) -->
  <rect x="648" y="450" width="272" height="124" rx="12" fill="#0f2a45" stroke="#1a7ccf" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="648" y="450" width="272" height="4" rx="2" fill="#1a7ccf"/>
  <text x="784" y="498" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="19" font-weight="700" fill="#e8f4fd">POLICY ENGINE</text>
  <text x="784" y="522" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#7ab8e8">Evaluate every request</text>
  <text x="784" y="544" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#7ab8e8">Identity · Device · Context</text>
  <text x="784" y="565" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#4da6ff">Grant per-session, not permanently</text>

  <!-- Node: Protected Resource (right) -->
  <circle cx="1280" cy="512" r="80" fill="#0d1b2e" stroke="#4da6ff" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Lock icon -->
  <rect x="1258" y="500" width="44" height="34" rx="6" fill="#1a7ccf"/>
  <path d="M1267 500 Q1267 476 1280 476 Q1293 476 1293 500" stroke="#4da6ff" stroke-width="3.5" fill="none"/>
  <circle cx="1280" cy="517" r="5" fill="white"/>
  <rect x="1278" y="517" width="4" height="10" fill="white"/>
  <text x="1280" y="606" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600" fill="#7ab8e8">PROTECTED</text>
  <text x="1280" y="628" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#5a8ab0">RESOURCE</text>

  <!-- Node: Blocked Lateral Movement (lower) -->
  <circle cx="270" cy="780" r="60" fill="#1a0d0d" stroke="#ff4d4d" stroke-width="2" opacity="0.85"/>
  <!-- Server/endpoint icon -->
  <rect x="248" y="760" width="44" height="32" rx="4" fill="#3a1a1a" stroke="#ff4d4d" stroke-width="1.5"/>
  <line x1="248" y1="768" x2="292" y2="768" stroke="#ff4d4d" stroke-width="1.5"/>
  <text x="270" y="862" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#ff8080">LATERAL MOVEMENT</text>
  <text x="270" y="882" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#cc4444">BLOCKED</text>

  <!-- Micro-segmentation illustration (bottom center) -->
  <g transform="translate(550,700)">
    <text x="237" y="0" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#7ab8e8" letter-spacing="3">MICROSEGMENTATION</text>
    <rect x="0" y="12" width="90" height="60" rx="6" fill="#0f2a45" stroke="#1a7ccf" stroke-width="1.5"/>
    <rect x="100" y="12" width="90" height="60" rx="6" fill="#0f2a45" stroke="#1a7ccf" stroke-width="1.5"/>
    <rect x="200" y="12" width="90" height="60" rx="6" fill="#0f2a45" stroke="#1a7ccf" stroke-width="1.5"/>
    <rect x="300" y="12" width="90" height="60" rx="6" fill="#0f2a45" stroke="#1a7ccf" stroke-width="1.5"/>
    <text x="45" y="47" text-anchor="middle" font-family="Arial" font-size="11" fill="#5a8ab0">Zone A</text>
    <text x="145" y="47" text-anchor="middle" font-family="Arial" font-size="11" fill="#5a8ab0">Zone B</text>
    <text x="245" y="47" text-anchor="middle" font-family="Arial" font-size="11" fill="#5a8ab0">Zone C</text>
    <text x="345" y="47" text-anchor="middle" font-family="Arial" font-size="11" fill="#5a8ab0">Zone D</text>
    <line x1="90" y1="42" x2="100" y2="42" stroke="#ff4d4d" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="190" y1="42" x2="200" y2="42" stroke="#ff4d4d" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="290" y1="42" x2="300" y2="42" stroke="#ff4d4d" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>

  <!-- Footer tag -->
  <text x="768" y="990" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#2d5a8a" letter-spacing="4">CISSP SERIES  ·  POST #40</text>
</svg>
