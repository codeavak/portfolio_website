<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-labelledby="title desc">
  <title id="title">Fragile path versus resilient path</title>
  <desc id="desc">Comparison diagram showing a service path with a single shared dependency versus a more resilient design with alternate paths and independent components.</desc>
  <rect width="1000" height="600" fill="#0f172a" rx="24"/>
  <text x="60" y="70" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Where Single Points of Failure Hide</text>
  <text x="60" y="102" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="18">The box count can look healthy while the dependency graph is still fragile.</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    <rect x="70" y="150" width="380" height="320" rx="18" fill="#111827" stroke="#f87171"/>
    <text x="260" y="190" text-anchor="middle" fill="#fecaca" font-size="24">Fragile path</text>
    <rect x="105" y="240" width="110" height="48" rx="12" fill="#0b1220" stroke="#60a5fa"/>
    <text x="160" y="270" text-anchor="middle" fill="#bfdbfe">Users</text>
    <rect x="265" y="240" width="150" height="48" rx="12" fill="#0b1220" stroke="#f87171"/>
    <text x="340" y="270" text-anchor="middle" fill="#fecaca">One IdP / DB</text>
    <rect x="185" y="350" width="150" height="48" rx="12" fill="#0b1220" stroke="#22c55e"/>
    <text x="260" y="380" text-anchor="middle" fill="#bbf7d0">Critical service</text>
    <line x1="215" y1="264" x2="265" y2="264" stroke="#94a3b8" stroke-width="4"/>
    <line x1="340" y1="288" x2="260" y2="350" stroke="#f87171" stroke-width="4"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    <rect x="550" y="150" width="380" height="320" rx="18" fill="#111827" stroke="#22c55e"/>
    <text x="740" y="190" text-anchor="middle" fill="#bbf7d0" font-size="24">More resilient path</text>
    <rect x="585" y="230" width="110" height="48" rx="12" fill="#0b1220" stroke="#60a5fa"/>
    <text x="640" y="260" text-anchor="middle" fill="#bfdbfe">Users</text>
    <rect x="730" y="215" width="135" height="48" rx="12" fill="#0b1220" stroke="#a78bfa"/>
    <text x="797" y="245" text-anchor="middle" fill="#ddd6fe">Primary path</text>
    <rect x="730" y="285" width="135" height="48" rx="12" fill="#0b1220" stroke="#34d399"/>
    <text x="797" y="315" text-anchor="middle" fill="#bbf7d0">Alt path</text>
    <rect x="665" y="370" width="150" height="48" rx="12" fill="#0b1220" stroke="#22c55e"/>
    <text x="740" y="400" text-anchor="middle" fill="#bbf7d0">Critical service</text>
    <line x1="695" y1="254" x2="730" y2="239" stroke="#94a3b8" stroke-width="4"/>
    <line x1="695" y1="254" x2="730" y2="309" stroke="#94a3b8" stroke-width="4"/>
    <line x1="797" y1="263" x2="740" y2="370" stroke="#a78bfa" stroke-width="4"/>
    <line x1="797" y1="333" x2="740" y2="370" stroke="#34d399" stroke-width="4"/>
  </g>

  <rect x="170" y="510" width="660" height="46" rx="12" fill="#0b1220" stroke="#475569"/>
  <text x="500" y="539" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="16">Resilience comes from independent paths, not just more instances.</text>
</svg>
