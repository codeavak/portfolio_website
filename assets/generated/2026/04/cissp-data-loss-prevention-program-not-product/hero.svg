<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="DLP program lifecycle hero graphic">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B132B" />
      <stop offset="100%" stop-color="#1C2541" />
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5BC0BE" />
      <stop offset="100%" stop-color="#F4D35E" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />

  <circle cx="800" cy="450" r="270" fill="none" stroke="url(#ring)" stroke-width="28" opacity="0.95" filter="url(#shadow)" />
  <circle cx="800" cy="450" r="195" fill="#0F1B3D" stroke="#5BC0BE" stroke-opacity="0.35" stroke-width="2" />

  <text x="800" y="430" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="700" fill="#FFFFFF">CISSP #48</text>
  <text x="800" y="495" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="600" fill="#D9F0FF">Data Loss Prevention</text>
  <text x="800" y="545" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" fill="#F4F6F8">Program, Not Product</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="600" fill="#EAF4F8">
    <rect x="690" y="130" width="220" height="54" rx="27" fill="#3A506B" stroke="#5BC0BE" />
    <text x="800" y="165" text-anchor="middle">Classify</text>

    <rect x="1140" y="420" width="230" height="54" rx="27" fill="#3A506B" stroke="#F4D35E" />
    <text x="1255" y="455" text-anchor="middle">Prevent</text>

    <rect x="680" y="720" width="240" height="54" rx="27" fill="#3A506B" stroke="#5BC0BE" />
    <text x="800" y="755" text-anchor="middle">Investigate</text>

    <rect x="230" y="420" width="220" height="54" rx="27" fill="#3A506B" stroke="#F4D35E" />
    <text x="340" y="455" text-anchor="middle">Monitor</text>
  </g>

  <g stroke="#C9F2FF" stroke-width="6" fill="none" opacity="0.8">
    <path d="M800 184 C980 220 1110 300 1170 420" />
    <path d="M1170 474 C1130 610 980 700 800 720" />
    <path d="M680 748 C520 700 380 610 340 474" />
    <path d="M340 420 C390 300 520 220 690 184" />
  </g>

  <text x="800" y="852" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#BFD7EA">Governance + Workflow + Measured Enforcement</text>
</svg>
