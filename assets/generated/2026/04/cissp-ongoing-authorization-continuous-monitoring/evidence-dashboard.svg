<svg width="1200" height="860" viewBox="0 0 1200 860" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Continuous monitoring evidence dashboard</title>
  <desc id="desc">Dashboard-style matrix mapping control status, owner, trend, and action needed for ongoing authorization governance.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="860" fill="url(#bg)"/>
  <text x="60" y="74" font-size="42" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">Continuous Authorization Evidence Dashboard</text>

  <rect x="60" y="120" width="1080" height="90" rx="12" fill="#0f172a"/>
  <text x="92" y="174" font-size="30" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Control Area</text>
  <text x="430" y="174" font-size="30" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Status</text>
  <text x="620" y="174" font-size="30" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Trend</text>
  <text x="770" y="174" font-size="30" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Owner</text>
  <text x="930" y="174" font-size="30" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Action</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#0f172a">
    <rect x="60" y="230" width="1080" height="102" rx="12" fill="#dbeafe"/>
    <text x="92" y="292">IAM control baseline</text>
    <text x="430" y="292">Amber</text>
    <text x="620" y="292">Declining</text>
    <text x="770" y="292">IAM Lead</text>
    <text x="930" y="292">Re-certify roles</text>

    <rect x="60" y="345" width="1080" height="102" rx="12" fill="#ccfbf1"/>
    <text x="92" y="407">Patch compliance control</text>
    <text x="430" y="407">Green</text>
    <text x="620" y="407">Stable</text>
    <text x="770" y="407">Platform Ops</text>
    <text x="930" y="407">Maintain cadence</text>

    <rect x="60" y="460" width="1080" height="102" rx="12" fill="#dbeafe"/>
    <text x="92" y="522">Logging and alert fidelity</text>
    <text x="430" y="522">Amber</text>
    <text x="620" y="522">Volatile</text>
    <text x="770" y="522">SecOps</text>
    <text x="930" y="522">Tune detections</text>

    <rect x="60" y="575" width="1080" height="102" rx="12" fill="#ccfbf1"/>
    <text x="92" y="637">Third-party access controls</text>
    <text x="430" y="637">Red</text>
    <text x="620" y="637">Worsening</text>
    <text x="770" y="637">Vendor Risk</text>
    <text x="930" y="637">Escalate + contain</text>
  </g>

  <text x="60" y="792" font-size="27" fill="#334155" font-family="Segoe UI, Arial, sans-serif">Evidence-driven dashboards help authorizing decisions reflect current risk, not stale audit snapshots.</text>
</svg>
