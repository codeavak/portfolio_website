<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Threat modeling four-question loop</title>
  <desc id="desc">A practical loop showing scope, threats, mitigations, and validation as a recurring engineering workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="60" y="80" font-size="44" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">Threat Modeling Four-Question Loop</text>

  <rect x="120" y="180" width="380" height="110" rx="16" fill="#0f172a"/>
  <text x="310" y="246" text-anchor="middle" font-size="30" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">1. What are we building?</text>

  <rect x="700" y="180" width="380" height="110" rx="16" fill="#1e3a8a"/>
  <text x="890" y="246" text-anchor="middle" font-size="30" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">2. What can go wrong?</text>

  <rect x="700" y="430" width="380" height="110" rx="16" fill="#0369a1"/>
  <text x="890" y="496" text-anchor="middle" font-size="30" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">3. What will we do?</text>

  <rect x="120" y="430" width="380" height="110" rx="16" fill="#0f766e"/>
  <text x="310" y="496" text-anchor="middle" font-size="30" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">4. Did we do enough?</text>

  <g stroke="#0f172a" stroke-width="6" fill="none" marker-end="url(#arrow)">
    <line x1="500" y1="235" x2="700" y2="235"/>
    <line x1="890" y1="290" x2="890" y2="430"/>
    <line x1="700" y1="485" x2="500" y2="485"/>
    <line x1="310" y1="430" x2="310" y2="290"/>
  </g>

  <text x="60" y="650" font-size="28" fill="#334155" font-family="Segoe UI, Arial, sans-serif">Run this loop whenever architecture, trust boundaries, or high-risk features change.</text>
</svg>
