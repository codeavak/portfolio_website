<svg width="1200" height="860" viewBox="0 0 1200 860" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Threat to control mapping board</title>
  <desc id="desc">Matrix mapping identified threats to controls, ownership, and verification evidence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="860" fill="url(#bg)"/>
  <text x="60" y="74" font-size="44" font-weight="700" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif">Threat Modeling Action Board</text>

  <rect x="60" y="120" width="1080" height="90" rx="12" fill="#0f172a"/>
  <text x="96" y="176" font-size="30" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Threat</text>
  <text x="380" y="176" font-size="30" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Control Decision</text>
  <text x="720" y="176" font-size="30" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Owner</text>
  <text x="920" y="176" font-size="30" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif">Evidence</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#0f172a">
    <rect x="60" y="230" width="1080" height="105" rx="12" fill="#dbeafe"/>
    <text x="96" y="292">Token replay across services</text>
    <text x="380" y="292">Short TTL + audience validation</text>
    <text x="720" y="292">Platform team</text>
    <text x="920" y="292">Auth test + logs</text>

    <rect x="60" y="350" width="1080" height="105" rx="12" fill="#ccfbf1"/>
    <text x="96" y="412">Privilege misuse by internal role</text>
    <text x="380" y="412">Step-up approval + JIT access</text>
    <text x="720" y="412">IAM lead</text>
    <text x="920" y="412">Access review trail</text>

    <rect x="60" y="470" width="1080" height="105" rx="12" fill="#dbeafe"/>
    <text x="96" y="532">Data leakage in export workflow</text>
    <text x="380" y="532">DLP checks + scoped entitlements</text>
    <text x="720" y="532">App owner</text>
    <text x="920" y="532">Policy hit metrics</text>

    <rect x="60" y="590" width="1080" height="105" rx="12" fill="#ccfbf1"/>
    <text x="96" y="652">Vendor webhook impersonation</text>
    <text x="380" y="652">Signed payload + IP allow rules</text>
    <text x="720" y="652">Integration owner</text>
    <text x="920" y="652">Verification tests</text>
  </g>

  <text x="60" y="792" font-size="28" fill="#334155" font-family="Segoe UI, Arial, sans-serif">The model is only useful when each threat maps to a decision, owner, and verification signal.</text>
</svg>
