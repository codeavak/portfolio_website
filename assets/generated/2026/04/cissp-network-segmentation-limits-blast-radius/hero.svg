<svg viewBox="0 0 960 480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <!-- Background -->
  <rect width="960" height="480" fill="#0f172a"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="#94a3b8" font-size="15" font-weight="600" letter-spacing="1">NETWORK SEGMENTATION: BLAST RADIUS COMPARISON</text>

  <!-- ===== LEFT PANEL: Flat Network ===== -->
  <rect x="20" y="55" width="440" height="405" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="240" y="84" text-anchor="middle" fill="#f87171" font-size="14" font-weight="700">FLAT NETWORK</text>
  <text x="240" y="100" text-anchor="middle" fill="#94a3b8" font-size="11">No internal boundaries — breach reaches everything</text>

  <!-- Flat network single cloud boundary -->
  <ellipse cx="240" cy="270" rx="185" ry="160" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="240" y="122" text-anchor="middle" fill="#64748b" font-size="10">Internal Network</text>

  <!-- Nodes in flat network -->
  <!-- Compromised laptop (red, center-left) -->
  <circle cx="155" cy="220" r="28" fill="#450a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="155" y="219" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">LAPTOP</text>
  <text x="155" y="232" text-anchor="middle" fill="#ef4444" font-size="9">☠ breached</text>

  <!-- File server -->
  <rect x="285" y="150" width="60" height="44" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="315" y="169" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">FILE</text>
  <text x="315" y="182" text-anchor="middle" fill="#93c5fd" font-size="10">SERVER</text>

  <!-- Database -->
  <rect x="95" y="295" width="60" height="44" rx="6" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="125" y="314" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">DATA</text>
  <text x="125" y="327" text-anchor="middle" fill="#86efac" font-size="10">BASE</text>

  <!-- Domain controller -->
  <rect x="285" y="300" width="66" height="44" rx="6" fill="#2d1b69" stroke="#a855f7" stroke-width="1.5"/>
  <text x="318" y="319" text-anchor="middle" fill="#d8b4fe" font-size="10" font-weight="600">DOMAIN</text>
  <text x="318" y="332" text-anchor="middle" fill="#d8b4fe" font-size="10">CONTROLLER</text>

  <!-- Payment system -->
  <rect x="185" y="360" width="66" height="44" rx="6" fill="#451a03" stroke="#f97316" stroke-width="1.5"/>
  <text x="218" y="379" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="600">PAYMENT</text>
  <text x="218" y="392" text-anchor="middle" fill="#fdba74" font-size="10">SYSTEM</text>

  <!-- Attack lines from compromised laptop - red arrows to all -->
  <line x1="181" y1="228" x2="287" y2="185" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="5,3" opacity="0.9"/>
  <line x1="155" y1="248" x2="137" y2="295" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="5,3" opacity="0.9"/>
  <line x1="181" y1="236" x2="287" y2="310" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="5,3" opacity="0.9"/>
  <line x1="175" y1="246" x2="200" y2="360" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="5,3" opacity="0.9"/>

  <!-- Arrowheads -->
  <polygon points="287,179 294,191 280,191" fill="#ef4444"/>
  <polygon points="131,293 143,293 137,306" fill="#ef4444"/>
  <polygon points="282,306 295,306 289,318" fill="#ef4444"/>
  <polygon points="196,356 208,356 202,368" fill="#ef4444"/>

  <!-- Explosion symbol -->
  <text x="240" y="255" text-anchor="middle" fill="#ef4444" font-size="22" opacity="0.6">⚠</text>
  <text x="240" y="278" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">Unrestricted lateral movement</text>

  <!-- ===== RIGHT PANEL: Segmented Network ===== -->
  <rect x="500" y="55" width="440" height="405" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="720" y="84" text-anchor="middle" fill="#34d399" font-size="14" font-weight="700">SEGMENTED NETWORK</text>
  <text x="720" y="100" text-anchor="middle" fill="#94a3b8" font-size="11">Breach contained within its zone</text>

  <!-- Zone: External (top) -->
  <rect x="530" y="110" width="380" height="60" rx="8" fill="#1c1917" stroke="#78716c" stroke-width="1.5"/>
  <text x="590" y="136" fill="#a8a29e" font-size="11" font-weight="600">EXTERNAL (untrusted)</text>
  <rect x="675" y="120" width="70" height="36" rx="5" fill="#292524" stroke="#78716c" stroke-width="1"/>
  <text x="710" y="136" text-anchor="middle" fill="#d6d3d1" font-size="10" font-weight="600">INTERNET</text>
  <text x="710" y="148" text-anchor="middle" fill="#a8a29e" font-size="9">request</text>

  <!-- Firewall 1 -->
  <rect x="680" y="175" width="80" height="26" rx="4" fill="#0c1f3f" stroke="#2563eb" stroke-width="2"/>
  <text x="720" y="190" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="700">FIREWALL</text>
  <line x1="720" y1="170" x2="720" y2="175" stroke="#475569" stroke-width="2"/>
  <line x1="720" y1="201" x2="720" y2="210" stroke="#475569" stroke-width="2"/>

  <!-- Zone: DMZ -->
  <rect x="530" y="210" width="380" height="68" rx="8" fill="#1a1f2e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="590" y="232" fill="#60a5fa" font-size="11" font-weight="600">DMZ (semi-trusted)</text>
  <!-- Web server compromised in DMZ -->
  <rect x="630" y="222" width="60" height="44" rx="5" fill="#450a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="660" y="241" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">WEB</text>
  <text x="660" y="252" text-anchor="middle" fill="#ef4444" font-size="9">☠ breached</text>
  <!-- API gateway -->
  <rect x="710" y="222" width="60" height="44" rx="5" fill="#14213d" stroke="#3b82f6" stroke-width="1"/>
  <text x="740" y="241" text-anchor="middle" fill="#93c5fd" font-size="10">API</text>
  <text x="740" y="253" text-anchor="middle" fill="#93c5fd" font-size="9">GATEWAY</text>

  <!-- Firewall 2 (blocks attack) -->
  <rect x="680" y="283" width="80" height="26" rx="4" fill="#0c1f3f" stroke="#2563eb" stroke-width="2"/>
  <text x="720" y="298" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="700">FIREWALL</text>
  <line x1="720" y1="278" x2="720" y2="283" stroke="#475569" stroke-width="2"/>
  <line x1="720" y1="309" x2="720" y2="318" stroke="#475569" stroke-width="2"/>

  <!-- Blocked attack arrow -->
  <line x1="660" y1="266" x2="700" y2="283" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="4,3"/>
  <text x="670" y="303" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="900">✕</text>
  <text x="700" y="313" fill="#22c55e" font-size="9" font-weight="600">BLOCKED</text>

  <!-- Zone: Internal -->
  <rect x="530" y="318" width="380" height="60" rx="8" fill="#0f1f0f" stroke="#16a34a" stroke-width="1.5"/>
  <text x="590" y="340" fill="#4ade80" font-size="11" font-weight="600">INTERNAL (trusted)</text>
  <rect x="680" y="328" width="56" height="36" rx="5" fill="#14291e" stroke="#22c55e" stroke-width="1"/>
  <text x="708" y="344" text-anchor="middle" fill="#86efac" font-size="10">APP</text>
  <text x="708" y="356" text-anchor="middle" fill="#86efac" font-size="9">SERVERS</text>
  <rect x="758" y="328" width="60" height="36" rx="5" fill="#14291e" stroke="#22c55e" stroke-width="1"/>
  <text x="788" y="344" text-anchor="middle" fill="#86efac" font-size="10">STAFF</text>
  <text x="788" y="356" text-anchor="middle" fill="#86efac" font-size="9">NETWORK</text>

  <!-- Firewall 3 -->
  <rect x="680" y="382" width="80" height="26" rx="4" fill="#0c1f3f" stroke="#2563eb" stroke-width="2"/>
  <text x="720" y="397" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="700">FIREWALL</text>
  <line x1="720" y1="378" x2="720" y2="382" stroke="#475569" stroke-width="2"/>
  <line x1="720" y1="408" x2="720" y2="414" stroke="#475569" stroke-width="2"/>

  <!-- Zone: Restricted -->
  <rect x="530" y="414" width="380" height="36" rx="8" fill="#1c0a0a" stroke="#dc2626" stroke-width="1.5"/>
  <text x="590" y="430" fill="#f87171" font-size="11" font-weight="600">RESTRICTED</text>
  <rect x="700" y="418" width="56" height="26" rx="5" fill="#3b0a0a" stroke="#dc2626" stroke-width="1"/>
  <text x="728" y="433" text-anchor="middle" fill="#fca5a5" font-size="10">DATABASE</text>
  <rect x="768" y="418" width="56" height="26" rx="5" fill="#3b0a0a" stroke="#dc2626" stroke-width="1"/>
  <text x="796" y="433" text-anchor="middle" fill="#fca5a5" font-size="10">SECRETS</text>

  <!-- Divider line -->
  <line x1="480" y1="55" x2="480" y2="460" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
