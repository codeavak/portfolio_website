<svg viewBox="0 0 860 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <!-- Background -->
  <rect width="860" height="500" fill="#0f172a"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" fill="#94a3b8" font-size="15" font-weight="600" letter-spacing="1">SECURITY ZONE MODEL</text>
  <text x="430" y="56" text-anchor="middle" fill="#64748b" font-size="11">Each boundary is an enforced policy decision — not an assumption</text>

  <!-- ===== ZONE 1: EXTERNAL ===== -->
  <rect x="40" y="75" width="780" height="72" rx="10" fill="#1c1917" stroke="#78716c" stroke-width="2"/>
  <text x="80" y="104" fill="#a8a29e" font-size="13" font-weight="700">EXTERNAL  —  UNTRUSTED</text>
  <text x="80" y="121" fill="#64748b" font-size="10">The internet. No implicit trust. Traffic entering from here is not trusted by default.</text>
  <!-- Internet node -->
  <circle cx="700" cy="111" r="26" fill="#292524" stroke="#78716c" stroke-width="2"/>
  <text x="700" y="108" text-anchor="middle" fill="#d6d3d1" font-size="11" font-weight="700">INTER-</text>
  <text x="700" y="121" text-anchor="middle" fill="#d6d3d1" font-size="11" font-weight="700">NET</text>
  <!-- User icon -->
  <circle cx="760" cy="100" r="10" fill="#3d3a38" stroke="#78716c" stroke-width="1.5"/>
  <rect x="751" y="113" width="18" height="12" rx="3" fill="#3d3a38" stroke="#78716c" stroke-width="1.5"/>
  <text x="760" y="136" text-anchor="middle" fill="#78716c" font-size="9">USER</text>

  <!-- ===== FIREWALL 1 ===== -->
  <line x1="430" y1="147" x2="430" y2="163" stroke="#334155" stroke-width="2"/>
  <rect x="330" y="163" width="200" height="30" rx="6" fill="#0c1f3f" stroke="#3b82f6" stroke-width="2"/>
  <text x="430" y="182" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="700">▼  PERIMETER FIREWALL  ▼</text>
  <text x="430" y="207" text-anchor="middle" fill="#475569" font-size="9">Inspects inbound/outbound. Allows only what's explicitly permitted.</text>
  <line x1="430" y1="193" x2="430" y2="215" stroke="#334155" stroke-width="2"/>

  <!-- ===== ZONE 2: DMZ ===== -->
  <rect x="40" y="215" width="780" height="84" rx="10" fill="#1a1f2e" stroke="#3b82f6" stroke-width="2"/>
  <text x="80" y="244" fill="#60a5fa" font-size="13" font-weight="700">DMZ  —  SEMI-TRUSTED</text>
  <text x="80" y="261" fill="#64748b" font-size="10">Public-facing services only. External users can reach here. Internal network must not be reachable from here.</text>
  <!-- Service boxes in DMZ -->
  <rect x="460" y="226" width="70" height="48" rx="6" fill="#14213d" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="495" y="248" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">WEB</text>
  <text x="495" y="261" text-anchor="middle" fill="#93c5fd" font-size="10">SERVER</text>
  <rect x="545" y="226" width="70" height="48" rx="6" fill="#14213d" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="580" y="248" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">EDGE</text>
  <text x="580" y="261" text-anchor="middle" fill="#93c5fd" font-size="10">API</text>
  <rect x="630" y="226" width="80" height="48" rx="6" fill="#14213d" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="670" y="248" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">MAIL</text>
  <text x="670" y="261" text-anchor="middle" fill="#93c5fd" font-size="10">RELAY</text>
  <!-- DMZ note -->
  <rect x="80" y="270" width="350" height="20" rx="4" fill="none"/>
  <text x="80" y="284" fill="#475569" font-size="10" font-style="italic">A breach here should not propagate inward — that is the entire point of the DMZ.</text>

  <!-- ===== FIREWALL 2 ===== -->
  <line x1="430" y1="299" x2="430" y2="313" stroke="#334155" stroke-width="2"/>
  <rect x="330" y="313" width="200" height="30" rx="6" fill="#0c1f3f" stroke="#3b82f6" stroke-width="2"/>
  <text x="430" y="332" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="700">▼  INTERNAL FIREWALL  ▼</text>
  <text x="430" y="357" text-anchor="middle" fill="#475569" font-size="9">Strictly limits what DMZ services can reach inside the internal network.</text>
  <line x1="430" y1="343" x2="430" y2="365" stroke="#334155" stroke-width="2"/>

  <!-- ===== ZONE 3: INTERNAL ===== -->
  <rect x="40" y="365" width="780" height="72" rx="10" fill="#0f1f0f" stroke="#16a34a" stroke-width="2"/>
  <text x="80" y="394" fill="#4ade80" font-size="13" font-weight="700">INTERNAL  —  TRUSTED</text>
  <text x="80" y="411" fill="#64748b" font-size="10">General operation: workstations, application servers, internal tools. Higher trust than DMZ but still access-controlled.</text>
  <!-- Internal services -->
  <rect x="560" y="374" width="76" height="48" rx="6" fill="#14291e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="598" y="396" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">APP</text>
  <text x="598" y="409" text-anchor="middle" fill="#86efac" font-size="10">SERVERS</text>
  <rect x="650" y="374" width="76" height="48" rx="6" fill="#14291e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="688" y="396" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">STAFF</text>
  <text x="688" y="409" text-anchor="middle" fill="#86efac" font-size="10">DEVICES</text>
  <rect x="738" y="374" width="72" height="48" rx="6" fill="#14291e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="774" y="396" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">CORP</text>
  <text x="774" y="409" text-anchor="middle" fill="#86efac" font-size="10">TOOLS</text>

  <!-- ===== FIREWALL 3 (to restricted) ===== -->
  <line x1="430" y1="437" x2="430" y2="451" stroke="#334155" stroke-width="2"/>
  <rect x="330" y="451" width="200" height="30" rx="6" fill="#2d0f0f" stroke="#dc2626" stroke-width="2"/>
  <text x="430" y="470" text-anchor="middle" fill="#f87171" font-size="11" font-weight="700">▼  RESTRICTED GATEWAY  ▼</text>
  <line x1="430" y1="481" x2="430" y2="495" stroke="#334155" stroke-width="2"/>

  <!-- Zone label on boundary lines -->
  <text x="18" y="418" fill="#22c55e" font-size="9" transform="rotate(-90, 18, 418)">INTERNAL</text>

  <!-- Bottom label for restricted -->
  <text x="430" y="498" text-anchor="middle" fill="#dc2626" font-size="10" font-weight="600">▼  RESTRICTED ZONE below — databases, secrets, payment systems  ▼</text>
</svg>
