<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <!-- Background -->
  <rect width="900" height="460" fill="#0f172a"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" fill="#94a3b8" font-size="15" font-weight="600" letter-spacing="1">NORTH-SOUTH vs EAST-WEST: MICROSEGMENTATION</text>

  <!-- Divider -->
  <line x1="450" y1="50" x2="450" y2="450" stroke="#1e293b" stroke-width="2"/>

  <!-- ===== LEFT: Traditional Perimeter (North-South) ===== -->
  <text x="225" y="64" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="700">TRADITIONAL PERIMETER</text>
  <text x="225" y="80" text-anchor="middle" fill="#64748b" font-size="10">North-south control only — internal traffic moves freely</text>

  <!-- Perimeter wall (top) -->
  <rect x="40" y="92" width="380" height="26" rx="6" fill="#1c1917" stroke="#78716c" stroke-width="2"/>
  <text x="230" y="109" text-anchor="middle" fill="#a8a29e" font-size="11" font-weight="700">PERIMETER FIREWALL (north-south only)</text>

  <!-- Arrow from internet down into org -->
  <line x1="230" y1="118" x2="230" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Flat internal cloud -->
  <rect x="55" y="140" width="350" height="240" rx="14" fill="#1a2035" stroke="#312e81" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="230" y="165" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600">INTERNAL NETWORK (flat)</text>

  <!-- Service boxes - all can talk to each other freely -->
  <rect x="80" y="180" width="70" height="50" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="115" y="202" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">WEB</text>
  <text x="115" y="215" text-anchor="middle" fill="#93c5fd" font-size="9">SERVICE</text>

  <!-- COMPROMISED -->
  <rect x="170" y="180" width="70" height="50" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="205" y="200" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">API</text>
  <text x="205" y="213" text-anchor="middle" fill="#ef4444" font-size="9">☠ breached</text>

  <rect x="260" y="180" width="70" height="50" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="295" y="202" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">AUTH</text>
  <text x="295" y="215" text-anchor="middle" fill="#93c5fd" font-size="9">SERVICE</text>

  <rect x="80" y="280" width="70" height="50" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="115" y="302" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">PAYMENT</text>
  <text x="115" y="315" text-anchor="middle" fill="#93c5fd" font-size="9">SERVICE</text>

  <rect x="170" y="280" width="70" height="50" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="205" y="302" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">HR</text>
  <text x="205" y="315" text-anchor="middle" fill="#93c5fd" font-size="9">SYSTEM</text>

  <rect x="260" y="280" width="70" height="50" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="295" y="302" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">DATABASE</text>
  <text x="295" y="315" text-anchor="middle" fill="#93c5fd" font-size="9">ALL DATA</text>

  <!-- East-west attack paths (red dashed from API to all) -->
  <line x1="205" y1="230" x2="205" y2="280" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="4,3"/>
  <line x1="175" y1="205" x2="150" y2="205" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="4,3"/>
  <line x1="175" y1="210" x2="120" y2="280" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="4,3"/>
  <line x1="240" y1="210" x2="295" y2="280" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="4,3"/>
  <line x1="230" y1="220" x2="230" y2="285" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="4,3"/>

  <!-- Arrowheads on attack paths -->
  <polygon points="205,278 199,266 211,266" fill="#ef4444"/>
  <polygon points="122,278 116,266 128,266" fill="#ef4444"/>
  <polygon points="295,278 289,266 301,266" fill="#ef4444"/>

  <!-- "moves freely" label -->
  <text x="230" y="380" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">East-west traffic moves freely</text>
  <text x="230" y="396" text-anchor="middle" fill="#64748b" font-size="10">One breach reaches every service</text>

  <!-- ===== RIGHT: Microsegmentation (East-West) ===== -->
  <text x="675" y="64" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">MICROSEGMENTATION</text>
  <text x="675" y="80" text-anchor="middle" fill="#64748b" font-size="10">Policy enforced between every service pair</text>

  <!-- Perimeter wall (top) -->
  <rect x="490" y="92" width="380" height="26" rx="6" fill="#1c1917" stroke="#78716c" stroke-width="2"/>
  <text x="680" y="109" text-anchor="middle" fill="#a8a29e" font-size="11" font-weight="700">PERIMETER FIREWALL</text>

  <!-- Arrow from internet down into org -->
  <line x1="680" y1="118" x2="680" y2="140" stroke="#475569" stroke-width="2"/>

  <!-- Internal container - microsegmented -->
  <rect x="505" y="140" width="350" height="240" rx="14" fill="#0d1f14" stroke="#166534" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="680" y="165" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="600">INTERNAL NETWORK (segmented)</text>

  <!-- Service boxes with individual policy bubbles -->
  <rect x="520" y="180" width="78" height="50" rx="6" fill="#14291e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="559" y="202" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">WEB</text>
  <text x="559" y="215" text-anchor="middle" fill="#86efac" font-size="9">SERVICE</text>

  <!-- COMPROMISED on right side -->
  <rect x="616" y="180" width="78" height="50" rx="6" fill="#450a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="655" y="200" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">API</text>
  <text x="655" y="213" text-anchor="middle" fill="#ef4444" font-size="9">☠ breached</text>

  <rect x="712" y="180" width="78" height="50" rx="6" fill="#14291e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="751" y="202" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">AUTH</text>
  <text x="751" y="215" text-anchor="middle" fill="#86efac" font-size="9">SERVICE</text>

  <rect x="520" y="280" width="78" height="50" rx="6" fill="#14291e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="559" y="302" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">PAYMENT</text>
  <text x="559" y="315" text-anchor="middle" fill="#86efac" font-size="9">SERVICE</text>

  <rect x="616" y="280" width="78" height="50" rx="6" fill="#14291e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="655" y="302" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">HR</text>
  <text x="655" y="315" text-anchor="middle" fill="#86efac" font-size="9">SYSTEM</text>

  <rect x="712" y="280" width="78" height="50" rx="6" fill="#14291e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="751" y="302" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">DATABASE</text>
  <text x="751" y="315" text-anchor="middle" fill="#86efac" font-size="9">SCOPED DATA</text>

  <!-- Policy blocks between services (green allow lines only where needed) -->
  <!-- API to its own DB only - allowed -->
  <line x1="655" y1="230" x2="751" y2="280" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
  <text x="735" y="262" fill="#22c55e" font-size="9">✓ allowed</text>

  <!-- Blocked paths from compromised API -->
  <!-- API -> HR blocked -->
  <line x1="655" y1="230" x2="655" y2="278" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="4,3"/>
  <text x="660" y="268" fill="#22c55e" font-size="14" font-weight="900">✕</text>

  <!-- API -> PAYMENT blocked -->
  <line x1="635" y1="220" x2="570" y2="278" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="4,3"/>
  <text x="590" y="262" fill="#22c55e" font-size="14" font-weight="900">✕</text>

  <!-- API -> AUTH blocked -->
  <line x1="694" y1="205" x2="712" y2="210" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="4,3"/>
  <text x="705" y="225" fill="#22c55e" font-size="13" font-weight="900">✕</text>

  <!-- "contained" label -->
  <text x="680" y="380" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">Breach contained to API service</text>
  <text x="680" y="396" text-anchor="middle" fill="#64748b" font-size="10">Other services unreachable without explicit permission</text>

  <!-- Bottom label -->
  <text x="450" y="442" text-anchor="middle" fill="#475569" font-size="11">Each allowed path is an explicit policy decision. Everything else is denied by default.</text>
</svg>
