<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Joiner mover leaver lifecycle loop</title>
  <desc id="desc">A lifecycle diagram showing joiner, mover, and leaver events feeding into approval, provisioning, periodic review, and deprovisioning controls.</desc>
  <rect width="1400" height="820" fill="#f8fafc" />

  <text x="80" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#0f172a">Identity risk lives in the transitions</text>
  <text x="80" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#475569">Joiner, mover, and leaver events only stay safe when the control loop stays active.</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <circle cx="350" cy="310" r="105" fill="#eff6ff" stroke="#93c5fd" stroke-width="3" />
    <text x="300" y="305" font-size="30" font-weight="700" fill="#1d4ed8">Joiner</text>
    <text x="273" y="342" font-size="20" fill="#334155">new starter or vendor</text>

    <circle cx="700" cy="230" r="105" fill="#ecfdf5" stroke="#86efac" stroke-width="3" />
    <text x="650" y="225" font-size="30" font-weight="700" fill="#15803d">Mover</text>
    <text x="620" y="262" font-size="20" fill="#334155">role or team change</text>

    <circle cx="1050" cy="310" r="105" fill="#fef3c7" stroke="#fcd34d" stroke-width="3" />
    <text x="1005" y="305" font-size="30" font-weight="700" fill="#b45309">Leaver</text>
    <text x="973" y="342" font-size="20" fill="#334155">exit or end of access</text>

    <rect x="480" y="470" width="440" height="210" rx="28" fill="#0f172a" />
    <text x="530" y="530" font-size="28" font-weight="700" fill="#ffffff">Control loop</text>
    <text x="530" y="572" font-size="22" fill="#dbeafe">1. Approve by owner</text>
    <text x="530" y="606" font-size="22" fill="#dbeafe">2. Provision least privilege</text>
    <text x="530" y="640" font-size="22" fill="#dbeafe">3. Review and recertify</text>
  </g>

  <g stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M445 278 C520 210, 570 188, 595 190" stroke="#60a5fa" />
    <path d="M805 190 C835 188, 900 210, 955 278" stroke="#22c55e" />
    <path d="M1020 400 C965 445, 900 470, 835 490" stroke="#f59e0b" />
    <path d="M565 490 C500 470, 435 445, 380 400" stroke="#6366f1" />
  </g>

  <g fill="#0f172a">
    <polygon points="592,180 610,190 592,200" fill="#60a5fa" />
    <polygon points="958,280 970,296 950,298" fill="#22c55e" />
    <polygon points="832,488 845,503 825,507" fill="#f59e0b" />
    <polygon points="380,398 366,410 364,390" fill="#6366f1" />
  </g>

  <text x="80" y="760" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#334155">Without ownership and periodic review, access accumulates across transitions faster than teams realize.</text>
</svg>