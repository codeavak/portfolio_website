<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Access review cycle</title>
  <desc id="desc">A diagram showing request, owner approval, time-boxed privilege, access review, and removal of stale entitlements.</desc>
  <rect width="1400" height="820" fill="#f8fbff"/>
  <text x="80" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#0f172a">Access review should remove drift</text>
  <text x="80" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#475569">If reviews only rubber-stamp existing permissions, they are ceremony, not control.</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="100" y="240" width="220" height="90" rx="18" fill="#ffffff" stroke="#93c5fd"/>
    <text x="152" y="294" font-size="24" font-weight="700" fill="#0f172a">Request</text>

    <rect x="390" y="240" width="220" height="90" rx="18" fill="#ffffff" stroke="#86efac"/>
    <text x="430" y="294" font-size="24" font-weight="700" fill="#0f172a">Owner approval</text>

    <rect x="680" y="240" width="220" height="90" rx="18" fill="#ffffff" stroke="#fde68a"/>
    <text x="726" y="294" font-size="24" font-weight="700" fill="#0f172a">Provision</text>

    <rect x="970" y="240" width="220" height="90" rx="18" fill="#ffffff" stroke="#fdba74"/>
    <text x="1002" y="294" font-size="24" font-weight="700" fill="#0f172a">Time-box / tag</text>

    <rect x="390" y="470" width="220" height="90" rx="18" fill="#ffffff" stroke="#c4b5fd"/>
    <text x="430" y="524" font-size="24" font-weight="700" fill="#0f172a">Recertify</text>

    <rect x="680" y="470" width="220" height="90" rx="18" fill="#ffffff" stroke="#fda4af"/>
    <text x="738" y="524" font-size="24" font-weight="700" fill="#0f172a">Remove stale</text>
  </g>

  <g stroke="#64748b" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M320 285 L390 285"/>
    <path d="M610 285 L680 285"/>
    <path d="M900 285 L970 285"/>
    <path d="M1080 330 C1070 405 970 485 900 510"/>
    <path d="M610 515 L680 515"/>
    <path d="M390 515 C285 500 200 430 170 330"/>
  </g>

  <rect x="120" y="650" width="1160" height="90" rx="18" fill="#0f172a"/>
  <text x="160" y="705" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#ffffff">Healthy review cycles do not just confirm access. They remove entitlements that no longer match business need.</text>
</svg>