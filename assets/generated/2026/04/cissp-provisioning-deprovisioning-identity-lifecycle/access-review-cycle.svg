<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Access review cycle</title>
  <desc id="desc">A diagram showing request, owner approval, provisioning, time-boxing, review, and removal of stale entitlements.</desc>
  <rect width="1400" height="820" fill="#f8fbff" />
  <text x="80" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#0f172a">A healthy access review cycle</text>
  <text x="80" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#475569">The goal is not paperwork. It is keeping entitlements aligned to current need.</text>

  <g font-family="Segoe UI, Arial, sans-serif" transform="translate(0,10)">
    <rect x="100" y="230" width="210" height="110" rx="20" fill="#eff6ff" stroke="#93c5fd" />
    <text x="150" y="275" font-size="28" font-weight="700" fill="#1d4ed8">Request</text>
    <text x="135" y="308" font-size="19" fill="#334155">document business need</text>

    <rect x="370" y="150" width="240" height="110" rx="20" fill="#f5f3ff" stroke="#c4b5fd" />
    <text x="415" y="195" font-size="28" font-weight="700" fill="#7c3aed">Owner approval</text>
    <text x="410" y="228" font-size="19" fill="#334155">check role and scope</text>

    <rect x="690" y="170" width="220" height="110" rx="20" fill="#ecfdf5" stroke="#86efac" />
    <text x="748" y="215" font-size="28" font-weight="700" fill="#15803d">Provision</text>
    <text x="720" y="248" font-size="19" fill="#334155">grant minimum access</text>

    <rect x="990" y="260" width="230" height="110" rx="20" fill="#fffbeb" stroke="#fcd34d" />
    <text x="1048" y="305" font-size="28" font-weight="700" fill="#b45309">Time-box</text>
    <text x="1018" y="338" font-size="19" fill="#334155">set expiry where possible</text>

    <rect x="860" y="470" width="250" height="110" rx="20" fill="#e0f2fe" stroke="#7dd3fc" />
    <text x="924" y="515" font-size="28" font-weight="700" fill="#0369a1">Review</text>
    <text x="895" y="548" font-size="19" fill="#334155">attest and revalidate</text>

    <rect x="450" y="520" width="260" height="110" rx="20" fill="#fdf2f8" stroke="#f9a8d4" />
    <text x="520" y="565" font-size="28" font-weight="700" fill="#be185d">Remove stale</text>
    <text x="488" y="598" font-size="19" fill="#334155">revoke what is no longer needed</text>
  </g>

  <g stroke-width="7" fill="none" stroke-linecap="round" stroke="#64748b">
    <path d="M310 285 C340 240, 350 220, 370 210" />
    <path d="M610 205 C645 200, 665 205, 690 220" />
    <path d="M910 240 C950 250, 970 260, 990 290" />
    <path d="M1090 370 C1095 410, 1075 450, 1035 470" />
    <path d="M860 565 C810 600, 760 615, 710 605" />
    <path d="M450 565 C365 535, 260 450, 220 340" />
  </g>

  <rect x="120" y="680" width="1160" height="85" rx="20" fill="#0f172a" />
  <text x="155" y="733" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#dbeafe">Review cycles catch permission creep, lingering vendor access, and emergency privileges that never got cleaned up.</text>
</svg>