<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Identity lifecycle security illustration</title>
  <desc id="desc">A clean diagram showing access request, approval, provisioning, review, and deprovisioning as part of secure identity lifecycle management.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f3a5a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1450" cy="120" r="120" fill="#dbeafe" opacity="0.55"/>
  <circle cx="120" cy="780" r="150" fill="#dcfce7" opacity="0.55"/>

  <text x="100" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700" fill="#0f172a">Access control is a lifecycle</text>
  <text x="100" y="162" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#334155">Request, approve, provision, review, and remove access with the same discipline.</text>

  <g filter="url(#shadow)">
    <rect x="90" y="270" rx="22" width="250" height="190" fill="#ffffff"/>
    <rect x="390" y="270" rx="22" width="250" height="190" fill="#ffffff"/>
    <rect x="690" y="270" rx="22" width="250" height="190" fill="#ffffff"/>
    <rect x="990" y="270" rx="22" width="250" height="190" fill="#ffffff"/>
    <rect x="1290" y="270" rx="22" width="220" height="190" fill="#ffffff"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="130" y="335" font-size="28" font-weight="700" fill="#0f172a">1. Request</text>
    <text x="130" y="375" font-size="20" fill="#475569">Role or task-based</text>
    <text x="130" y="405" font-size="20" fill="#475569">business need</text>

    <text x="430" y="335" font-size="28" font-weight="700" fill="#0f172a">2. Approve</text>
    <text x="430" y="375" font-size="20" fill="#475569">Manager or</text>
    <text x="430" y="405" font-size="20" fill="#475569">data owner sign-off</text>

    <text x="730" y="335" font-size="28" font-weight="700" fill="#0f172a">3. Provision</text>
    <text x="730" y="375" font-size="20" fill="#475569">Least-privilege</text>
    <text x="730" y="405" font-size="20" fill="#475569">baseline access</text>

    <text x="1030" y="335" font-size="28" font-weight="700" fill="#0f172a">4. Review</text>
    <text x="1030" y="375" font-size="20" fill="#475569">Recertify,</text>
    <text x="1030" y="405" font-size="20" fill="#475569">time-box, remove drift</text>

    <text x="1320" y="335" font-size="28" font-weight="700" fill="#0f172a">5. Remove</text>
    <text x="1320" y="375" font-size="20" fill="#475569">Deprovision</text>
    <text x="1320" y="405" font-size="20" fill="#475569">promptly</text>
  </g>

  <g stroke="#94a3b8" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M340 365 L385 365"/>
    <path d="M640 365 L685 365"/>
    <path d="M940 365 L985 365"/>
    <path d="M1240 365 L1285 365"/>
  </g>

  <rect x="250" y="570" width="1100" height="140" rx="24" fill="#0f172a" opacity="0.96"/>
  <text x="300" y="626" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Most permission problems are not created by attackers first.</text>
  <text x="300" y="668" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#dbeafe">They grow from lifecycle drift: too much access, too little review, and delayed cleanup.</text>
</svg>