<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-labelledby="title desc">
  <title id="title">Secure change control flow</title>
  <desc id="desc">Flow diagram showing request, risk review, testing, approval, implementation, validation, and documentation in a secure change process.</desc>
  <rect width="1000" height="600" fill="#0f172a" rx="24"/>
  <text x="60" y="68" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">What Secure Change Control Actually Looks Like</text>
  <text x="60" y="100" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="18">The point is not ritual. The point is controlled, visible, reversible change.</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    <rect x="60" y="170" width="120" height="62" rx="14" fill="#111827" stroke="#34d399"/>
    <text x="120" y="207" text-anchor="middle" fill="#bbf7d0">Request</text>

    <rect x="210" y="170" width="120" height="62" rx="14" fill="#111827" stroke="#60a5fa"/>
    <text x="270" y="207" text-anchor="middle" fill="#bfdbfe">Risk review</text>

    <rect x="360" y="170" width="120" height="62" rx="14" fill="#111827" stroke="#f59e0b"/>
    <text x="420" y="207" text-anchor="middle" fill="#fde68a">Test</text>

    <rect x="510" y="170" width="120" height="62" rx="14" fill="#111827" stroke="#a78bfa"/>
    <text x="570" y="207" text-anchor="middle" fill="#ddd6fe">Approve</text>

    <rect x="660" y="170" width="120" height="62" rx="14" fill="#111827" stroke="#f87171"/>
    <text x="720" y="207" text-anchor="middle" fill="#fecaca">Implement</text>

    <rect x="810" y="170" width="120" height="62" rx="14" fill="#111827" stroke="#22c55e"/>
    <text x="870" y="207" text-anchor="middle" fill="#bbf7d0">Validate</text>

    <line x1="180" y1="201" x2="210" y2="201" stroke="#475569" stroke-width="4"/>
    <line x1="330" y1="201" x2="360" y2="201" stroke="#475569" stroke-width="4"/>
    <line x1="480" y1="201" x2="510" y2="201" stroke="#475569" stroke-width="4"/>
    <line x1="630" y1="201" x2="660" y2="201" stroke="#475569" stroke-width="4"/>
    <line x1="780" y1="201" x2="810" y2="201" stroke="#475569" stroke-width="4"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="16">
    <rect x="110" y="315" width="780" height="180" rx="18" fill="#111827" stroke="#334155"/>
    <text x="145" y="358" fill="#e5e7eb">• Security-sensitive changes get explicit impact analysis, not assumptions.</text>
    <text x="145" y="392" fill="#e5e7eb">• Testing checks both intended behavior and likely failure modes.</text>
    <text x="145" y="426" fill="#e5e7eb">• Rollback and ownership are clear before production implementation.</text>
    <text x="145" y="460" fill="#e5e7eb">• Documentation preserves traceability, accountability, and troubleshooting value.</text>
  </g>
</svg>
