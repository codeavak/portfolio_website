<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Change management security control hero image</title>
  <desc id="desc">Editorial illustration showing a secure change management workflow with request, review, testing, approval, deployment, and validation around a production environment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#09111f"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#08101d" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#102341" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1030" cy="110" r="150" fill="#60a5fa" opacity="0.10"/>
  <circle cx="150" cy="520" r="170" fill="#22c55e" opacity="0.08"/>
  <rect x="58" y="56" width="1084" height="518" rx="28" fill="url(#panel)" stroke="#93c5fd" stroke-opacity="0.22"/>

  <text x="100" y="145" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">CISSP #17</text>
  <text x="100" y="205" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">Change Management Is a</text>
  <text x="100" y="250" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">Security Control</text>
  <text x="100" y="304" fill="#c7dbff" font-family="Segoe UI, Arial, sans-serif" font-size="22">Request, review, test, approve, deploy, and validate — fast without losing control.</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    <rect x="655" y="108" width="120" height="54" rx="12" fill="#111827" stroke="#34d399"/>
    <text x="715" y="141" text-anchor="middle" fill="#bbf7d0">Request</text>

    <rect x="828" y="108" width="120" height="54" rx="12" fill="#111827" stroke="#60a5fa"/>
    <text x="888" y="141" text-anchor="middle" fill="#bfdbfe">Review</text>

    <rect x="742" y="196" width="120" height="54" rx="12" fill="#111827" stroke="#f59e0b"/>
    <text x="802" y="229" text-anchor="middle" fill="#fde68a">Test</text>

    <rect x="655" y="285" width="120" height="54" rx="12" fill="#111827" stroke="#a78bfa"/>
    <text x="715" y="318" text-anchor="middle" fill="#ddd6fe">Approve</text>

    <rect x="828" y="285" width="120" height="54" rx="12" fill="#111827" stroke="#f87171"/>
    <text x="888" y="318" text-anchor="middle" fill="#fecaca">Deploy</text>

    <rect x="742" y="375" width="120" height="54" rx="12" fill="#111827" stroke="#22c55e"/>
    <text x="802" y="408" text-anchor="middle" fill="#bbf7d0">Validate</text>

    <line x1="775" y1="135" x2="828" y2="135" stroke="#60a5fa" stroke-width="4"/>
    <line x1="888" y1="162" x2="818" y2="196" stroke="#f59e0b" stroke-width="4"/>
    <line x1="775" y1="250" x2="715" y2="285" stroke="#a78bfa" stroke-width="4"/>
    <line x1="775" y1="312" x2="828" y2="312" stroke="#f87171" stroke-width="4"/>
    <line x1="888" y1="340" x2="818" y2="375" stroke="#22c55e" stroke-width="4"/>

    <rect x="640" y="470" width="325" height="58" rx="14" fill="#0f172a" stroke="#334155"/>
    <text x="802" y="505" text-anchor="middle" fill="#e5e7eb">Fast is fine. Uncontrolled is not.</text>
  </g>
</svg>
