<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Deliberate hash map uses</title>
  <desc id="desc">Three panels show counting events, joining records by id, and deduplicating request ids.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f1e7"/>
      <stop offset="100%" stop-color="#dde8ea"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="820" fill="url(#bg)"/>
  <text x="90" y="100" font-family="Georgia, serif" font-size="48" fill="#17313a">Where hash maps pay rent</text>
  <g font-family="Georgia, serif" fill="#17313a">
    <rect x="85" y="160" width="380" height="540" rx="28" fill="#fffaf3" stroke="#d8cab1" stroke-width="3"/>
    <rect x="510" y="160" width="380" height="540" rx="28" fill="#fffaf3" stroke="#c5d5d9" stroke-width="3"/>
    <rect x="935" y="160" width="380" height="540" rx="28" fill="#fffaf3" stroke="#d8cab1" stroke-width="3"/>
    <text x="140" y="230" font-size="36">Count and group</text>
    <text x="560" y="230" font-size="36">Build an index</text>
    <text x="990" y="230" font-size="36">Deduplicate work</text>
  </g>
  <g font-family="'Courier New', monospace" font-size="24" fill="#17313a">
    <rect x="130" y="285" width="120" height="54" rx="10" fill="#f0ddcf"/>
    <text x="155" y="320">500</text>
    <rect x="270" y="285" width="120" height="54" rx="10" fill="#dce8ea"/>
    <text x="295" y="320">42</text>
    <rect x="130" y="365" width="120" height="54" rx="10" fill="#f0ddcf"/>
    <text x="155" y="400">404</text>
    <rect x="270" y="365" width="120" height="54" rx="10" fill="#dce8ea"/>
    <text x="295" y="400">18</text>
    <rect x="130" y="445" width="120" height="54" rx="10" fill="#f0ddcf"/>
    <text x="155" y="480">503</text>
    <rect x="270" y="445" width="120" height="54" rx="10" fill="#dce8ea"/>
    <text x="295" y="480">7</text>
    <text x="130" y="585">Increment by key,</text>
    <text x="130" y="620">instead of rescanning the stream.</text>

    <rect x="555" y="285" width="130" height="54" rx="10" fill="#f0ddcf"/>
    <text x="575" y="320">cust-17</text>
    <rect x="715" y="285" width="120" height="54" rx="10" fill="#dce8ea"/>
    <text x="745" y="320">Nikki</text>
    <rect x="555" y="365" width="130" height="54" rx="10" fill="#f0ddcf"/>
    <text x="575" y="400">cust-42</text>
    <rect x="715" y="365" width="120" height="54" rx="10" fill="#dce8ea"/>
    <text x="745" y="400">Ava</text>
    <rect x="555" y="445" width="130" height="54" rx="10" fill="#f0ddcf"/>
    <text x="575" y="480">cust-88</text>
    <rect x="715" y="445" width="120" height="54" rx="10" fill="#dce8ea"/>
    <text x="745" y="480">Leo</text>
    <text x="555" y="585">Index once by id,</text>
    <text x="555" y="620">then join without nested scans.</text>

    <rect x="980" y="285" width="225" height="54" rx="10" fill="#f0ddcf"/>
    <text x="1005" y="320">req-18f3d1</text>
    <rect x="980" y="365" width="225" height="54" rx="10" fill="#f0ddcf"/>
    <text x="1005" y="400">req-991ab2</text>
    <rect x="980" y="445" width="225" height="54" rx="10" fill="#dce8ea"/>
    <text x="1005" y="480">seen? yes/no</text>
    <text x="980" y="585">Membership by key turns</text>
    <text x="980" y="620">duplicate handling into one lookup.</text>
  </g>
</svg>