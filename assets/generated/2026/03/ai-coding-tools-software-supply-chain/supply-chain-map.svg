<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-label="Modern AI coding supply chain map">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09111b"/>
      <stop offset="100%" stop-color="#12263e"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6eb8ff"/>
      <stop offset="100%" stop-color="#51e1cb"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="760" rx="34" fill="url(#bg)"/>
  <g font-family="Inter, Segoe UI, sans-serif">
    <text x="74" y="90" fill="#e7f1fc" font-size="30" font-weight="700">The modern AI coding supply chain</text>
    <text x="74" y="128" fill="#98aec8" font-size="18">External providers and internal controls meet in the middle of the workflow.</text>
  </g>

  <g font-family="Inter, Segoe UI, sans-serif">
    <rect x="82" y="196" width="220" height="392" rx="28" fill="#0f1a2b" stroke="#33506f"/>
    <text x="112" y="252" fill="#ecf5ff" font-size="26" font-weight="700">Inputs</text>
    <rect x="112" y="286" width="160" height="72" rx="18" fill="#132942" stroke="#3c648b"/>
    <text x="192" y="328" text-anchor="middle" fill="#d9ebfd" font-size="18" font-weight="700">Model</text>
    <rect x="112" y="380" width="160" height="72" rx="18" fill="#132942" stroke="#3c648b"/>
    <text x="192" y="422" text-anchor="middle" fill="#d9ebfd" font-size="18" font-weight="700">Tool server</text>
    <rect x="112" y="474" width="160" height="72" rx="18" fill="#132942" stroke="#3c648b"/>
    <text x="192" y="516" text-anchor="middle" fill="#d9ebfd" font-size="18" font-weight="700">Context source</text>

    <rect x="392" y="164" width="616" height="456" rx="32" fill="#0e1725" stroke="#35567d"/>
    <text x="430" y="228" fill="#ecf5ff" font-size="28" font-weight="700">AI coding tool</text>
    <text x="430" y="264" fill="#98aec8" font-size="18">The trust boundary is not only the model. It is the whole workflow.</text>
    <rect x="438" y="316" width="156" height="112" rx="22" fill="#132942" stroke="#3c648b"/>
    <text x="516" y="366" text-anchor="middle" fill="#eef6ff" font-size="20" font-weight="700">Read</text>
    <text x="516" y="394" text-anchor="middle" fill="#a5bcd4" font-size="15">repo, docs, tickets</text>
    <rect x="622" y="316" width="156" height="112" rx="22" fill="#132942" stroke="#3c648b"/>
    <text x="700" y="366" text-anchor="middle" fill="#eef6ff" font-size="20" font-weight="700">Reason</text>
    <text x="700" y="394" text-anchor="middle" fill="#a5bcd4" font-size="15">plan, compare, draft</text>
    <rect x="806" y="316" width="156" height="112" rx="22" fill="#132942" stroke="#3c648b"/>
    <text x="884" y="366" text-anchor="middle" fill="#eef6ff" font-size="20" font-weight="700">Act</text>
    <text x="884" y="394" text-anchor="middle" fill="#a5bcd4" font-size="15">edit, run, propose</text>
    <text x="430" y="494" fill="#98aec8" font-size="18">Security-minded questions:</text>
    <text x="430" y="526" fill="#dbeafe" font-size="17">1. What external systems can influence output?</text>
    <text x="430" y="554" fill="#dbeafe" font-size="17">2. Which permissions exist at each step?</text>
    <text x="430" y="582" fill="#dbeafe" font-size="17">3. Which checks stand between output and merge?</text>

    <rect x="1098" y="196" width="220" height="392" rx="28" fill="#0f1a2b" stroke="#33506f"/>
    <text x="1128" y="252" fill="#ecf5ff" font-size="26" font-weight="700">Controls</text>
    <rect x="1128" y="286" width="160" height="72" rx="18" fill="#132942" stroke="#3c648b"/>
    <text x="1208" y="328" text-anchor="middle" fill="#d9ebfd" font-size="18" font-weight="700">CI gates</text>
    <rect x="1128" y="380" width="160" height="72" rx="18" fill="#132942" stroke="#3c648b"/>
    <text x="1208" y="422" text-anchor="middle" fill="#d9ebfd" font-size="18" font-weight="700">Review</text>
    <rect x="1128" y="474" width="160" height="72" rx="18" fill="#132942" stroke="#3c648b"/>
    <text x="1208" y="516" text-anchor="middle" fill="#d9ebfd" font-size="18" font-weight="700">Rollback</text>
  </g>

  <g stroke="url(#flow)" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M302 392 H392"/>
    <path d="M1008 392 H1098"/>
  </g>

  <g font-family="Inter, Segoe UI, sans-serif">
    <rect x="82" y="638" width="1236" height="74" rx="22" fill="#101d2f" stroke="#35567d"/>
    <text x="112" y="684" fill="#dbeafd" font-size="18">This is the practical shift: AI coding tools no longer sit outside the delivery chain. They sit inside it, alongside the places where trust can be strengthened or lost.</text>
  </g>
</svg>
