<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" width="860" height="340">
  <rect width="860" height="340" fill="#0f172a"/>

  <!-- Title -->
  <text x="430" y="36" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#f8fafc" text-anchor="middle">Governance in Action: Who Decides?</text>

  <!-- Box: Risk identified -->
  <rect x="40" y="60" width="180" height="80" rx="6" fill="#1a2744"/>
  <rect x="40" y="60" width="180" height="6" rx="3" fill="#3b82f6"/>
  <text x="130" y="95" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#93c5fd" text-anchor="middle">Risk Identified</text>
  <text x="130" y="113" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Network segmentation</text>
  <text x="130" y="128" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">missing before audit</text>

  <!-- Arrow 1 -->
  <line x1="222" y1="100" x2="268" y2="100" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box: Policy check -->
  <rect x="270" y="60" width="180" height="80" rx="6" fill="#1a2a1a"/>
  <rect x="270" y="60" width="180" height="6" rx="3" fill="#22c55e"/>
  <text x="360" y="95" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#86efac" text-anchor="middle">Policy Check</text>
  <text x="360" y="113" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Does policy allow</text>
  <text x="360" y="128" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">deferring this risk?</text>

  <!-- Arrow 2 -->
  <line x1="452" y1="100" x2="498" y2="100" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box: Authority question -->
  <rect x="500" y="60" width="180" height="80" rx="6" fill="#2a1a1a"/>
  <rect x="500" y="60" width="180" height="6" rx="3" fill="#f59e0b"/>
  <text x="590" y="95" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#fcd34d" text-anchor="middle">Authority Question</text>
  <text x="590" y="113" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Who has authority</text>
  <text x="590" y="128" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">to accept this risk?</text>

  <!-- Arrow 3 -->
  <line x1="682" y1="100" x2="728" y2="100" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box: Decision + documentation -->
  <rect x="730" y="60" width="94" height="80" rx="6" fill="#1e1333"/>
  <rect x="730" y="60" width="94" height="6" rx="3" fill="#a855f7"/>
  <text x="777" y="95" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#d8b4fe" text-anchor="middle">Decision</text>
  <text x="777" y="113" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Document</text>
  <text x="777" y="128" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">it. Due care.</text>

  <!-- Bottom annotation -->
  <text x="430" y="185" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">The CTO cannot unilaterally defer a risk the policy marks as non-deferrable.</text>
  <text x="430" y="203" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Governance defines who decides — and how that decision gets recorded.</text>

  <!-- Due care / due diligence callout -->
  <rect x="120" y="236" width="270" height="72" rx="6" fill="#161f2c"/>
  <rect x="120" y="236" width="7" height="72" rx="3" fill="#0ea5e9"/>
  <text x="140" y="260" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#7dd3fc">Due Diligence</text>
  <text x="140" y="278" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Research before acting.</text>
  <text x="140" y="295" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Vendor review, risk assessment.</text>

  <rect x="466" y="236" width="270" height="72" rx="6" fill="#161f2c"/>
  <rect x="466" y="236" width="7" height="72" rx="3" fill="#14b8a6"/>
  <text x="486" y="260" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#5eead4">Due Care</text>
  <text x="486" y="278" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Ongoing reasonable protection.</text>
  <text x="486" y="295" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Monitoring, patching, reviewing access.</text>

  <!-- Arrow marker def -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
