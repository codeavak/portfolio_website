<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
  <rect width="900" height="480" fill="#0f172a"/>

  <!-- Title -->
  <text x="450" y="48" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#f8fafc" text-anchor="middle">Security Governance</text>
  <text x="450" y="72" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">How strategy becomes action — and who owns each level</text>

  <!-- Policy -->
  <rect x="80" y="96" width="740" height="72" rx="6" fill="#1e3a5f"/>
  <rect x="80" y="96" width="7" height="72" rx="3" fill="#3b82f6"/>
  <text x="108" y="125" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#93c5fd">POLICY</text>
  <text x="108" y="147" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Sets direction. Management-owned. Technology-neutral. Mandatory.</text>
  <text x="812" y="136" font-family="system-ui, sans-serif" font-size="11" fill="#475569" text-anchor="end">Executive / Board</text>

  <!-- Standards -->
  <rect x="80" y="180" width="740" height="72" rx="6" fill="#172e3f"/>
  <rect x="80" y="180" width="7" height="72" rx="3" fill="#0ea5e9"/>
  <text x="108" y="209" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#7dd3fc">STANDARDS</text>
  <text x="108" y="231" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Specific mandatory requirements supporting each policy. Measurable and enforceable.</text>
  <text x="812" y="220" font-family="system-ui, sans-serif" font-size="11" fill="#475569" text-anchor="end">Security Leadership</text>

  <!-- Baselines -->
  <rect x="80" y="264" width="740" height="72" rx="6" fill="#14272a"/>
  <rect x="80" y="264" width="7" height="72" rx="3" fill="#14b8a6"/>
  <text x="108" y="293" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#5eead4">BASELINES</text>
  <text x="108" y="315" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Minimum security configurations applied consistently to a class of systems.</text>
  <text x="812" y="304" font-family="system-ui, sans-serif" font-size="11" fill="#475569" text-anchor="end">Security / Operations</text>

  <!-- Procedures -->
  <rect x="80" y="348" width="536" height="72" rx="6" fill="#1a1e2e"/>
  <rect x="80" y="348" width="7" height="72" rx="3" fill="#6366f1"/>
  <text x="108" y="377" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#a5b4fc">PROCEDURES</text>
  <text x="108" y="399" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Step-by-step instructions for implementing standards and baselines.</text>

  <!-- Guidelines — advisory, visually separated -->
  <rect x="628" y="348" width="192" height="72" rx="6" fill="#1e1b0f"/>
  <rect x="628" y="348" width="7" height="72" rx="3" fill="#ca8a04"/>
  <text x="648" y="377" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#fde68a">GUIDELINES</text>
  <text x="648" y="397" font-family="system-ui, sans-serif" font-size="11" fill="#78716c">Advisory only — not mandatory.</text>
  <text x="648" y="412" font-family="system-ui, sans-serif" font-size="11" fill="#57534e">Recommended practices.</text>

  <!-- Mandatory/Advisory footer -->
  <line x1="80" y1="448" x2="820" y2="448" stroke="#1e293b" stroke-width="1"/>
  <text x="84" y="464" font-family="system-ui, sans-serif" font-size="11" fill="#334155">← MANDATORY (top four tiers enforced)</text>
  <text x="816" y="464" font-family="system-ui, sans-serif" font-size="11" fill="#334155" text-anchor="end">ADVISORY (guidelines only) →</text>
</svg>
