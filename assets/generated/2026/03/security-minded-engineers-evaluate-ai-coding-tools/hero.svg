<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 920" role="img" aria-label="Security-minded evaluation of AI coding tools">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111d"/>
      <stop offset="55%" stop-color="#102238"/>
      <stop offset="100%" stop-color="#16324d"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6db8ff"/>
      <stop offset="100%" stop-color="#4fe1cc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1600" height="920" rx="36" fill="url(#bg)"/>
  <circle cx="1260" cy="140" r="240" fill="#2563eb" opacity="0.12"/>
  <circle cx="260" cy="800" r="270" fill="#14b8a6" opacity="0.10"/>

  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <path d="M0 170 H1600"/>
    <path d="M0 340 H1600"/>
    <path d="M0 510 H1600"/>
    <path d="M0 680 H1600"/>
    <path d="M300 0 V920"/>
    <path d="M650 0 V920"/>
    <path d="M1000 0 V920"/>
    <path d="M1350 0 V920"/>
  </g>

  <g font-family="Inter, Segoe UI, sans-serif">
    <text x="84" y="92" fill="#e9f2fc" font-size="30" font-weight="700">How security-minded engineers evaluate AI coding tools</text>
    <text x="84" y="130" fill="#97afc8" font-size="18">They do not start with speed. They start with trust boundaries.</text>
  </g>

  <g filter="url(#shadow)" font-family="Inter, Segoe UI, sans-serif">
    <rect x="460" y="188" width="680" height="500" rx="34" fill="#0e1725" stroke="#35567d"/>
    <text x="500" y="252" fill="#e7f1fc" font-size="30" font-weight="700">AI coding workflow</text>
    <text x="500" y="290" fill="#97afc8" font-size="18">Useful output matters. Controlled behavior matters more.</text>

    <rect x="532" y="344" width="536" height="224" rx="28" fill="#11253a" stroke="#3b6188"/>
    <rect x="570" y="388" width="136" height="92" rx="20" fill="#132b44" stroke="#41688f"/>
    <text x="638" y="442" text-anchor="middle" fill="#eff6ff" font-size="20" font-weight="700">Read</text>
    <text x="638" y="468" text-anchor="middle" fill="#a4bbd3" font-size="15">repo and docs</text>
    <rect x="732" y="388" width="136" height="92" rx="20" fill="#132b44" stroke="#41688f"/>
    <text x="800" y="442" text-anchor="middle" fill="#eff6ff" font-size="20" font-weight="700">Reason</text>
    <text x="800" y="468" text-anchor="middle" fill="#a4bbd3" font-size="15">plan and compare</text>
    <rect x="894" y="388" width="136" height="92" rx="20" fill="#132b44" stroke="#41688f"/>
    <text x="962" y="442" text-anchor="middle" fill="#eff6ff" font-size="20" font-weight="700">Act</text>
    <text x="962" y="468" text-anchor="middle" fill="#a4bbd3" font-size="15">edit or propose</text>
    <text x="532" y="620" fill="#97afc8" font-size="18">The important question is not only what the model can do.</text>
    <text x="532" y="648" fill="#97afc8" font-size="18">It is what the surrounding system allows it to touch.</text>

    <rect x="110" y="248" width="270" height="152" rx="28" fill="#0f1a2b" stroke="#324e6d"/>
    <text x="142" y="300" fill="#e7f1fc" font-size="28" font-weight="700">Context</text>
    <text x="142" y="338" fill="#97afc8" font-size="18">What data, code, and docs</text>
    <text x="142" y="364" fill="#97afc8" font-size="18">can the tool actually see?</text>

    <rect x="1220" y="248" width="270" height="152" rx="28" fill="#0f1a2b" stroke="#324e6d"/>
    <text x="1252" y="300" fill="#e7f1fc" font-size="28" font-weight="700">Permissions</text>
    <text x="1252" y="338" fill="#97afc8" font-size="18">What actions can it take</text>
    <text x="1252" y="364" fill="#97afc8" font-size="18">without asking first?</text>

    <rect x="140" y="520" width="300" height="160" rx="28" fill="#0f1a2b" stroke="#324e6d"/>
    <text x="172" y="576" fill="#e7f1fc" font-size="28" font-weight="700">Validation</text>
    <text x="172" y="614" fill="#97afc8" font-size="18">Which checks stand between</text>
    <text x="172" y="640" fill="#97afc8" font-size="18">output and the default branch?</text>

    <rect x="1160" y="520" width="300" height="160" rx="28" fill="#0f1a2b" stroke="#324e6d"/>
    <text x="1192" y="576" fill="#e7f1fc" font-size="28" font-weight="700">Provenance</text>
    <text x="1192" y="614" fill="#97afc8" font-size="18">What evidence will we have</text>
    <text x="1192" y="640" fill="#97afc8" font-size="18">if something goes wrong later?</text>
  </g>

  <g stroke="url(#flow)" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M380 324 C428 324 430 400 460 438"/>
    <path d="M1220 324 C1172 324 1170 400 1140 438"/>
    <path d="M440 600 C492 600 520 568 532 540"/>
    <path d="M1160 600 C1108 600 1080 568 1068 540"/>
  </g>

  <g font-family="Inter, Segoe UI, sans-serif" filter="url(#shadow)">
    <rect x="430" y="750" width="740" height="96" rx="26" fill="#101d2f" stroke="#3a6188"/>
    <text x="800" y="792" text-anchor="middle" fill="#eef6ff" font-size="26" font-weight="700">The security-minded default is clarity</text>
    <text x="800" y="822" text-anchor="middle" fill="#9fb5cd" font-size="18">See the workflow clearly enough to ask the right questions before the incident review does.</text>
  </g>
</svg>
