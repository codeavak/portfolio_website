<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-label="Control ladder for AI coding tools">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09111b"/>
      <stop offset="100%" stop-color="#13263e"/>
    </linearGradient>
    <linearGradient id="low" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="mid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="high" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="820" rx="34" fill="url(#bg)"/>
  <g font-family="Inter, Segoe UI, sans-serif">
    <text x="78" y="94" fill="#e8f1fc" font-size="30" font-weight="700">A practical control ladder</text>
    <text x="78" y="132" fill="#98aec8" font-size="18">Not every AI-assisted task deserves the same autonomy.</text>
  </g>

  <g font-family="Inter, Segoe UI, sans-serif">
    <rect x="104" y="584" width="1192" height="116" rx="30" fill="#0f1a2b" stroke="#35567d"/>
    <rect x="160" y="614" width="250" height="56" rx="18" fill="url(#low)"/>
    <text x="285" y="649" text-anchor="middle" fill="#07111c" font-size="18" font-weight="700">Drafting and explanation</text>
    <text x="452" y="649" fill="#d8ebfd" font-size="17">Normal review is usually enough.</text>

    <rect x="188" y="436" width="1024" height="116" rx="30" fill="#0f1a2b" stroke="#35567d"/>
    <rect x="244" y="466" width="250" height="56" rx="18" fill="url(#mid)"/>
    <text x="369" y="501" text-anchor="middle" fill="#07111c" font-size="18" font-weight="700">Repo edits and PR drafts</text>
    <text x="536" y="501" fill="#d8ebfd" font-size="17">Scoped branches, deterministic checks, human review.</text>

    <rect x="284" y="288" width="832" height="116" rx="30" fill="#0f1a2b" stroke="#35567d"/>
    <rect x="340" y="318" width="250" height="56" rx="18" fill="url(#high)"/>
    <text x="465" y="353" text-anchor="middle" fill="#07111c" font-size="18" font-weight="700">External tools and network use</text>
    <text x="632" y="353" fill="#d8ebfd" font-size="17">Review scopes, log usage, and keep explicit approvals.</text>

    <rect x="380" y="140" width="640" height="116" rx="30" fill="#0f1a2b" stroke="#35567d"/>
    <rect x="436" y="170" width="250" height="56" rx="18" fill="url(#high)"/>
    <text x="561" y="205" text-anchor="middle" fill="#07111c" font-size="18" font-weight="700">Auth, infra, secrets, data paths</text>
    <text x="728" y="205" fill="#d8ebfd" font-size="17">Keep human-led or behind strong approvals and isolation.</text>
  </g>

  <g stroke="#6db8ff" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M700 584 V558"/>
    <path d="M716 436 V410"/>
    <path d="M732 288 V262"/>
  </g>

  <g font-family="Inter, Segoe UI, sans-serif">
    <text x="1098" y="646" fill="#85f0bf" font-size="16" font-weight="700">Lower consequence</text>
    <text x="1126" y="498" fill="#f4d38c" font-size="16" font-weight="700">More control needed</text>
    <text x="1118" y="350" fill="#f7b48f" font-size="16" font-weight="700">New trust boundaries</text>
    <text x="1088" y="202" fill="#f7a5b7" font-size="16" font-weight="700">Highest-impact systems</text>
  </g>

  <g font-family="Inter, Segoe UI, sans-serif">
    <rect x="104" y="734" width="1192" height="46" rx="16" fill="#101d2f" stroke="#35567d"/>
    <text x="700" y="763" text-anchor="middle" fill="#dbeafd" font-size="17">Security-minded teams do not remove human judgment. They place it where the consequence is highest.</text>
  </g>
</svg>
