<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1324"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 800 48px Inter, Segoe UI, Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 24px Inter, Segoe UI, Arial, sans-serif; fill: #CBD5E1; }
      .step { font: 800 30px Inter, Segoe UI, Arial, sans-serif; fill: #F8FAFC; }
      .body { font: 500 20px Inter, Segoe UI, Arial, sans-serif; fill: #E5E7EB; }
      .caps { font: 800 18px Inter, Segoe UI, Arial, sans-serif; letter-spacing: 1.4px; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="100" y="105" class="title">Minimum viable secrets posture</text>
  <text x="100" y="150" class="subtitle">Smaller teams do not need maximum ceremony. They do need a control model they can operate consistently.</text>

  <rect x="120" y="640" width="280" height="160" rx="30" fill="#3F1D1D" stroke="#F87171" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="700" text-anchor="middle" class="step">1. Hard-coded</text>
  <text x="260" y="735" text-anchor="middle" class="body">Fastest path to repo and code review exposure.</text>

  <rect x="460" y="510" width="280" height="160" rx="30" fill="#422006" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="570" text-anchor="middle" class="step">2. Env vars only</text>
  <text x="600" y="605" text-anchor="middle" class="body">Better placement, weak audit and lifecycle control.</text>

  <rect x="800" y="380" width="280" height="160" rx="30" fill="#11302A" stroke="#2DD4BF" stroke-width="2" filter="url(#shadow)"/>
  <text x="940" y="440" text-anchor="middle" class="step">3. Vault + identity</text>
  <text x="940" y="475" text-anchor="middle" class="body">Scoped retrieval through workload identity.</text>

  <rect x="1140" y="250" width="320" height="190" rx="30" fill="#0F3A2B" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <text x="1300" y="315" text-anchor="middle" class="step">4. Rotation + monitoring</text>
  <text x="1300" y="352" text-anchor="middle" class="body">Logs, alerts, versioning, and a real owner.</text>
  <text x="1300" y="386" text-anchor="middle" class="body">This is the credible baseline.</text>

  <path d="M400 680 L 460 620" stroke="#F59E0B" stroke-width="12" stroke-linecap="round"/>
  <path d="M740 550 L 800 490" stroke="#2DD4BF" stroke-width="12" stroke-linecap="round"/>
  <path d="M1080 420 L 1140 360" stroke="#22C55E" stroke-width="12" stroke-linecap="round"/>

  <circle cx="430" cy="650" r="18" fill="#F59E0B"/>
  <circle cx="770" cy="520" r="18" fill="#2DD4BF"/>
  <circle cx="1110" cy="390" r="18" fill="#22C55E"/>

  <rect x="120" y="205" width="760" height="110" rx="26" fill="#0F172A" stroke="#334155" stroke-width="2"/>
  <text x="500" y="252" text-anchor="middle" class="caps" fill="#E2E8F0">GOOD ENOUGH FOR A SMALL TEAM</text>
  <text x="500" y="290" text-anchor="middle" class="body">One managed secret store, per-workload scoping, logs enabled, and rotation with an owner.</text>

  <rect x="120" y="825" width="1340" height="40" rx="20" fill="#111827" stroke="#334155" stroke-width="1.5"/>
  <text x="790" y="852" text-anchor="middle" class="caps" fill="#CBD5E1">THE GOAL IS NOT ENTERPRISE THEATER. THE GOAL IS FASTER CONTAINMENT, CLEANER ACCESS BOUNDARIES, AND SAFER ROTATION.</text>
</svg>