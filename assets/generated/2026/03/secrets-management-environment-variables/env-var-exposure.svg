<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 800 48px Inter, Segoe UI, Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 24px Inter, Segoe UI, Arial, sans-serif; fill: #CBD5E1; }
      .label { font: 700 26px Inter, Segoe UI, Arial, sans-serif; fill: #F8FAFC; }
      .small { font: 500 18px Inter, Segoe UI, Arial, sans-serif; fill: #CBD5E1; }
      .caps { font: 800 18px Inter, Segoe UI, Arial, sans-serif; letter-spacing: 1.4px; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="100" y="105" class="title">Where environment-variable secrets spread</text>
  <text x="100" y="150" class="subtitle">One runtime secret can leak through several operational paths without deliberate sharing.</text>

  <rect x="610" y="250" width="380" height="210" rx="34" fill="#0F172A" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <text x="800" y="305" text-anchor="middle" class="caps" fill="#FDBA74">PROCESS ENVIRONMENT</text>
  <rect x="700" y="335" width="200" height="64" rx="18" fill="#1F2937" stroke="#F59E0B" stroke-width="2"/>
  <text x="800" y="376" text-anchor="middle" class="label" fill="#FFEDD5">DB_PASSWORD</text>
  <text x="800" y="425" text-anchor="middle" class="small">Convenient to inject, broad in runtime exposure</text>

  <rect x="120" y="250" width="270" height="130" rx="28" fill="#102132" stroke="#60A5FA" stroke-width="2" filter="url(#shadow)"/>
  <text x="255" y="310" text-anchor="middle" class="label">Startup logs</text>
  <text x="255" y="345" text-anchor="middle" class="small">Verbose config output</text>

  <rect x="1200" y="250" width="270" height="130" rx="28" fill="#102132" stroke="#34D399" stroke-width="2" filter="url(#shadow)"/>
  <text x="1335" y="310" text-anchor="middle" class="label">Crash dumps</text>
  <text x="1335" y="345" text-anchor="middle" class="small">Diagnostics and memory capture</text>

  <rect x="120" y="560" width="270" height="130" rx="28" fill="#102132" stroke="#818CF8" stroke-width="2" filter="url(#shadow)"/>
  <text x="255" y="620" text-anchor="middle" class="label">Child processes</text>
  <text x="255" y="655" text-anchor="middle" class="small">Inherited by scripts and tools</text>

  <rect x="1200" y="560" width="270" height="130" rx="28" fill="#102132" stroke="#F472B6" stroke-width="2" filter="url(#shadow)"/>
  <text x="1335" y="620" text-anchor="middle" class="label">Container inspect</text>
  <text x="1335" y="655" text-anchor="middle" class="small">Orchestrator metadata visibility</text>

  <path d="M610 345 C 520 345, 430 330, 390 315" stroke="#60A5FA" stroke-width="8" fill="none" stroke-linecap="round"/>
  <polygon points="395,300 365,312 392,328" fill="#60A5FA"/>

  <path d="M990 345 C 1080 345, 1170 330, 1210 315" stroke="#34D399" stroke-width="8" fill="none" stroke-linecap="round"/>
  <polygon points="1205,300 1235,312 1208,328" fill="#34D399"/>

  <path d="M610 405 C 500 450, 420 525, 390 590" stroke="#818CF8" stroke-width="8" fill="none" stroke-linecap="round"/>
  <polygon points="377,580 387,612 405,589" fill="#818CF8"/>

  <path d="M990 405 C 1100 450, 1180 525, 1210 590" stroke="#F472B6" stroke-width="8" fill="none" stroke-linecap="round"/>
  <polygon points="1195,589 1213,612 1223,580" fill="#F472B6"/>

  <rect x="470" y="600" width="660" height="140" rx="30" fill="#0F172A" stroke="#334155" stroke-width="2"/>
  <text x="800" y="655" text-anchor="middle" class="label" fill="#F8FAFC">The problem is not one leak path.</text>
  <text x="800" y="695" text-anchor="middle" class="small">It is that environment variables turn the secret into general process state, so many tools can expose it by accident.</text>
</svg>