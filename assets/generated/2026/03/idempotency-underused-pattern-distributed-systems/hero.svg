<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glowBlue" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#60A5FA" flood-opacity="0.55"/>
    </filter>
    <filter id="glowGreen" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#34D399" flood-opacity="0.55"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#60A5FA"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#34D399"/>
    </marker>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#94A3B8"/>
    </marker>
    <style>
      .bg { fill: url(#bgGrad); }
      .panel { fill: url(#cardGrad); stroke: rgba(148,163,184,.18); stroke-width: 2; rx: 28; }
      .title { font: 700 42px Inter, Segoe UI, Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 22px Inter, Segoe UI, Arial, sans-serif; fill: #CBD5E1; }
      .section { font: 700 24px Inter, Segoe UI, Arial, sans-serif; fill: #E2E8F0; letter-spacing: .4px; }
      .body { font: 500 22px Inter, Segoe UI, Arial, sans-serif; fill: #E2E8F0; }
      .small { font: 500 18px Inter, Segoe UI, Arial, sans-serif; fill: #CBD5E1; }
      .mono { font: 600 20px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #E2E8F0; }
      .label { font: 700 20px Inter, Segoe UI, Arial, sans-serif; fill: #0F172A; }
      .caps { font: 800 18px Inter, Segoe UI, Arial, sans-serif; letter-spacing: 1.4px; }
    </style>
</defs>
<rect class="bg" x="0" y="0" width="1600" height="900"/>
<g opacity="0.12"><line x1="120" y1="120" x2="60" y2="860" stroke="#1E293B" stroke-width="1"/><line x1="240" y1="120" x2="180" y2="860" stroke="#1E293B" stroke-width="1"/><line x1="360" y1="120" x2="300" y2="860" stroke="#1E293B" stroke-width="1"/><line x1="480" y1="120" x2="420" y2="860" stroke="#1E293B" stroke-width="1"/><line x1="600" y1="120" x2="540" y2="860" stroke="#1E293B" stroke-width="1"/><line x1="720" y1="120" x2="660" y2="860" stroke="#1E293B" stroke-width="1"/><line x1="840" y1="120" x2="780" y2="860" stroke="#1E293B" stroke-width="1"/><line x1="960" y1="120" x2="900" y2="860" stroke="#1E293B" stroke-width="1"/><line x1="1080" y1="120" x2="1020" y2="860" stroke="#1E293B" stroke-width="1"/><line x1="1200" y1="120" x2="1140" y2="860" stroke="#1E293B" stroke-width="1"/><line x1="1320" y1="120" x2="1260" y2="860" stroke="#1E293B" stroke-width="1"/><line x1="1440" y1="120" x2="1380" y2="860" stroke="#1E293B" stroke-width="1"/><line x1="80" y1="120" x2="1520" y2="120" stroke="#1E293B" stroke-width="1"/><line x1="80" y1="200" x2="1520" y2="200" stroke="#1E293B" stroke-width="1"/><line x1="80" y1="280" x2="1520" y2="280" stroke="#1E293B" stroke-width="1"/><line x1="80" y1="360" x2="1520" y2="360" stroke="#1E293B" stroke-width="1"/><line x1="80" y1="440" x2="1520" y2="440" stroke="#1E293B" stroke-width="1"/><line x1="80" y1="520" x2="1520" y2="520" stroke="#1E293B" stroke-width="1"/><line x1="80" y1="600" x2="1520" y2="600" stroke="#1E293B" stroke-width="1"/><line x1="80" y1="680" x2="1520" y2="680" stroke="#1E293B" stroke-width="1"/><line x1="80" y1="760" x2="1520" y2="760" stroke="#1E293B" stroke-width="1"/><line x1="80" y1="840" x2="1520" y2="840" stroke="#1E293B" stroke-width="1"/></g><text x="110" y="110" text-anchor="start" style="font:800 54px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="110" dy="0">Idempotency</tspan>
</text>
<text x="110" y="165" text-anchor="start" style="font:500 26px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="110" dy="0">Retries are expected. Duplicate business effects are not.</tspan>
</text>
<line x1="800" y1="210" x2="800" y2="770" stroke="#334155" stroke-width="2" stroke-dasharray="12 14"/><text x="260" y="245" text-anchor="start" style="font:700 28px Inter, Segoe UI, Arial, sans-serif; fill:#93C5FD;">
<tspan x="260" dy="0">Uncertain delivery</tspan>
</text>
<rect x="120" y="300" width="250" height="92" rx="24" fill="#0B1220" stroke="#3B82F6" stroke-width="2" filter="url(#softShadow)"/>
<text x="245" y="355" text-anchor="middle" style="font:700 26px Inter, Segoe UI, Arial, sans-serif; fill:#E0F2FE;">
<tspan x="245" dy="0">Client / SDK</tspan>
</text>
<rect x="440" y="245" width="250" height="80" rx="24" fill="#111827" stroke="#475569" stroke-width="2" />
<text x="565" y="293" text-anchor="middle" style="font:700 24px Inter, Segoe UI, Arial, sans-serif; fill:#E2E8F0;">
<tspan x="565" dy="0">Timeout / retry?</tspan>
</text>
<rect x="430" y="365" width="270" height="92" rx="24" fill="#0B1220" stroke="#3B82F6" stroke-width="2" />
<text x="565" y="412" text-anchor="middle" style="font:700 24px Inter, Segoe UI, Arial, sans-serif; fill:#DBEAFE;">
<tspan x="565" dy="0">Request attempt A</tspan>
</text>
<text x="565" y="444" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#93C5FD;">
<tspan x="565" dy="0">same business intent</tspan>
</text>
<rect x="430" y="525" width="270" height="92" rx="24" fill="#0B1220" stroke="#60A5FA" stroke-width="2" />
<text x="565" y="572" text-anchor="middle" style="font:700 24px Inter, Segoe UI, Arial, sans-serif; fill:#DBEAFE;">
<tspan x="565" dy="0">Request attempt B</tspan>
</text>
<text x="565" y="604" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#93C5FD;">
<tspan x="565" dy="0">retry after uncertainty</tspan>
</text>
<line x1="370" y1="346" x2="440" y2="286" stroke="#60A5FA" stroke-width="6" marker-end="url(#arrowBlue)" /><line x1="370" y1="346" x2="430" y2="411" stroke="#60A5FA" stroke-width="6" marker-end="url(#arrowBlue)" /><line x1="570" y1="325" x2="570" y2="365" stroke="#60A5FA" stroke-width="6" marker-end="url(#arrowBlue)" /><path d="M565 457 C 760 470, 760 560, 706 570" stroke="#60A5FA" stroke-width="6" fill="none" stroke-dasharray="10 10" marker-end="url(#arrowBlue)" /><text x="345" y="690" text-anchor="start" style="font:600 22px Inter, Segoe UI, Arial, sans-serif; fill:#93C5FD;">
<tspan x="345" dy="0">Multiple deliveries may occur</tspan>
</text>
<text x="970" y="245" text-anchor="start" style="font:700 28px Inter, Segoe UI, Arial, sans-serif; fill:#86EFAC;">
<tspan x="970" dy="0">Idempotent boundary</tspan>
</text>
<rect x="930" y="320" width="280" height="105" rx="24" fill="#0B1220" stroke="#34D399" stroke-width="2" filter="url(#glowGreen)"/>
<text x="1070" y="373" text-anchor="middle" style="font:800 26px Inter, Segoe UI, Arial, sans-serif; fill:#DCFCE7;">
<tspan x="1070" dy="0">Deduplicate intent</tspan>
</text>
<text x="1070" y="405" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#86EFAC;">
<tspan x="1070" dy="0">key • unique constraint • merge</tspan>
</text>
<rect x="1260" y="320" width="240" height="105" rx="24" fill="#0B1220" stroke="#10B981" stroke-width="2" filter="url(#softShadow)"/>
<text x="1380" y="372" text-anchor="middle" style="font:800 28px Inter, Segoe UI, Arial, sans-serif; fill:#ECFDF5;">
<tspan x="1380" dy="0">Commit once</tspan>
</text>
<text x="1380" y="404" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#A7F3D0;">
<tspan x="1380" dy="0">single business effect</tspan>
</text>
<rect x="930" y="505" width="570" height="130" rx="24" fill="#0B1220" stroke="#10B981" stroke-width="2" />
<text x="1215" y="560" text-anchor="middle" style="font:800 34px Inter, Segoe UI, Arial, sans-serif; fill:#ECFDF5;">
<tspan x="1215" dy="0">Exactly-once business outcome</tspan>
</text>
<text x="1215" y="602" text-anchor="middle" style="font:500 21px Inter, Segoe UI, Arial, sans-serif; fill:#A7F3D0;">
<tspan x="1215" dy="0">Many retries can converge on one correct final state</tspan>
</text>
<line x1="700" y1="411" x2="930" y2="372" stroke="#34D399" stroke-width="7" marker-end="url(#arrowGreen)"/><line x1="700" y1="571" x2="930" y2="372" stroke="#34D399" stroke-width="7" marker-end="url(#arrowGreen)"/><line x1="1210" y1="372" x2="1260" y2="372" stroke="#34D399" stroke-width="7" marker-end="url(#arrowGreen)"/><line x1="1380" y1="425" x2="1380" y2="505" stroke="#34D399" stroke-width="7" marker-end="url(#arrowGreen)"/>
<rect x="110" y="780" width="590" height="50" rx="25.0" fill="#60A5FA" opacity="0.95"/>
<text x="405.0" y="812.0" text-anchor="middle" style="font:800 18px Inter, Segoe UI, Arial, sans-serif; fill:#082F49;">
<tspan x="405.0" dy="0">RETRIES ARE NORMAL</tspan>
</text>

<rect x="900" y="780" width="590" height="50" rx="25.0" fill="#34D399" opacity="0.95"/>
<text x="1195.0" y="812.0" text-anchor="middle" style="font:800 18px Inter, Segoe UI, Arial, sans-serif; fill:#052E16;">
<tspan x="1195.0" dy="0">DUPLICATE EFFECTS ARE OPTIONAL</tspan>
</text>
</svg>