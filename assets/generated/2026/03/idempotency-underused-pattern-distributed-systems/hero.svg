  <circle cx="610" cy="308" r="10" fill="#9bd1e5" />
  <circle cx="610" cy="358" r="10" fill="#9bd1e5" />
  <rect x="640" y="296" rx="6" ry="6" width="240" height="22" fill="#3a728f" />
  <rect x="640" y="346" rx="6" ry="6" width="210" height="22" fill="#3a728f" />

  <rect x="1090" y="245" rx="16" ry="16" width="310" height="240" fill="#1b6d65" stroke="#7fd7ca" stroke-width="3" />
  <rect x="1130" y="300" rx="6" ry="6" width="230" height="20" fill="#89dfd1" opacity="0.35" />
