<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glowBlue" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#60A5FA" flood-opacity="0.55"/>
    </filter>
    <filter id="glowGreen" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#34D399" flood-opacity="0.55"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#60A5FA"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#34D399"/>
    </marker>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#94A3B8"/>
    </marker>
    <style>
      .bg { fill: url(#bgGrad); }
      .panel { fill: url(#cardGrad); stroke: rgba(148,163,184,.18); stroke-width: 2; rx: 28; }
      .title { font: 700 42px Inter, Segoe UI, Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 22px Inter, Segoe UI, Arial, sans-serif; fill: #CBD5E1; }
      .section { font: 700 24px Inter, Segoe UI, Arial, sans-serif; fill: #E2E8F0; letter-spacing: .4px; }
      .body { font: 500 22px Inter, Segoe UI, Arial, sans-serif; fill: #E2E8F0; }
      .small { font: 500 18px Inter, Segoe UI, Arial, sans-serif; fill: #CBD5E1; }
      .mono { font: 600 20px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #E2E8F0; }
      .label { font: 700 20px Inter, Segoe UI, Arial, sans-serif; fill: #0F172A; }
      .caps { font: 800 18px Inter, Segoe UI, Arial, sans-serif; letter-spacing: 1.4px; }
    </style>
</defs>
<rect class="bg" x="0" y="0" width="1600" height="920"/>
<text x="110" y="110" text-anchor="start" style="font:800 52px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="110" dy="0">Background-job idempotency</tspan>
</text>
<text x="110" y="164" text-anchor="start" style="font:500 26px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="110" dy="0">At-least-once delivery is safe when the worker enforces one durable business effect.</tspan>
</text>
<rect x="90" y="330" width="220" height="94" rx="24" fill="#0B1220" stroke="#60A5FA" stroke-width="2" filter="url(#softShadow)"/>
<text x="200.0" y="368" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="200.0" dy="0">Scheduler / Queue</tspan>
</text>
<text x="200.0" y="398" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="200.0" dy="0">GenerateInvoice(acct, period)</tspan>
</text>
<rect x="390" y="330" width="230" height="94" rx="24" fill="#0B1220" stroke="#A78BFA" stroke-width="2" filter="url(#softShadow)"/>
<text x="505.0" y="368" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="505.0" dy="0">Worker receives job</tspan>
</text>
<text x="505.0" y="398" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="505.0" dy="0">message_id = evt_7q</tspan>
</text>
<rect x="700" y="240" width="260" height="94" rx="24" fill="#0B1220" stroke="#34D399" stroke-width="2" filter="url(#softShadow)"/>
<text x="830.0" y="278" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="830.0" dy="0">Insert processed_event</tspan>
</text>
<text x="830.0" y="308" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="830.0" dy="0">unique(message_id)</tspan>
</text>
<rect x="700" y="420" width="260" height="94" rx="24" fill="#0B1220" stroke="#F59E0B" stroke-width="2" filter="url(#softShadow)"/>
<text x="830.0" y="458" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="830.0" dy="0">Unique conflict?</tspan>
</text>
<text x="830.0" y="488" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="830.0" dy="0">already processed</tspan>
</text>
<rect x="1060" y="240" width="260" height="94" rx="24" fill="#0B1220" stroke="#34D399" stroke-width="2" filter="url(#softShadow)"/>
<text x="1190.0" y="278" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="1190.0" dy="0">Create / upsert invoice</tspan>
</text>
<text x="1190.0" y="308" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="1190.0" dy="0">unique(account, period)</tspan>
</text>
<rect x="1360" y="240" width="150" height="94" rx="24" fill="#0B1220" stroke="#34D399" stroke-width="2" filter="url(#softShadow)"/>
<text x="1435.0" y="278" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="1435.0" dy="0">Ack job</tspan>
</text>
<text x="1435.0" y="308" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="1435.0" dy="0">done</tspan>
</text>
<rect x="1060" y="420" width="260" height="94" rx="24" fill="#0B1220" stroke="#34D399" stroke-width="2" filter="url(#softShadow)"/>
<text x="1190.0" y="458" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="1190.0" dy="0">Exit safely</tspan>
</text>
<text x="1190.0" y="488" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="1190.0" dy="0">no second invoice</tspan>
</text>
<rect x="390" y="620" width="230" height="94" rx="24" fill="#0B1220" stroke="#EF4444" stroke-width="2" filter="url(#softShadow)"/>
<text x="505.0" y="658" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="505.0" dy="0">Crash after write</tspan>
</text>
<text x="505.0" y="688" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="505.0" dy="0">before ack</tspan>
</text>
<rect x="90" y="620" width="220" height="94" rx="24" fill="#0B1220" stroke="#60A5FA" stroke-width="2" filter="url(#softShadow)"/>
<text x="200.0" y="658" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="200.0" dy="0">Redelivery</tspan>
</text>
<text x="200.0" y="688" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="200.0" dy="0">same job returns</tspan>
</text>
<line x1="310" y1="377" x2="390" y2="377" stroke="#94A3B8" stroke-width="6" marker-end="url(#arrowGray)"/><line x1="620" y1="377" x2="700" y2="287" stroke="#34D399" stroke-width="6" marker-end="url(#arrowGreen)"/><line x1="620" y1="377" x2="700" y2="467" stroke="#F59E0B" stroke-width="6" marker-end="url(#arrowGray)"/><line x1="960" y1="287" x2="1060" y2="287" stroke="#34D399" stroke-width="6" marker-end="url(#arrowGreen)"/><line x1="1320" y1="287" x2="1360" y2="287" stroke="#34D399" stroke-width="6" marker-end="url(#arrowGreen)"/><line x1="960" y1="467" x2="1060" y2="467" stroke="#34D399" stroke-width="6" marker-end="url(#arrowGreen)"/><line x1="505" y1="620" x2="505" y2="424" stroke="#EF4444" stroke-width="6" marker-end="url(#arrowGray)"/><line x1="310" y1="667" x2="390" y2="667" stroke="#60A5FA" stroke-width="6" marker-end="url(#arrowBlue)"/><line x1="620" y1="667" x2="740" y2="514" stroke="#60A5FA" stroke-width="6" marker-end="url(#arrowBlue)"/><path d="M1450 334 C 1510 410, 1510 560, 1190 620 C 860 680, 640 705, 310 667" stroke="#60A5FA" stroke-width="6" fill="none" stroke-dasharray="12 12" marker-end="url(#arrowBlue)"/><text x="1115" y="610" text-anchor="start" style="font:700 24px Inter, Segoe UI, Arial, sans-serif; fill:#93C5FD;">
<tspan x="1115" dy="0">Redelivery path</tspan>
</text>
<rect x="1030" y="720" width="500" height="120" rx="24" fill="#09111F" stroke="#334155" stroke-width="2" />
<text x="1280" y="765" text-anchor="middle" style="font:800 28px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="1280" dy="0">Exactly-once transport is rare.</tspan>
</text>
<text x="1280" y="805" text-anchor="middle" style="font:500 20px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="1280" dy="0">Exactly-once business effect comes from idempotent workers + durable keys.</tspan>
</text>

<rect x="90" y="800" width="250" height="48" rx="24.0" fill="#60A5FA" opacity="0.95"/>
<text x="215.0" y="831.0" text-anchor="middle" style="font:800 18px Inter, Segoe UI, Arial, sans-serif; fill:#082F49;">
<tspan x="215.0" dy="0">AT-LEAST-ONCE DELIVERY</tspan>
</text>

<rect x="385" y="800" width="250" height="48" rx="24.0" fill="#A78BFA" opacity="0.95"/>
<text x="510.0" y="831.0" text-anchor="middle" style="font:800 18px Inter, Segoe UI, Arial, sans-serif; fill:#2E1065;">
<tspan x="510.0" dy="0">PROCESSED EVENT CHECK</tspan>
</text>

<rect x="680" y="800" width="250" height="48" rx="24.0" fill="#34D399" opacity="0.95"/>
<text x="805.0" y="831.0" text-anchor="middle" style="font:800 18px Inter, Segoe UI, Arial, sans-serif; fill:#052E16;">
<tspan x="805.0" dy="0">UNIQUE BUSINESS KEY</tspan>
</text>
</svg>