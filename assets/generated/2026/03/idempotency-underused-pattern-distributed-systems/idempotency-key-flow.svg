<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glowBlue" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#60A5FA" flood-opacity="0.55"/>
    </filter>
    <filter id="glowGreen" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#34D399" flood-opacity="0.55"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#60A5FA"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#34D399"/>
    </marker>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#94A3B8"/>
    </marker>
    <style>
      .bg { fill: url(#bgGrad); }
      .panel { fill: url(#cardGrad); stroke: rgba(148,163,184,.18); stroke-width: 2; rx: 28; }
      .title { font: 700 42px Inter, Segoe UI, Arial, sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 22px Inter, Segoe UI, Arial, sans-serif; fill: #CBD5E1; }
      .section { font: 700 24px Inter, Segoe UI, Arial, sans-serif; fill: #E2E8F0; letter-spacing: .4px; }
      .body { font: 500 22px Inter, Segoe UI, Arial, sans-serif; fill: #E2E8F0; }
      .small { font: 500 18px Inter, Segoe UI, Arial, sans-serif; fill: #CBD5E1; }
      .mono { font: 600 20px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #E2E8F0; }
      .label { font: 700 20px Inter, Segoe UI, Arial, sans-serif; fill: #0F172A; }
      .caps { font: 800 18px Inter, Segoe UI, Arial, sans-serif; letter-spacing: 1.4px; }
    </style>
</defs>
<rect class="bg" x="0" y="0" width="1600" height="980"/>
<text x="110" y="110" text-anchor="start" style="font:800 52px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="110" dy="0">Idempotency-key request flow</tspan>
</text>
<text x="110" y="164" text-anchor="start" style="font:500 26px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="110" dy="0">First request executes once. Safe retries replay the stored outcome.</tspan>
</text>

<rect x="110" y="215" width="170" height="42" rx="21.0" fill="#93C5FD" opacity="0.95"/>
<text x="195.0" y="243.0" text-anchor="middle" style="font:800 18px Inter, Segoe UI, Arial, sans-serif; fill:#082F49;">
<tspan x="195.0" dy="0">1  CLIENT</tspan>
</text>

<rect x="405" y="215" width="190" height="42" rx="21.0" fill="#C4B5FD" opacity="0.95"/>
<text x="500.0" y="243.0" text-anchor="middle" style="font:800 18px Inter, Segoe UI, Arial, sans-serif; fill:#2E1065;">
<tspan x="500.0" dy="0">2  API GATE</tspan>
</text>

<rect x="720" y="215" width="215" height="42" rx="21.0" fill="#86EFAC" opacity="0.95"/>
<text x="827.5" y="243.0" text-anchor="middle" style="font:800 18px Inter, Segoe UI, Arial, sans-serif; fill:#052E16;">
<tspan x="827.5" dy="0">3  IDEMPOTENCY STORE</tspan>
</text>

<rect x="1070" y="215" width="165" height="42" rx="21.0" fill="#FCD34D" opacity="0.95"/>
<text x="1152.5" y="243.0" text-anchor="middle" style="font:800 18px Inter, Segoe UI, Arial, sans-serif; fill:#78350F;">
<tspan x="1152.5" dy="0">4  BUSINESS</tspan>
</text>

<rect x="1340" y="215" width="150" height="42" rx="21.0" fill="#F9A8D4" opacity="0.95"/>
<text x="1415.0" y="243.0" text-anchor="middle" style="font:800 18px Inter, Segoe UI, Arial, sans-serif; fill:#831843;">
<tspan x="1415.0" dy="0">5  RESPONSE</tspan>
</text>
<line x1="180" y1="260" x2="180" y2="870" stroke="#334155" stroke-width="2" stroke-dasharray="10 12"/><line x1="500" y1="260" x2="500" y2="870" stroke="#334155" stroke-width="2" stroke-dasharray="10 12"/><line x1="830" y1="260" x2="830" y2="870" stroke="#334155" stroke-width="2" stroke-dasharray="10 12"/><line x1="1150" y1="260" x2="1150" y2="870" stroke="#334155" stroke-width="2" stroke-dasharray="10 12"/><line x1="1415" y1="260" x2="1415" y2="870" stroke="#334155" stroke-width="2" stroke-dasharray="10 12"/><rect x="70" y="300" width="220" height="76" rx="24" fill="#0B1220" stroke="#60A5FA" stroke-width="2" filter="url(#softShadow)"/>
<text x="180.0" y="334" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="180.0" dy="0">POST /payments</tspan>
</text>
<text x="180.0" y="362" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="180.0" dy="0">Idempotency-Key: abc-123</tspan>
</text>
<rect x="355" y="300" width="290" height="92" rx="24" fill="#0B1220" stroke="#A78BFA" stroke-width="2" filter="url(#softShadow)"/>
<text x="500.0" y="334" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="500.0" dy="0">Lookup key</tspan>
</text>
<text x="500.0" y="362" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="500.0" dy="0">miss → not seen yet</tspan>
</text>
<rect x="700" y="300" width="270" height="92" rx="24" fill="#0B1220" stroke="#34D399" stroke-width="2" filter="url(#softShadow)"/>
<text x="835.0" y="334" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="835.0" dy="0">Reserve / create record</tspan>
</text>
<text x="835.0" y="362" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="835.0" dy="0">status = processing</tspan>
</text>
<rect x="1030" y="300" width="240" height="92" rx="24" fill="#0B1220" stroke="#FBBF24" stroke-width="2" filter="url(#softShadow)"/>
<text x="1150.0" y="334" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="1150.0" dy="0">Authorize charge</tspan>
</text>
<text x="1150.0" y="362" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="1150.0" dy="0">perform once</tspan>
</text>
<rect x="1330" y="300" width="190" height="92" rx="24" fill="#0B1220" stroke="#F472B6" stroke-width="2" filter="url(#softShadow)"/>
<text x="1425.0" y="334" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="1425.0" dy="0">201 Created</tspan>
</text>
<text x="1425.0" y="362" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="1425.0" dy="0">payment_id=42</tspan>
</text>
<rect x="700" y="470" width="270" height="92" rx="24" fill="#0B1220" stroke="#34D399" stroke-width="2" filter="url(#softShadow)"/>
<text x="835.0" y="504" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="835.0" dy="0">Persist final result</tspan>
</text>
<text x="835.0" y="532" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="835.0" dy="0">hash + body + status</tspan>
</text>
<rect x="70" y="640" width="220" height="76" rx="24" fill="#0B1220" stroke="#60A5FA" stroke-width="2" filter="url(#softShadow)"/>
<text x="180.0" y="674" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="180.0" dy="0">Retry same intent</tspan>
</text>
<text x="180.0" y="702" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="180.0" dy="0">same key abc-123</tspan>
</text>
<rect x="355" y="640" width="290" height="92" rx="24" fill="#0B1220" stroke="#A78BFA" stroke-width="2" filter="url(#softShadow)"/>
<text x="500.0" y="674" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="500.0" dy="0">Lookup key</tspan>
</text>
<text x="500.0" y="702" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="500.0" dy="0">hit → existing result</tspan>
</text>
<rect x="1330" y="640" width="190" height="92" rx="24" fill="#0B1220" stroke="#F472B6" stroke-width="2" filter="url(#softShadow)"/>
<text x="1425.0" y="674" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="1425.0" dy="0">Replay stored response</tspan>
</text>
<text x="1425.0" y="702" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="1425.0" dy="0">no second charge</tspan>
</text>
<rect x="355" y="810" width="290" height="92" rx="24" fill="#0B1220" stroke="#EF4444" stroke-width="2" filter="url(#softShadow)"/>
<text x="500.0" y="844" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="500.0" dy="0">Payload mismatch?</tspan>
</text>
<text x="500.0" y="872" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="500.0" dy="0">reject misuse</tspan>
</text>
<rect x="700" y="810" width="270" height="92" rx="24" fill="#0B1220" stroke="#EF4444" stroke-width="2" filter="url(#softShadow)"/>
<text x="835.0" y="844" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="835.0" dy="0">409 Conflict</tspan>
</text>
<text x="835.0" y="872" text-anchor="middle" style="font:500 18px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="835.0" dy="0">same key, different body</tspan>
</text>
<line x1="290" y1="338" x2="355" y2="338" stroke="#94A3B8" stroke-width="6" marker-end="url(#arrowGray)"/><line x1="645" y1="346" x2="700" y2="346" stroke="#94A3B8" stroke-width="6" marker-end="url(#arrowGray)"/><line x1="970" y1="346" x2="1030" y2="346" stroke="#94A3B8" stroke-width="6" marker-end="url(#arrowGray)"/><line x1="1270" y1="346" x2="1330" y2="346" stroke="#94A3B8" stroke-width="6" marker-end="url(#arrowGray)"/><line x1="1150" y1="392" x2="835" y2="470" stroke="#34D399" stroke-width="6" marker-end="url(#arrowGreen)"/><line x1="970" y1="516" x2="1330" y2="686" stroke="#34D399" stroke-width="6" marker-end="url(#arrowGreen)"/><line x1="290" y1="678" x2="355" y2="678" stroke="#94A3B8" stroke-width="6" marker-end="url(#arrowGray)"/><line x1="645" y1="686" x2="1330" y2="686" stroke="#34D399" stroke-width="6" marker-end="url(#arrowGreen)"/><line x1="500" y1="732" x2="500" y2="810" stroke="#EF4444" stroke-width="6" marker-end="url(#arrowGray)"/><line x1="645" y1="856" x2="700" y2="856" stroke="#EF4444" stroke-width="6" marker-end="url(#arrowGray)"/><rect x="1060" y="470" width="420" height="110" rx="24" fill="#09111F" stroke="#334155" stroke-width="2" />
<text x="1270" y="514" text-anchor="middle" style="font:800 26px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="1270" dy="0">Atomicity matters</tspan>
</text>
<text x="1270" y="550" text-anchor="middle" style="font:500 20px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="1270" dy="0">Business effect + stored outcome must be coordinated</tspan>
</text>
<rect x="1060" y="810" width="420" height="110" rx="24" fill="#09111F" stroke="#334155" stroke-width="2" />
<text x="1270" y="854" text-anchor="middle" style="font:800 24px Inter, Segoe UI, Arial, sans-serif; fill:#F8FAFC;">
<tspan x="1270" dy="0">Same key + different payload</tspan>
</text>
<text x="1270" y="888" text-anchor="middle" style="font:500 20px Inter, Segoe UI, Arial, sans-serif; fill:#CBD5E1;">
<tspan x="1270" dy="0">Treat as misuse, not a new operation</tspan>
</text>
</svg>