<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">SQL Server Indexing: Key Lookup vs Covering Index</title>
  <desc id="desc">Dark technical diagram showing the difference between a non-covering index that requires a key lookup and a covering index with included columns that eliminates it.</desc>
  <defs>
    <style>
      .bg { fill: #0b0f14; }
      .panel { fill: #111827; stroke: #263041; stroke-width: 2; }
      .panelSoft { fill: #0f1722; stroke: #1f2937; stroke-width: 1.5; }
      .divider { stroke: #334155; stroke-width: 2; stroke-dasharray: 6 10; opacity: 0.9; }
      .title  { fill: #e5e7eb; font: 700 36px Inter, Arial, sans-serif; letter-spacing: 0.2px; }
      .subtitle { fill: #94a3b8; font: 500 18px Inter, Arial, sans-serif; }
      .labelBad  { fill: #fca5a5; font: 700 22px Inter, Arial, sans-serif; }
      .labelGood { fill: #86efac; font: 700 22px Inter, Arial, sans-serif; }
      .nodeFill  { fill: #1e293b; stroke: #475569; stroke-width: 2; }
      .nodeKey   { fill: #1e3a5f; stroke: #3b82f6; stroke-width: 2; }
      .nodeLeaf  { fill: #14312b; stroke: #22c55e; stroke-width: 2; }
      .nodeLeafBad { fill: #2a1c1c; stroke: #f87171; stroke-width: 2; }
      .nodeInclude { fill: #1a2e1a; stroke: #4ade80; stroke-width: 1.5; stroke-dasharray: 5 4; }
      .arrowBad  { stroke: #f87171; stroke-width: 3; fill: none; marker-end: url(#arrowBad); }
      .arrowGood { stroke: #4ade80; stroke-width: 3; fill: none; marker-end: url(#arrowGood); }
      .arrowBlue { stroke: #60a5fa; stroke-width: 2.5; fill: none; marker-end: url(#arrowBlue); }
      .arrowExtra { stroke: #f87171; stroke-width: 2.5; stroke-dasharray: 7 5; fill: none; marker-end: url(#arrowBad); }
      .labelNode  { fill: #cbd5e1; font: 600 14px Inter, Arial, sans-serif; }
      .labelSmall { fill: #94a3b8; font: 500 13px Inter, Arial, sans-serif; }
      .labelKeyCol { fill: #93c5fd; font: 600 13px 'JetBrains Mono', Consolas, monospace; }
      .labelIncCol { fill: #86efac; font: 600 13px 'JetBrains Mono', Consolas, monospace; }
      .badBadge   { fill: #7f1d1d; stroke: #ef4444; stroke-width: 1.5; }
      .goodBadge  { fill: #14532d; stroke: #22c55e; stroke-width: 1.5; }
      .badText    { fill: #fca5a5; font: 700 13px Inter, Arial, sans-serif; }
      .goodText   { fill: #86efac; font: 700 13px Inter, Arial, sans-serif; }
      .tiny { fill: #94a3b8; font: 500 15px Inter, Arial, sans-serif; }
      .shadow { filter: drop-shadow(0 14px 24px rgba(0,0,0,0.3)); }
      .codeBlk { fill: #0d1420; stroke: #263041; stroke-width: 1; }
      .code { fill: #cbd5e1; font: 500 15px 'JetBrains Mono', Consolas, monospace; }
      .codeKey { fill: #93c5fd; font: 600 15px 'JetBrains Mono', Consolas, monospace; }
      .codeGreen { fill: #86efac; font: 600 15px 'JetBrains Mono', Consolas, monospace; }
    </style>
    <marker id="arrowBad" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f87171"/>
    </marker>
    <marker id="arrowGood" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ade80"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900" rx="28"/>

  <text x="800" y="80" text-anchor="middle" class="title">SQL Server Index Design: Covering vs Key Lookup</text>
  <text x="800" y="114" text-anchor="middle" class="subtitle">A key lookup means the index did not cover the query. INCLUDE columns eliminate the extra trip.</text>

  <line x1="800" y1="155" x2="800" y2="850" class="divider"/>

  <!-- ===== LEFT PANEL: Non-covering — key lookup ===== -->
  <g class="shadow">
    <rect class="panel" x="50" y="160" width="700" height="680" rx="24"/>
  </g>
  <text x="75" y="200" class="labelBad">Without covering index</text>
  <text x="75" y="222" class="labelSmall">Index Seek → Key Lookup → Extra I/O per row</text>

  <!-- Nonclustered index B-tree (left) -->
  <!-- Root node -->
  <rect class="nodeKey" x="230" y="248" width="200" height="48" rx="8"/>
  <text x="330" y="268" text-anchor="middle" class="labelKeyCol">CustomerId</text>
  <text x="330" y="285" text-anchor="middle" class="labelKeyCol">OrderDate</text>

  <!-- Non-leaf level -->
  <rect class="nodeKey" x="120" y="345" width="160" height="40" rx="8"/>
  <text x="200" y="365" text-anchor="middle" class="labelKeyCol">C:1-500</text>
  <text x="200" y="379" text-anchor="middle" class="labelSmall">key range</text>

  <rect class="nodeKey" x="345" y="345" width="160" height="40" rx="8"/>
  <text x="425" y="365" text-anchor="middle" class="labelKeyCol">C:501-∞</text>
  <text x="425" y="379" text-anchor="middle" class="labelSmall">key range</text>

  <!-- Leaf level: nonclustered -->
  <rect class="nodeLeafBad" x="65" y="445" width="190" height="56" rx="8"/>
  <text x="160" y="465" text-anchor="middle" class="labelKeyCol">CustomerId</text>
  <text x="160" y="480" text-anchor="middle" class="labelKeyCol">OrderDate</text>
  <text x="160" y="495" text-anchor="middle" class="labelSmall">→ RID only</text>

  <rect class="nodeLeafBad" x="275" y="445" width="190" height="56" rx="8"/>
  <text x="370" y="465" text-anchor="middle" class="labelKeyCol">CustomerId</text>
  <text x="370" y="480" text-anchor="middle" class="labelKeyCol">OrderDate</text>
  <text x="370" y="495" text-anchor="middle" class="labelSmall">→ RID only</text>

  <!-- Arrows from root to non-leaf -->
  <line x1="300" y1="296" x2="230" y2="345" class="arrowBlue"/>
  <line x1="360" y1="296" x2="420" y2="345" class="arrowBlue"/>
  <!-- Arrows from non-leaf to leaf -->
  <line x1="180" y1="385" x2="160" y2="445" class="arrowBlue"/>
  <line x1="380" y1="385" x2="365" y2="445" class="arrowBlue"/>

  <!-- Index Seek badge -->
  <rect class="goodBadge" x="75" y="520" width="110" height="26" rx="6"/>
  <text x="130" y="538" text-anchor="middle" class="goodText">Index Seek ✓</text>

  <!-- Key Lookup arrow down -->
  <path d="M 160 502 Q 160 570 300 600" class="arrowExtra"/>
  <path d="M 370 502 Q 370 570 300 600" class="arrowExtra"/>

  <!-- Key Lookup badge -->
  <rect class="badBadge" x="215" y="595" width="170" height="28" rx="6"/>
  <text x="300" y="614" text-anchor="middle" class="badText">Key Lookup ✗  per row</text>

  <!-- Clustered index (base table) -->
  <rect class="nodeFill" x="130" y="651" width="360" height="64" rx="10"/>
  <text x="310" y="673" text-anchor="middle" class="labelNode">Clustered Index (base table)</text>
  <text x="310" y="693" text-anchor="middle" class="labelSmall">CustomerId  OrderDate  Status  TotalAmount</text>

  <line x1="300" y1="623" x2="300" y2="651" class="arrowExtra"/>

  <!-- SQL snippet (left) -->
  <rect class="codeBlk" x="74" y="736" width="640" height="74" rx="10"/>
  <text x="94" y="756" class="code">CREATE INDEX ix ON Orders</text>
  <text x="94" y="774" class="codeKey">  (CustomerId, OrderDate DESC);</text>
  <text x="94" y="793" class="code">-- Status, TotalAmount: not in index → key lookup</text>

  <!-- ===== RIGHT PANEL: Covering with INCLUDE ===== -->
  <g class="shadow">
    <rect class="panel" x="850" y="160" width="700" height="680" rx="24"/>
  </g>
  <text x="875" y="200" class="labelGood">With INCLUDE columns</text>
  <text x="875" y="222" class="labelSmall">Index Seek → leaf satisfies SELECT → no extra trip</text>

  <!-- Root node (right) -->
  <rect class="nodeKey" x="1030" y="248" width="200" height="48" rx="8"/>
  <text x="1130" y="268" text-anchor="middle" class="labelKeyCol">CustomerId</text>
  <text x="1130" y="285" text-anchor="middle" class="labelKeyCol">OrderDate  ← key</text>

  <!-- Non-leaf level (right) -->
  <rect class="nodeKey" x="920" y="345" width="160" height="40" rx="8"/>
  <text x="1000" y="365" text-anchor="middle" class="labelKeyCol">C:1-500</text>
  <text x="1000" y="379" text-anchor="middle" class="labelSmall">key range</text>

  <rect class="nodeKey" x="1145" y="345" width="160" height="40" rx="8"/>
  <text x="1225" y="365" text-anchor="middle" class="labelKeyCol">C:501-∞</text>
  <text x="1225" y="379" text-anchor="middle" class="labelSmall">key range</text>

  <!-- Leaf level: covering -->
  <rect class="nodeLeaf" x="864" y="445" width="230" height="78" rx="8"/>
  <text x="979" y="464" text-anchor="middle" class="labelKeyCol">CustomerId</text>
  <text x="979" y="479" text-anchor="middle" class="labelKeyCol">OrderDate  ← sort key</text>
  <text x="979" y="496" text-anchor="middle" class="codeGreen">Status        ← INCLUDE</text>
  <text x="979" y="511" text-anchor="middle" class="codeGreen">TotalAmount   ← INCLUDE</text>

  <rect class="nodeLeaf" x="1110" y="445" width="230" height="78" rx="8"/>
  <text x="1225" y="464" text-anchor="middle" class="labelKeyCol">CustomerId</text>
  <text x="1225" y="479" text-anchor="middle" class="labelKeyCol">OrderDate  ← sort key</text>
  <text x="1225" y="496" text-anchor="middle" class="codeGreen">Status        ← INCLUDE</text>
  <text x="1225" y="511" text-anchor="middle" class="codeGreen">TotalAmount   ← INCLUDE</text>

  <!-- Arrows from root to non-leaf (right) -->
  <line x1="1100" y1="296" x2="1030" y2="345" class="arrowBlue"/>
  <line x1="1160" y1="296" x2="1220" y2="345" class="arrowBlue"/>
  <!-- Arrows from non-leaf to leaf (right) -->
  <line x1="980" y1="385" x2="979" y2="445" class="arrowBlue"/>
  <line x1="1185" y1="385" x2="1200" y2="445" class="arrowBlue"/>

  <!-- Index Seek badge (right) -->
  <rect class="goodBadge" x="875" y="542" width="110" height="26" rx="6"/>
  <text x="930" y="560" text-anchor="middle" class="goodText">Index Seek ✓</text>

  <!-- Covered badge -->
  <rect class="goodBadge" x="1020" y="542" width="200" height="26" rx="6"/>
  <text x="1120" y="560" text-anchor="middle" class="goodText">Query fully covered ✓</text>

  <!-- No key lookup annotation -->
  <rect class="panel" x="930" y="610" width="340" height="52" rx="10"/>
  <text x="1100" y="634" text-anchor="middle" class="labelNode">No Key Lookup.</text>
  <text x="1100" y="652" text-anchor="middle" class="labelSmall">Leaf page carries everything SELECT needs.</text>

  <!-- SQL snippet (right) -->
  <rect class="codeBlk" x="874" y="694" width="640" height="94" rx="10"/>
  <text x="894" y="714" class="code">CREATE INDEX ix ON Orders</text>
  <text x="894" y="732" class="codeKey">  (CustomerId, OrderDate DESC)</text>
  <text x="894" y="750" class="codeGreen">  INCLUDE (Status, TotalAmount);</text>
  <text x="894" y="772" class="code">-- Leaf carries INCLUDE cols. Key stays narrow.</text>
</svg>
