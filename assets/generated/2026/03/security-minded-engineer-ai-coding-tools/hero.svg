<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 950" role="img" aria-label="Security-minded engineering workflow for AI coding tools">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111d"/>
      <stop offset="55%" stop-color="#0d1d30"/>
      <stop offset="100%" stop-color="#132941"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67b5ff"/>
      <stop offset="100%" stop-color="#4fe1cc"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1600" height="950" rx="38" fill="url(#bg)"/>
  <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
    <path d="M0 150 H1600"/>
    <path d="M0 310 H1600"/>
    <path d="M0 470 H1600"/>
    <path d="M0 630 H1600"/>
    <path d="M0 790 H1600"/>
    <path d="M240 0 V950"/>
    <path d="M500 0 V950"/>
    <path d="M760 0 V950"/>
    <path d="M1020 0 V950"/>
    <path d="M1280 0 V950"/>
  </g>

  <circle cx="1340" cy="150" r="240" fill="#1d4ed8" opacity="0.12"/>
  <circle cx="230" cy="820" r="260" fill="#14b8a6" opacity="0.10"/>

  <g font-family="Inter, Segoe UI, sans-serif">
    <text x="82" y="102" fill="#c9d8ea" font-size="28" font-weight="700">Security-minded engineering for AI coding tools</text>
    <text x="82" y="142" fill="#8fa8c2" font-size="18">Context, permissions, checks, and human review have become part of the product design.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="440" y="212" width="720" height="456" rx="32" fill="#0d1726" stroke="#2b4260"/>
    <rect x="480" y="254" width="640" height="340" rx="24" fill="#0f2236" stroke="#33557d"/>
    <rect x="518" y="292" width="270" height="24" rx="12" fill="#21456c"/>
    <rect x="518" y="334" width="565" height="18" rx="9" fill="#173252"/>
    <rect x="518" y="372" width="522" height="18" rx="9" fill="#173252"/>
    <rect x="518" y="410" width="468" height="18" rx="9" fill="#173252"/>
    <rect x="518" y="462" width="176" height="82" rx="18" fill="#10283f" stroke="#39597d"/>
    <rect x="715" y="462" width="176" height="82" rx="18" fill="#10283f" stroke="#39597d"/>
    <rect x="912" y="462" width="176" height="82" rx="18" fill="#10283f" stroke="#39597d"/>
    <text x="606" y="512" text-anchor="middle" fill="#e5effb" font-size="22" font-family="Inter, Segoe UI, sans-serif" font-weight="700">Retrieve</text>
    <text x="803" y="512" text-anchor="middle" fill="#e5effb" font-size="22" font-family="Inter, Segoe UI, sans-serif" font-weight="700">Evaluate</text>
    <text x="1000" y="512" text-anchor="middle" fill="#e5effb" font-size="22" font-family="Inter, Segoe UI, sans-serif" font-weight="700">Propose</text>
    <rect x="534" y="610" width="532" height="18" rx="9" fill="#173252"/>
  </g>

  <g filter="url(#shadow)" font-family="Inter, Segoe UI, sans-serif">
    <rect x="112" y="216" width="258" height="176" rx="28" fill="#0f1d30" stroke="#31506f"/>
    <text x="144" y="270" fill="#e5effb" font-size="28" font-weight="700">Context</text>
    <text x="144" y="312" fill="#9db2c7" font-size="18">Only the code, docs, and history</text>
    <text x="144" y="340" fill="#9db2c7" font-size="18">the tool actually needs.</text>
    <rect x="144" y="360" width="184" height="12" rx="6" fill="#173252"/>

    <rect x="1230" y="216" width="258" height="176" rx="28" fill="#0f1d30" stroke="#31506f"/>
    <text x="1262" y="270" fill="#e5effb" font-size="28" font-weight="700">Permissions</text>
    <text x="1262" y="312" fill="#9db2c7" font-size="18">Read, edit, network, and CI access</text>
    <text x="1262" y="340" fill="#9db2c7" font-size="18">should never be treated the same.</text>
    <rect x="1262" y="360" width="184" height="12" rx="6" fill="#173252"/>

    <rect x="154" y="626" width="288" height="186" rx="28" fill="#0f1d30" stroke="#31506f"/>
    <text x="188" y="682" fill="#e5effb" font-size="28" font-weight="700">Checks</text>
    <text x="188" y="724" fill="#9db2c7" font-size="18">Tests, linters, policy gates, and</text>
    <text x="188" y="752" fill="#9db2c7" font-size="18">structured validation catch</text>
    <text x="188" y="780" fill="#9db2c7" font-size="18">believable mistakes.</text>

    <rect x="1160" y="626" width="288" height="186" rx="28" fill="#0f1d30" stroke="#31506f"/>
    <text x="1194" y="682" fill="#e5effb" font-size="28" font-weight="700">Human review</text>
    <text x="1194" y="724" fill="#9db2c7" font-size="18">The goal is not zero humans.</text>
    <text x="1194" y="752" fill="#9db2c7" font-size="18">The goal is meaningful review at</text>
    <text x="1194" y="780" fill="#9db2c7" font-size="18">the steps that matter most.</text>
  </g>

  <g stroke="url(#line)" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M370 305 C418 305 428 352 440 400"/>
    <path d="M1230 305 C1182 305 1170 352 1160 400"/>
    <path d="M442 718 C490 718 500 670 540 650"/>
    <path d="M1160 718 C1112 718 1100 670 1060 650"/>
  </g>

  <g font-family="Inter, Segoe UI, sans-serif">
    <rect x="610" y="718" width="382" height="94" rx="24" fill="#101c2e" stroke="#35567d"/>
    <text x="801" y="760" text-anchor="middle" fill="#eff6ff" font-size="26" font-weight="700">Trust is the architecture</text>
    <text x="801" y="792" text-anchor="middle" fill="#9ab0c8" font-size="18">The model matters. The workflow around it matters more.</text>

    <rect x="602" y="164" width="398" height="34" rx="17" fill="#10283f" stroke="#35567d"/>
    <text x="801" y="187" text-anchor="middle" fill="#b9d8ff" font-size="16" font-weight="700">AI coding workflow inside explicit boundaries</text>

    <rect x="1260" y="122" width="238" height="48" rx="18" fill="#1b2132" stroke="#5b4a2f"/>
    <rect x="1274" y="136" width="54" height="20" rx="10" fill="url(#warn)"/>
    <text x="1340" y="151" fill="#e9d8b3" font-size="16" font-weight="700" font-family="Inter, Segoe UI, sans-serif">Blast radius grows with access</text>
  </g>
</svg>
