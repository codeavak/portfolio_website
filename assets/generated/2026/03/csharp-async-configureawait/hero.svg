<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Async continuation paths: default await versus ConfigureAwait(false)</title>
  <desc id="heroDesc">A dark technical diagram contrasting a blocked SynchronizationContext path on the left with a free Thread Pool path on the right.</desc>

  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .divider { stroke: #404866; stroke-width: 2; opacity: 0.9; }
      .box { fill: #23283b; stroke-width: 2.5; rx: 16; ry: 16; }
      .blueBox { stroke: #5878a8; }
      .greenBox { stroke: #5f8a74; }
      .leftArrow { stroke: #6f8fbd; stroke-width: 6; fill: none; }
      .rightArrow { stroke: #6da287; stroke-width: 6; fill: none; }
      .deadArrow { stroke: #d35b66; stroke-width: 5; fill: none; stroke-dasharray: 14 10; }
      .mutedText { fill: #e8edf5; font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-weight: 600; }
      .label { font-size: 22px; }
      .headline { font-size: 34px; letter-spacing: 0.3px; }
      .small { font-size: 20px; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; font-weight: 700; }
      .tiny { font-size: 16px; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; font-weight: 700; }
      .blockedBadge { fill: #b4434e; stroke: #da6a74; stroke-width: 1.5; rx: 10; ry: 10; }
      .availBadge { fill: #2f7349; stroke: #68b38a; stroke-width: 1.5; rx: 10; ry: 10; }
      .threadBars { stroke: #8189a6; stroke-width: 7; stroke-linecap: round; opacity: 0.8; }
      .subtle { opacity: 0.86; }
      .caption { fill: #b7bfd6; font-family: Inter, system-ui, sans-serif; font-size: 18px; font-weight: 500; }
    </style>

    <marker id="arrowBlue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 z" fill="#6f8fbd"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 z" fill="#6da287"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 z" fill="#d35b66"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>
  <line class="divider" x1="800" y1="90" x2="800" y2="810"/>

  <!-- Left half -->
  <text class="caption" x="320" y="90" text-anchor="middle">Captured continuation path</text>

  <rect class="box blueBox" x="190" y="125" width="390" height="76" rx="16" ry="16"/>
  <text class="mutedText headline" x="385" y="173" text-anchor="middle">await (default)</text>

  <path class="leftArrow" d="M385 218 L385 300" marker-end="url(#arrowBlue)"/>

  <rect class="box blueBox" x="155" y="312" width="460" height="88" rx="16" ry="16"/>
  <text class="mutedText headline" x="385" y="366" text-anchor="middle">SynchronizationContext</text>

  <path class="leftArrow" d="M385 407 L385 520" marker-end="url(#arrowBlue)"/>

  <rect class="box blueBox" x="210" y="535" width="350" height="88" rx="16" ry="16"/>
  <text class="mutedText headline" x="385" y="590" text-anchor="middle">Context Thread</text>

  <rect class="blockedBadge" x="475" y="554" width="160" height="50" rx="10" ry="10"/>
  <rect x="492" y="569" width="22" height="18" rx="3" fill="none" stroke="#1a1a2e" stroke-width="3"/>
  <path d="M497 569 v-8 a6 6 0 0 1 12 0 v8" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
  <text class="small" x="565" y="587" text-anchor="middle" fill="#f8f3f3">BLOCKED</text>

  <path class="deadArrow" d="M330 447
                             C170 455, 110 560, 138 652
                             C165 744, 312 770, 462 760
                             C614 749, 690 659, 672 576
                             C655 500, 562 452, 448 446" marker-end="url(#arrowRed)"/>

  <text class="caption" x="192" y="726">deadlock feedback loop</text>

  <line class="threadBars" x1="302" y1="792" x2="468" y2="792"/>
  <line class="threadBars" x1="316" y1="777" x2="454" y2="777"/>
  <line class="threadBars" x1="330" y1="762" x2="440" y2="762"/>
  <text class="mutedText label subtle" x="385" y="835" text-anchor="middle">BLOCKED indicator</text>

  <!-- Right half -->
  <text class="caption" x="1190" y="90" text-anchor="middle">Free continuation path</text>

  <rect class="box greenBox" x="865" y="125" width="650" height="76" rx="16" ry="16"/>
  <text class="mutedText headline" x="1190" y="173" text-anchor="middle">await .ConfigureAwait(false)</text>

  <path class="rightArrow" d="M1190 218 L1190 460" marker-end="url(#arrowGreen)"/>

  <rect class="box greenBox" x="1015" y="475" width="350" height="88" rx="16" ry="16"/>
  <text class="mutedText headline" x="1190" y="530" text-anchor="middle">Thread Pool</text>

  <rect class="availBadge" x="1315" y="494" width="175" height="50" rx="10" ry="10"/>
  <path d="M1340 519 l10 10 l19 -24" fill="none" stroke="#f0fff5" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="small" x="1416" y="527" text-anchor="middle" fill="#f0fff5">AVAILABLE</text>

  <path class="rightArrow" d="M1190 575 L1190 700" marker-end="url(#arrowGreen)"/>
  <circle cx="1190" cy="742" r="30" fill="none" stroke="#6da287" stroke-width="4"/>
  <path d="M1172 742 h28 M1200 730 l18 12 l-18 12" fill="none" stroke="#6da287" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="mutedText label subtle" x="1190" y="810" text-anchor="middle">continuation runs without context affinity</text>
</svg>
