<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="600" viewBox="0 0 1400 600" role="img" aria-label="Data Separation Pattern: Personal and operational data in separate flows">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1400" height="600" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="700" y="40" font-size="32" font-weight="700" fill="#0f172a" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">Data Separation Pattern</text>
  
  <!-- LEFT PIPELINE: Personal Data -->
  <g>
    <!-- Source box -->
    <rect x="50" y="100" width="200" height="80" rx="8" fill="#ec4899" opacity="0.15" stroke="#ec4899" stroke-width="2"/>
    <text x="150" y="135" font-size="14" font-weight="600" fill="#be185d" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">User Identity</text>
    <text x="150" y="160" font-size="12" fill="#be185d" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">Names, Emails</text>
    
    <!-- Arrow down -->
    <line x1="150" y1="180" x2="150" y2="220" stroke="#ec4899" stroke-width="2" marker-end="url(#arrowEnd1)"/>
    <defs>
      <marker id="arrowEnd1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#ec4899" />
      </marker>
    </defs>
    
    <!-- Encryption box -->
    <rect x="50" y="220" width="200" height="80" rx="8" fill="#ec4899" opacity="0.25" stroke="#ec4899" stroke-width="2"/>
    <text x="150" y="255" font-size="14" font-weight="600" fill="#be185d" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">End-to-End</text>
    <text x="150" y="280" font-size="12" fill="#be185d" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">Encryption</text>
    
    <!-- Arrow down -->
    <line x1="150" y1="300" x2="150" y2="340" stroke="#ec4899" stroke-width="2"/>
    
    <!-- Storage box -->
    <rect x="50" y="340" width="200" height="80" rx="8" fill="#ec4899" opacity="0.35" stroke="#ec4899" stroke-width="2"/>
    <text x="150" y="375" font-size="14" font-weight="600" fill="#be185d" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">Tightly</text>
    <text x="150" y="400" font-size="14" font-weight="600" fill="#be185d" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">Controlled</text>
    
    <!-- Label -->
    <text x="150" y="530" font-size="13" font-weight="600" fill="#be185d" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">Personal Data Pipeline</text>
    <text x="150" y="555" font-size="11" fill="#7c2d5a" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">Limited access, strict retention</text>
  </g>
  
  <!-- RIGHT PIPELINE: Operational Data -->
  <g>
    <!-- Source box -->
    <rect x="1150" y="100" width="200" height="80" rx="8" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="2"/>
    <text x="1250" y="135" font-size="14" font-weight="600" fill="#1e40af" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">Events &amp;</text>
    <text x="1250" y="160" font-size="14" font-weight="600" fill="#1e40af" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">Analytics</text>
    
    <!-- Arrow down -->
    <line x1="1250" y1="180" x2="1250" y2="220" stroke="#3b82f6" stroke-width="2"/>
    <defs>
      <marker id="arrowEnd2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
      </marker>
    </defs>
    
    <!-- Hashing box -->
    <rect x="1150" y="220" width="200" height="80" rx="8" fill="#3b82f6" opacity="0.25" stroke="#3b82f6" stroke-width="2"/>
    <text x="1250" y="255" font-size="14" font-weight="600" fill="#1e40af" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">User IDs</text>
    <text x="1250" y="280" font-size="12" fill="#1e40af" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">Hashed</text>
    
    <!-- Arrow down -->
    <line x1="1250" y1="300" x2="1250" y2="340" stroke="#3b82f6" stroke-width="2"/>
    
    <!-- Storage box -->
    <rect x="1150" y="340" width="200" height="80" rx="8" fill="#3b82f6" opacity="0.35" stroke="#3b82f6" stroke-width="2"/>
    <text x="1250" y="375" font-size="14" font-weight="600" fill="#1e40af" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">Analytics</text>
    <text x="1250" y="400" font-size="14" font-weight="600" fill="#1e40af" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">Platform</text>
    
    <!-- Label -->
    <text x="1250" y="530" font-size="13" font-weight="600" fill="#1e40af" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">Operational Data Pipeline</text>
    <text x="1250" y="555" font-size="11" fill="#084594" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">Aggregated, no personal data</text>
  </g>
  
  <!-- Center divider line -->
  <line x1="700" y1="80" x2="700" y2="580" stroke="#64748b" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  <text x="700" y="590" font-size="12" fill="#475569" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif">Separate Systems</text>
</svg>
