<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <link rel="stylesheet" href="{{ site.baseurl }}/styles.css" />
    <link rel="icon" href="{{ site.baseurl }}/favicon.ico" />
    <script src="{{ site.baseurl }}/script.js" defer></script>
  </head>
  <body>
    <div class="scroll-progress" id="scrollProgress" aria-hidden="true">
      <div class="scroll-progress-fill" id="scrollProgressFill"></div>
    </div>
    <div class="page">
      <header class="blog-header">
        <div class="container">
          <a href="{{ site.baseurl }}/" class="brand">Johnny Avakian · Senior Software Engineer</a>
          <nav>
            <a href="{{ site.baseurl }}/blog/">Blog</a> · <a href="{{ site.baseurl }}/">Portfolio</a>
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle light and dark theme">
              <span id="themeIcon">☾</span>
              <span id="themeLabel">Dark mode</span>
            </button>
          </nav>
        </div>
      </header>
      <main class="container blog-content"> {{ content }} </main>
      <footer class="container blog-footer">
        <p>© {{ site.time | date: "%Y" }} Johnny Avakian</p>
      </footer>
    </div>
  </body>
</html>
